description: 'Potion, varies


  When you drink this potion, your Strength score changes for 1 hour. The type of
  giant determines the score (see the table below). The potion has no effect on you
  if your Strength is equal to or greater than that score.


  This potion''s transparent liquid has floating in it a sliver of fingernail from
  a giant of the appropriate type. The potion of frost giant strength and the potion
  of stone giant strength have the same effect.


  | Type of Giant | Strength | Rarity |


  |---|---|---|


  | Hill giant | 21 | Uncommon |


  | Frost/stone giant | 23 | Rare |


  | Fire giant | 25 | Rare |


  | Cloud giant | 27 | Very rare |


  | Storm giant | 29 | Legendary |'
