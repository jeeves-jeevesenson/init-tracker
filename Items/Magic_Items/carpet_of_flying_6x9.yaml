id: carpet_of_flying_6x9
name: Carpet of Flying (6 ft. × 9 ft.)
category: wondrous_items
description: 'Wondrous item, very rare


  You can speak the carpet''s command word as an  action to make the carpet hover
  and fly. It moves according to your spoken directions, provided that you are within
  30 feet of it.


  This carpet is 6 feet by 9 feet and has a flying speed of 30 feet. It can carry
  up to 1600 pounds, but its flying speed becomes 15 feet while carrying over 800
  pounds.'
