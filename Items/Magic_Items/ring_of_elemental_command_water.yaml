id: ring_of_elemental_command_water
name: Ring of Water Elemental Command
category: ring
description: 'Ring, legendary (requires attunement)


  This ring is linked to the Elemental Plane of Water.


  While wearing this ring, you have advantage on attack rolls against water elementals,
  and they have disadvantage on attack rolls against you. In addition, you have access
  to properties based on the Elemental Plane of Water.


  The ring has 5 charges. It regains 1d4 + 1 expended charges daily at dawn. Spells
  cast from the ring have a save DC of 17.


  You can expend 2 of the ring''s charges to cast dominate monster on a water elemental.
  In addition, you can stand on and walk across liquid surfaces as if they were solid
  ground. You can also speak and understand Aquan.


  If you help slay a water elemental while attuned to the ring, you gain access to
  the following additional properties:


  You can breathe underwater and have a swimming speed equal to your walking speed.


  You can cast the following spells from the ring, expending the necessary number
  of charges: create or destroy water (1 charge), control water (3 charges), ice storm
  (2 charges), or wall of ice (3 charges).'
