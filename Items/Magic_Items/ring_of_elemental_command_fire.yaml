id: ring_of_elemental_command_fire
name: Ring of Fire Elemental Command
category: ring
description: 'Ring, legendary (requires attunement)


  This ring is linked to the Elemental Plane of Fire.


  While wearing this ring, you have advantage on attack rolls against fire elementals,
  and they have disadvantage on attack rolls against you. In addition, you have access
  to properties based on the Elemental Plane of Fire.


  The ring has 5 charges. It regains 1d4 + 1 expended charges daily at dawn. Spells
  cast from the ring have a save DC of 17.


  You can expend 2 of the ring''s charges to cast dominate monster on a fire elemental.
  In addition, you have resistance to fire damage. You can also speak and understand
  Ignan.


  If you help slay a fire elemental while attuned to the ring, you gain access to
  the following additional properties:


  You are immune to fire damage.


  You can cast the following spells from the ring, expending the necessary number
  of charges: burning hands (1 charge), fireball (2 charges), and wall of fire (3
  charges).'
