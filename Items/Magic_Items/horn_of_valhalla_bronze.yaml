id: horn_of_valhalla_bronze
name: Bronze Horn of Valhalla
category: wondrous_items
description: 'Wondrous item, very rare


  You can use an action to blow this horn. In response, 4d4 + 4 warrior spirits from
  the Valhalla appear within 60 feet of you. They use the statistics of a berserker.
  They return to Valhalla after 1 hour or when they drop to 0 hit points. Once you
  use the horn, it can''t be used again until 7 days have passed.


  If you blow the horn without having proficiency with all medium armor, the summoned
  berserkers attack you. If you meet the requirement, they are friendly to you and
  your companions and follow your commands.'
