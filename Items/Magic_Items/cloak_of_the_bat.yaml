id: cloak_of_the_bat
name: Cloak of the Bat
category: wondrous_items
description: 'Wondrous item, rare (requires attunement)


  While wearing this cloak, you have advantage on Dexterity (Stealth) checks. In an
  area of dim light or darkness, you can grip the edges of the cloak with both hands
  and use it to fly at a speed of 40 feet. If you ever fail to grip the cloak''s edges
  while flying in this way, or if you are no longer in dim light or darkness, you
  lose this flying speed.


  While wearing the cloak in an area of dim light or darkness, you can use your action
  to cast polymorph on yourself, transforming into a bat. While you are in the form
  of the bat, you retain your Intelligence, Wisdom, and Charisma scores. The cloak
  can''t be used this way again until the next dawn.'
