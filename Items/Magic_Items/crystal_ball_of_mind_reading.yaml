id: crystal_ball_of_mind_reading
name: Crystal Ball of Mind Reading
category: wondrous_items
description: 'Wondrous item, legendary (requires attunement)


  The crystal ball is about 6 inches in diameter. While touching it, you can cast
  the scrying spell (save DC 17) with it.


  ***Crystal Ball of Mind Reading.*** You can use an action to cast the detect thoughts
  spell (save DC 17) while you are scrying with the crystal ball, targeting creatures
  you can see within 30 feet of the spell''s sensor. You don''t need to concentrate
  on this detect thoughts to maintain it during its duration, but it ends if scrying
  ends.'
