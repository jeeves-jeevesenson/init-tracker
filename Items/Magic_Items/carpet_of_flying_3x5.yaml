id: carpet_of_flying_3x5
name: Carpet of Flying (3 ft. × 5 ft.)
category: wondrous_items
description: 'Wondrous item, very rare


  You can speak the carpet''s command word as an  action to make the carpet hover
  and fly. It moves according to your spoken directions, provided that you are within
  30 feet of it.


  This carpet is 3 feet by 5 feet and has a flying speed of 80 feet. It can carry
  up to 400 pounds, but its flying speed becomes 40 feet while carrying over 200 pounds.'
