id: figurine_of_wondrous_power_marble_elephant
name: Marble Elephant Figurine of Wondrous Power
category: wondrous_items
description: 'Wondrous item, rare


  A figurine of wondrous power is a statuette of a beast small enough to fit in a
  pocket. If you use an action to speak the command word and throw the figurine to
  a point on the ground within 60 feet of you, the figurine becomes a living creature.
  If the space where the creature would appear is occupied by other creatures or objects,
  or if there isn''t enough space for the creature, the figurine doesn''t become a
  creature.


  The creature is friendly to you and your companions. It understands your languages
  and obeys your spoken commands. If you issue no commands, the creature defends itself
  but takes no other actions.


  The creature exists for a duration specific to each figurine. At the end of the
  duration, the creature reverts to its figurine form. It reverts to a figurine early
  if it drops to 0 hit points or if you use an action to speak the command word again
  while touching it. When the creature becomes a figurine again, its property can''t
  be used again until a certain amount of time has passed, as specified in the figurine''s
  description.


  ***Marble Elephant.*** This marble statuette is about 4 inches high and long. It
  can become an elephant for up to 24 hours. Once it has been used, it can''t be used
  again until 7 days have passed.'
