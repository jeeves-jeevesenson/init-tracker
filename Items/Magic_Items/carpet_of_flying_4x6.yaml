id: carpet_of_flying_4x6
name: Carpet of Flying (4 ft. × 6 ft.)
category: wondrous_items
description: 'Wondrous item, very rare


  You can speak the carpet''s command word as an  action to make the carpet hover
  and fly. It moves according to your spoken directions, provided that you are within
  30 feet of it.


  This carpet is 4 feet by 6 feet and has a flying speed of 60 feet. It can carry
  up to 800 pounds, but its flying speed becomes 30 feet while carrying over 400 pounds.'
