id: feather_token_tree
name: Tree Feather Token
category: wondrous_items
description: 'Wondrous item, rare


  This tiny object looks like a feather.


  You must be outdoors to use this token. You can use an action to touch it to an
  unoccupied space on the ground. The token disappears, and in its place a nonmagical
  oak tree springs into existence. The tree is 60 feet tall and has a 5-foot-diameter
  trunk, and its branches at the top spread out in a 20-foot radius.'
