id: ring_of_animal_influence
name: Ring of Animal Influence
category: ring
description: 'Ring, rare


  This ring has 3 charges, and it regains 1d3 expended charges daily at dawn. While
  wearing the ring, you can use an action to expend 1 of its charges to cast one of
  the following spells:


  Animal friendship (save DC 13)


  Fear (save DC 13), targeting only beasts that have an Intelligence of 3 or lower


  Speak with animals'
