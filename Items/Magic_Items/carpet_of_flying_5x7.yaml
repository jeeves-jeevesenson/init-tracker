id: carpet_of_flying_5x7
name: Carpet of Flying (5 ft. × 7 ft.)
category: wondrous_items
description: 'Wondrous item, very rare


  You can speak the carpet''s command word as an  action to make the carpet hover
  and fly. It moves according to your spoken directions, provided that you are within
  30 feet of it.


  This carpet is 5 feet by 7 feet and has a flying speed of 40 feet. It can carry
  up to 1200 pounds, but its flying speed becomes 20 feet while carrying over 600
  pounds.'
