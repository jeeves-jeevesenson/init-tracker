description = "Produce a recovery-gate final report with required status, validation, smoke, and git state."

prompt = """
Produce the final report for the current recovery session.

Read first:
- GEMINI.md
- docs/production_recovery_living_doc_20260526.md
- docs/agent_ops/gemini_recovery_workflow.md

Do not introduce new findings that were not inspected in this session.
Do not claim browser readiness unless browser smoke was actually run and
reported.
Do not claim production readiness from unit tests alone.
Do not commit, push, deploy, SSH, restart services, or change production
topology.

Use this exact order:

1. Active gate and scope
2. Files inspected
3. Files changed
4. Commands/branches/components changed
5. Tests and validation
6. Browser smoke status
7. Remaining risks / rough edges
8. Tracker/doc updates
9. Single best next pass
10. `git status --short`

For tests and validation, include exact commands and results. If a browser
HTML asset changed, include the exact inline JavaScript syntax-check command
and result. If smoke was skipped, say skipped and do not claim UI readiness.

Validation discipline:
- Required gate validation is `scripts/agent_gate_validate.sh <gate-id>`.
- Do not run broad extra unittest classes after required validation passes.
- Extra tests are allowed only when targeted to a specific failure, timeout-bounded, and named in the final report.
- Known websocket tests must never be run without timeout.
- If required validation passes, stop and report; do not keep searching for more confidence.
- Browser smoke is developer-owned and is not replaced by extra Python tests.
"""
