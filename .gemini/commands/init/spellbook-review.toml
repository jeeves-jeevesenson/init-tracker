backend-derived class-aware behavior, not incremental UI patching.

Read for grounding:
- GEMINI.md, AGENTS.md
- majorTODO.md §4.1 (corrective pass status), §6.1 (Throat Goat
  multiclass gaps), §6.6 / §6.7 (counterspell / refund provenance)

Inspect, with concrete file/line references:
- dnd_initative_tracker.py — `spellbook_contract`,
