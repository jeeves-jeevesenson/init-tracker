  `_feature_always_prepared_spell_slugs`, related normalization
  helpers, and the spell-cast / spell-target adjudication paths.
- player_command_service.py — spell cast authority, slot provenance
  threading, refund helpers (`_refund_spell_slot` and adjacent).
- player_command_contracts.py — spell-related contract builders.
- assets/web/lan/* — Manage Spells surface, list/mode/tab gating,
