features:
- id: monks_focus
  name: Monk's Focus
  category: Monk Feature
  source: PHB2024
  level: 2
  description: Focus save DC = 8 + prof + wis_mod. Baseline Focus spenders include Flurry of Blows, Patient Defense, and Step of the Wind.
- id: warrior_of_the_elements
  name: Warrior of the Elements
  category: Monk Subclass Feature
  source: PHB2024
  level: 3
  description: Elemental Attunement, Elemental Burst, and Manipulate Elements (Elementalism known).
- id: lucky
  name: Lucky
  category: Feat
  source: Player Notes
  description: Gain Luck Points that can be spent to reroll d20 checks as described by the Lucky feat. Tracked manually for now.
- id: sentinel
  name: Sentinel
  category: Feat
  source: PHB2024
  description: When a hostile creature moves out of your reach, you can make an opportunity attack; on hit, the target speed becomes 0 for the rest of the turn. You can also make this reaction against nearby creatures that Disengage or attack someone other than you.
- id: charger
  name: Charger
  category: Feat
  source: Player Notes
  description: Charger feat benefits are tracked manually during play.
- id: tough
  name: Tough
  category: Feat
  source: Player Notes
  description: Maximum hit points include the Tough feat bonus.
- id: fight_or_flight
  name: Fight or Flight
  category: Custom Feature
  source: Homebrew (Player Notes)
  description: "Trigger: when HP drops below 18. Choose Strength (fight) or Dexterity (flight). For 1 minute, gain advantage on all saving throws, ability checks, and attack rolls using the chosen ability. When the effect ends, become incapacitated. Track trigger/duration manually."
actions:
- name: Attack
  description: Make a weapon or unarmed attack against a target within range.
  type: action
- name: Dash
  description: Gain extra movement for the current turn equal to your speed.
  type: action
- name: Disengage
  description: Your movement does not provoke opportunity attacks for the rest of
    the turn.
  type: action
- name: Dodge
  description: Until the start of your next turn, attack rolls against you have disadvantage
    if you can see the attacker, and you make Dexterity saves with advantage.
  type: action
- name: Help
  description: Aid a creature in the next ability check or attack roll against a target
    within 5 feet of you.
  type: action
- name: Hide
  description: Attempt to hide by making a Dexterity (Stealth) check.
  type: action
- name: Influence
  description: Attempt to influence a creature through conversation, bargaining, or
    intimidation.
  type: action
- name: Magic
  description: Cast a spell or use a magical feature that takes an action.
  type: action
- name: Ready
  description: Prepare an action and a trigger; use your reaction to perform it when
    the trigger occurs.
  type: action
- name: Search
  description: Devote attention to finding something by making a Wisdom (Perception)
    or Intelligence (Investigation) check.
  type: action
- name: Study
  description: Focus on detailed observation or research to gain information about
    a creature, object, or situation.
  type: action
- name: Utilize
  description: Use an object or interact with the environment in a significant way.
  type: action
reactions:
- name: Opportunity Attack
  description: When a hostile creature you can see moves out of your reach, you can
    use your reaction to make one melee attack against it.
  type: reaction
- name: Reaction
  description: You can take a reaction when a trigger occurs. A reaction is only available
    once per round.
  type: reaction
bonus_actions:
- name: Patient Defense (Disengage)
  description: Take Disengage as a free bonus action.
  type: bonus_action
- name: Patient Defense (Disengage + Dodge)
  description: Spend 1 Focus to Disengage and Dodge as a bonus action.
  type: bonus_action
- name: Step of the Wind (Dash)
  description: Take Dash as a free bonus action.
  type: bonus_action
- name: Step of the Wind (Dash + Disengage)
  description: Spend 1 Focus to Dash and Disengage as a bonus action.
  type: bonus_action
- name: "Martial Arts: Bonus Unarmed Strike"
  description: Make 1 unarmed strike as a bonus action.
  type: bonus_action
- name: Flurry of Blows
  description: Spend 1 Focus to make 2 unarmed strikes (3 at Monk level 10+).
  type: bonus_action
- name: Uncanny Metabolism
  description: Regain Focus through Uncanny Metabolism (bonus action, 1/Long Rest).
  type: bonus_action
