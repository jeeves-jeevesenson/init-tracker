notes:
  note_1: Speed is 30 (human) + 20 (monk) = 50 walk.
  note_2: Tinker's Tools crafting rule - spend one long rest and 20 gp to craft a pistol/musket to make it permanent.
  note_3: Proficient with all simple and martial weapons with the light property (manual reminder).
  note_4: Playstyle - fight up close with team; run in and use Flurry of Blows for up to 5 attacks.
  note_5: Use push on last attack so target cannot opportunity attack, then reposition near teammates to exploit Sentinel.
  note_6: Opportunity attack reminder - can occur when enemies leave reach willingly or unwillingly.
  note_7: "Future wishlist (not owned/equipped): Unarmed Wraps."
