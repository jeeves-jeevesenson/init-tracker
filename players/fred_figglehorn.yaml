notes:
  sheet_status: Level 8 rebuild from sparse sheet plus user notes. Backend automation still needed for custom subclass features, custom weapon effects, and deeper item formalization.
  hp_note: Max HP set to 59 as a clean level-8 warlock baseline using average gains and CON 15. Adjust if table used rolled HP or a different prior total.
  spell_reskins: Murderous Intent uses Toll the Dead as the underlying repo spell for now. Blood Slick = Grease. Bloody Rebuke = Hellish Rebuke. Blood-themed spell names are presentation only.
  subclass_expanded_spells_future: 'Current Bhall expanded/always-prepared list at level 8: Dissonant Whispers, Detect Thoughts, Phantasmal Force, Cloud of Daggers, Enthrall. Future planned additions: Fear and Vampiric Touch when higher-level subclass spell access comes online.'
  subclass_future_level_10: 'Cloak of the Murder Lord (planned): resistance to psychic and necrotic damage; advantage on saves against Charmed/Frightened; possibly recover some Murderous Intent when using Magical Cunning. Keep as planning note until finalized.'
  subclass_future_level_14: 'Bhalls Chosen (planned): 1/long-rest transformation for 1 minute with speed/positioning payoff, first-hit extra necrotic each turn, and a kill-trigger reposition or brief invisibility effect. Keep as planning note until finalized.'
  dm_assassin_direction: Alert selected at level 8. Fred is intentionally built as a lean assassin-style DMPC rather than a fully optimized generalist.
