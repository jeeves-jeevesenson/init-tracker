- id: alert
  name: Alert
  category: Feat
  source: PHB2024
  description: Gain a +5 bonus to Initiative.
- id: murderspawn
  name: Murderspawn
  category: Warlock Subclass Feature
  source: Homebrew (Bhall)
  level: 3
  description: Once per turn when you deal damage to a hostile creature, gain 1 Murderous Intent (MI), up to your proficiency bonus. Once on each of your turns, when you hit with a weapon attack or deal damage with a warlock spell/cantrip, you may spend any number of MI to deal 1d4 necrotic damage per point spent. When you reduce a creature to 0 HP, gain 1 MI. Track manually until backend support lands.
  grants:
    always_prepared_spells:
    - dissonant-whispers
    - detect-thoughts
    - phantasmal-force
    - cloud-of-daggers
    - enthrall
    pools:
    - id: murderous_intent
      label: Murderous Intent
      max_formula: prof
      reset: short_rest
- id: cull_the_weak
  name: Cull the Weak
  category: Warlock Subclass Feature
  source: Homebrew (Bhall)
  level: 6
  description: You know immediately when a creature you can see within 30 feet is below half its hit points.
- id: blood_in_the_air
  name: Blood in the Air
  category: Warlock Subclass Feature
  source: Homebrew (Bhall)
  level: 6
  description: You know immediately when a creature you can see within 30 feet is at or below one-quarter of its hit points. Once per turn when you damage a creature that is below half its hit points, you may either move up to 10 feet without provoking opportunity attacks or force that creature to make a Wisdom save against your spell save DC; on a failure it cannot take Reactions until the start of its next turn. Track manually until backend support lands.
- id: agonizing_blast
  name: Agonizing Blast
  category: Eldritch Invocation
  source: Warlock
  description: Add your Charisma modifier to Eldritch Blast damage.
- id: devils_sight
  name: Devil's Sight
  category: Eldritch Invocation
  source: Warlock
  description: See normally in Darkness, magical and nonmagical, out to 120 feet.
- id: mask_of_many_faces
  name: Mask of Many Faces
  category: Eldritch Invocation
  source: Warlock
  description: Cast Disguise Self at will without expending a spell slot.
- id: misty_visions
  name: Misty Visions
  category: Eldritch Invocation
  source: Warlock
  description: Cast Silent Image at will without expending a spell slot.
- id: pact_of_the_blade
  name: Pact of the Blade
  category: Eldritch Invocation
  source: Warlock
  description: Use a conjured or bonded weapon as your pact weapon. Current dagger/fork setup remains largely manual until a backend pass decides how far to formalize pact-weapon handling for Fred.
- id: thirsting_blade
  name: Thirsting Blade
  category: Eldritch Invocation
  source: Warlock
  description: If using Pact of the Blade, you can attack twice instead of once when you take the Attack action with your pact weapon.
actions:
- name: Attack
  description: Make a weapon or unarmed attack against a target within range.
  type: action
- name: Dash
  description: Gain extra movement for the current turn equal to your speed.
  type: action
- name: Disengage
  description: Your movement does not provoke opportunity attacks for the rest of the turn.
  type: action
- name: Dodge
  description: Until the start of your next turn, attack rolls against you have disadvantage if you can see the attacker, and you make Dexterity saves with advantage.
  type: action
- name: Help
  description: Aid a creature in the next ability check or attack roll against a target within 5 feet of you.
  type: action
- name: Hide
  description: Attempt to hide by making a Dexterity (Stealth) check.
  type: action
- name: Influence
  description: Attempt to influence a creature through conversation, bargaining, or intimidation.
  type: action
- name: Magic
  description: Cast a spell or use a magical feature that takes an action.
  type: action
- name: Murderous Intent
  description: Homebrew blood-themed cantrip presentation. Underlying repo spell for current YAML is Toll the Dead, skinned at the table as Murderous Intent.
  type: action
- name: Fan of Blades
  description: 'Bandolier of Many Knives: each creature in a 15-foot cone makes a DC 15 Dexterity save, taking 8d4 + 8 piercing on a failure or half on a success. Refreshes at next dawn; tracked here as a long-rest style pool for now.'
  type: action
- name: Ready
  description: Prepare an action and a trigger; use your reaction to perform it when the trigger occurs.
  type: action
- name: Search
  description: Devote attention to finding something by making a Wisdom (Perception) or Intelligence (Investigation) check.
  type: action
- name: Study
  description: Focus on detailed observation or research to gain information about a creature, object, or situation.
  type: action
- name: Utilize
  description: Use an object or interact with the environment in a significant way.
  type: action
reactions:
- name: Opportunity Attack
  description: When a hostile creature you can see moves out of your reach, you can use your reaction to make one melee attack against it.
  type: reaction
- name: Reaction
  description: You can take a reaction when a trigger occurs. A reaction is only available once per round.
  type: reaction
- name: Spell Stopper
  description: Once per short rest, when a creature within melee range casts a spell, cut its throat with the Spell Stopper dagger as a reaction. The spell is canceled, no slot is consumed, and the target is silenced until the end of its next turn. Track manually until backend support lands.
  type: reaction
bonus_actions:
- name: Bonus Action
  description: You can take a bonus action only when a feature, spell, or ability says you can.
  type: bonus_action
