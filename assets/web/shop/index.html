<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop</title>
  <link rel="stylesheet" href="/assets/web/shop/styles.css?v=__APP_VERSION__" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">InitTracker LAN • Player Shop</p>
      <h1>Adventurer's Shop</h1>
      <p class="subtitle">Buy enabled catalog items with your current inventory currency.</p>
    </header>

    <section class="panel storefront-shell" aria-label="Player shop status and catalog">
      <div class="shop-summary">
        <div class="player-meta">
          <p><strong>Player</strong><span id="player-name">—</span></p>
          <p><strong>Currency</strong><span id="player-currency">—</span></p>
        </div>
        <div class="status-actions">
          <button id="refresh-button" class="ghost" type="button">Refresh</button>
        </div>
      </div>

      <p id="shop-status" class="status" role="status">Loading shop data…</p>

      <div id="player-picker-shell" class="player-picker hidden" aria-live="polite">
        <p class="picker-message">No assigned player was detected. Select who you are to continue.</p>
        <label for="player-picker-select">Player</label>
        <div class="picker-actions">
          <select id="player-picker-select">
            <option value="">Select a player…</option>
          </select>
          <button id="player-picker-load-button" type="button">Use player</button>
        </div>
      </div>

      <div class="shop-filters" role="search" aria-label="Filter catalog">
        <input id="filter-search" type="search" class="filter-search" placeholder="Search items…" autocomplete="off" />
        <select id="filter-bucket" class="filter-select" aria-label="Filter by type">
          <option value="">All types</option>
          <option value="weapon">Weapons</option>
          <option value="armor">Armor</option>
          <option value="magic_item">Magic Items</option>
          <option value="consumable">Consumables</option>
          <option value="gear">Gear</option>
        </select>
        <select id="filter-tier" class="filter-select" aria-label="Filter by tier">
          <option value="">All tiers</option>
          <option value="A">Tier A (Mechanized)</option>
          <option value="B">Tier B (Described)</option>
          <option value="C">Tier C (Stub)</option>
        </select>
        <span id="filter-count" class="filter-count"></span>
      </div>

      <div id="catalog-list" class="catalog"></div>
    </section>
  </main>

  <script src="/assets/web/shop/app.js?v=__APP_VERSION__"></script>
</body>
</html>
