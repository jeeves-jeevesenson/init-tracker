<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop</title>
  <link rel="stylesheet" href="/assets/web/shop/styles.css?v=__APP_VERSION__" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">InitTracker LAN • Player Shop</p>
      <h1>Adventurer's Shop</h1>
      <p class="subtitle">Buy enabled catalog items with your current inventory currency.</p>
    </header>

    <section class="panel status-panel" aria-label="Player shop status">
      <p id="shop-status" class="status" role="status">Loading shop data…</p>
      <div id="player-picker-shell" class="player-picker hidden" aria-live="polite">
        <p class="picker-message">No assigned player was detected. Select who you are to continue.</p>
        <label for="player-picker-select">Player</label>
        <div class="picker-actions">
          <select id="player-picker-select">
            <option value="">Select a player…</option>
          </select>
          <button id="player-picker-load-button" type="button">Use player</button>
        </div>
      </div>
      <div class="player-meta">
        <p><strong>Player</strong><span id="player-name">—</span></p>
        <p><strong>Currency</strong><span id="player-currency">—</span></p>
      </div>
      <div class="status-actions">
        <button id="refresh-button" class="ghost" type="button">Refresh</button>
      </div>
    </section>

    <section class="panel" aria-label="Shop catalog">
      <div id="catalog-list" class="catalog"></div>
    </section>
  </main>

  <script src="/assets/web/shop/app.js?v=__APP_VERSION__"></script>
</body>
</html>
