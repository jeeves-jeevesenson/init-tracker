<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DM Control – Initiative Tracker</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #141923;
      --panel2: #0f1320;
      --border: rgba(214,186,126,0.22);
      --text: #e8eef7;
      --muted: #93a2b8;
      --accent: #6aa9ff;
      --gold: #d6ba7e;
      --danger: #ff5b5b;
      --heal: #4caf82;
      --radius: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif; overflow: hidden; }

    .app { height: 100vh; display: flex; flex-direction: column; }

    /* ── Topbar ─────────────────────────────────────────────────── */
    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }
    .topbar h1 { font-size: 16px; color: var(--gold); flex: 1; }
    .workspace-link {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: var(--radius); padding: 5px 12px; cursor: pointer; font-size: 12px;
      text-decoration: none; display: inline-flex; align-items: center;
    }
    .workspace-link:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Mode Banner ─────────────────────────────────────────────── */
    .mode-banner {
      flex-shrink: 0;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      z-index: 10;
    }
    .mode-banner .mode-icon {
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .mode-banner .mode-text { flex: 1; line-height: 1.3; }
    .mode-banner.move-mode { border-bottom-color: rgba(106,169,255,0.4); }
    .mode-banner.move-mode .mode-icon { background: rgba(106,169,255,0.18); color: var(--accent); }
    .mode-banner.target-mode { border-bottom-color: rgba(214,186,126,0.6); background: rgba(214,186,126,0.08); }
    .mode-banner.target-mode .mode-icon { background: var(--gold); color: var(--bg); }
    .mode-banner.resolve-mode { border-bottom-color: rgba(76,175,130,0.5); background: rgba(76,175,130,0.08); }
    .mode-banner.resolve-mode .mode-icon { background: var(--heal); color: var(--bg); }
    .mode-banner.sequence-mode { border-bottom-color: rgba(106,169,255,0.6); background: rgba(106,169,255,0.08); }
    .mode-banner.sequence-mode .mode-icon { background: var(--accent); color: var(--bg); }
    .mode-banner.blocked-mode { border-bottom-color: var(--danger); background: rgba(255,91,91,0.08); }
    .mode-banner.blocked-mode .mode-icon { background: var(--danger); color: var(--bg); }
    .mode-banner .cancel-target-btn {
      background: var(--danger); color: var(--bg); border: none;
      border-radius: 4px; padding: 5px 12px; cursor: pointer;
      font-size: 12px; font-weight: bold; flex-shrink: 0;
    }
    .mode-banner .cancel-target-btn:hover { filter: brightness(1.15); }

    /* ── Main Map Surface ────────────────────────────────────────── */
    .main-surface {
      position: relative;
      background: #0a0c12;
      overflow: hidden;
      flex: 1 1 auto;
      min-height: 120px;
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: -webkit-optimize-contrast;
    }

    /* ── Split Handle ────────────────────────────────────────────── */
    .split-handle {
      flex: 0 0 8px;
      cursor: row-resize;
      background: var(--panel);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 11;
      transition: background 0.15s ease;
    }
    .split-handle:hover, .split-handle.dragging { background: var(--accent); }
    .split-handle::before {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 36px; height: 3px;
      background: var(--muted);
      border-radius: 2px;
      opacity: 0.5;
    }
    .split-handle:hover::before, .split-handle.dragging::before { background: var(--bg); opacity: 0.9; }

    /* ── Bottom Control Bar ──────────────────────────────────────── */
    .control-bar {
      background: var(--panel2);
      padding: 10px 16px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 0 0 320px;
      min-height: 160px;
      z-index: 10;
      overflow-y: auto;
    }
    .actor-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .actor-name { font-size: 18px; font-weight: bold; color: var(--text); }
    .actor-meta { font-size: 12px; color: var(--muted); }
    .actor-stat-row {
      display: flex; gap: 14px; flex-wrap: wrap;
      font-size: 12px; color: var(--text);
    }
    .actor-stat-row .stat-pill {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
    }
    .actor-stat-row .stat-pill strong { color: var(--gold); }
    .status-idle { color: var(--muted); font-style: italic; font-size: 13px; }

    /* ── Action Panel ───────────────────────────────────────────── */
    .action-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .action-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .group-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--gold);
      opacity: 0.8;
      border-bottom: 1px solid rgba(214,186,126,0.15);
      padding-bottom: 2px;
      margin-bottom: 2px;
    }
    .action-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }
    .action-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      min-height: 64px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .action-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(214,186,126,0.45);
    }
    .action-card.selected {
      background: rgba(106,169,255,0.14);
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(106,169,255,0.28);
    }
    .action-card .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .action-card .card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }
    .action-card .card-badges {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .action-card .card-badge {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.1);
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .action-card .card-badge.exec {
      background: rgba(106,169,255,0.18); color: var(--accent);
    }
    .action-card .card-badge.manual-tag {
      background: var(--gold); color: var(--bg); font-weight: bold;
    }
    .action-card .card-meta {
      font-size: 12px;
      color: var(--text);
      opacity: 0.85;
      line-height: 1.35;
    }
    .action-card.executable {
      border-left: 3px solid var(--accent);
    }
    .action-card.trait {
      background: rgba(255,255,255,0.015);
      border-style: dashed;
      opacity: 0.7;
      min-height: 48px;
      padding: 7px 10px;
    }
    .action-card.trait .card-name { font-size: 12px; font-weight: 500; }
    .action-card.manual {
      border-left: 3px dashed var(--gold);
      background: rgba(214,186,126,0.06);
    }
    .action-card.manual .card-meta { color: var(--gold); opacity: 0.95; }

    .selected-summary {
      background: rgba(106,169,255,0.1);
      border-left: 3px solid var(--accent);
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .selected-summary h4 { font-size: 13px; color: var(--accent); margin-bottom: 4px; }
    .selected-summary p { font-size: 12px; color: var(--text); opacity: 0.9; line-height: 1.4; }

    /* ── Status Overlay ─────────────────────────────────────────── */
    .status-overlay {
      position: absolute; top: 20px; right: 20px;
      background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 6px;
      font-size: 12px; border: 1px solid var(--border);
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>DM Control</h1>
      <div id="combatStatus" class="actor-meta">Loading state...</div>
      <a href="/dm" class="workspace-link">↩ DM Cockpit</a>
    </header>

    <div id="modeBanner" class="mode-banner move-mode">
      <span class="mode-icon">Move</span>
      <span class="mode-text">Drag token on map to move. Movement is backend-validated.</span>
    </div>

    <main class="main-surface" id="mapWrap">
      <canvas id="mapCanvas"></canvas>
      <div id="statusOverlay" class="status-overlay" style="display:none;"></div>
    </main>

    <div id="splitHandle" class="split-handle" role="separator" aria-orientation="horizontal" title="Drag to resize map / control split"></div>

    <footer class="control-bar" id="controlBar">
      <div id="activeActorPanel">
        <div class="status-idle">Waiting for combat data...</div>
      </div>
      <div id="activeActionsPanel" class="action-panel">
        <!-- Actions rendered here -->
      </div>
    </footer>
  </div>

  <script>
    /**
     * DM Control Phase 3A2a — Target-preview mode scaffold.
     * /dmcontrol has map rendering, movement range visualization, and backend-validated drag/drop movement.
     * Includes read-only monster/NPC action cards and local selection state.
     * Now includes local-only target-preview mode scaffold for simple attacks.
     * Deferred: target click selection, resolution, AoE, and Multiattack.
     */

    const API_COMBAT = '/api/dm/combat';
    let pollInterval = null;
    let state = null;

    // Phase 3A1/3A2a/3A2b state
    let capabilitySummary = null;
    let capabilityActorCid = null;
    let selectedCapabilityId = null;
    let lastActiveCid = null;
    let targetPreviewMode = null; // { capabilityId, capabilityName, actorCid, actionType }
    let selectedTargetCid = null;
    let localResolutionTray = null; // { actorCid, capabilityId, targetCid, openedAt }
    let localResolutionPacket = null;
    let localResolutionError = null;
    let localResolutionInFlight = false;
    let localResolutionOutcomes = {}; // Keyed by target CID as string

    // Phase 3D2 sequence state
    let localSequencePacket = null;
    let localSequenceCompletedSteps = {}; // action_id -> count

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /**
     * Update the prominent mode banner (Move / Target / Resolve / Sequence).
     * Should be called from renderActionPanel and renderState so it stays in sync with local state.
     */
    function updateModeBanner() {
      const banner = document.getElementById('modeBanner');
      if (!banner) return;
      banner.classList.remove('move-mode', 'target-mode', 'resolve-mode', 'sequence-mode', 'blocked-mode');

      let icon = 'Move', text = 'Drag token on map to move. Movement is backend-validated.', cls = 'move-mode', cancelHtml = '';

      if (!state || !state.in_combat) {
        icon = 'Idle';
        text = 'Out of combat.';
        cls = 'move-mode';
      } else {
        const actor = (state.combatants || []).find(c => String(c.cid) === String(state.active_cid));
        if (actor && actor.is_pc) {
          icon = 'PC Turn';
          text = `Waiting for ${esc(actor.name)} (player). DM movement is disabled.`;
          cls = 'blocked-mode';
        } else if (localResolutionTray) {
          const cap = findCapabilityById(localResolutionTray.capabilityId);
          const target = findCombatantByCid(localResolutionTray.targetCid);
          const capName = cap ? cap.name : 'Action';
          const targetName = target ? target.name : 'target';
          icon = 'Resolve';
          text = `Resolving ${esc(capName)} vs ${esc(targetName)}. Choose Apply or Cancel.`;
          cls = 'resolve-mode';
          cancelHtml = `<button class="cancel-target-btn" onclick="cancelTargetPreviewMode()">Cancel</button>`;
        } else if (localSequencePacket) {
          icon = 'Sequence';
          text = `Multiattack sequence active: ${esc(localSequencePacket.name || 'Multiattack')}. Pick the next step from the panel below. Movement is blocked.`;
          cls = 'sequence-mode';
          cancelHtml = `<button class="cancel-target-btn" onclick="cancelLocalSequence()">End Sequence</button>`;
        } else if (targetPreviewMode) {
          icon = 'Target';
          text = `Targeting ${esc(targetPreviewMode.capabilityName || 'action')}. Click an enemy token to select. Movement is blocked while targeting.`;
          cls = 'target-mode';
          cancelHtml = `<button class="cancel-target-btn" onclick="cancelTargetPreviewMode()">Cancel Targeting</button>`;
        } else if (actor && !actor.is_pc) {
          icon = 'Move';
          const units = state.tactical_map?.units || [];
          const unit = units.find(u => String(u.cid) === String(state.active_cid));
          const moveRemaining = unit ? (unit.move_remaining ?? unit.speed ?? 0) : 0;
          text = `Drag token on map to move (${esc(actor.name)}, ${moveRemaining} ft remaining). Movement is backend-validated.`;
          cls = 'move-mode';
        }
      }

      banner.classList.add(cls);
      banner.innerHTML = `<span class="mode-icon">${esc(icon)}</span><span class="mode-text">${text}</span>${cancelHtml}`;
    }

    /**
     * Reset all local UI state (targeting, preview, resolution).
     */
    function fullResetLocalState() {
      targetPreviewMode = null;
      selectedTargetCid = null;
      localResolutionTray = null;
      localResolutionPacket = null;
      localResolutionError = null;
      localResolutionInFlight = false;
      localResolutionOutcomes = {};
      selectedCapabilityId = null;
      localSequencePacket = null;
      localSequenceCompletedSteps = {};
    }

    /**
     * Outcome helpers for Phase 3C1
     */
    function getLocalResolutionOutcome(targetCid) {
      return localResolutionOutcomes[String(targetCid)] || 'fail';
    }

    function setLocalResolutionOutcome(targetCid, outcome) {
      localResolutionOutcomes[String(targetCid)] = outcome;
      const actor = (state?.combatants || []).find(c => String(c.cid) === String(state?.active_cid));
      renderActionPanel(actor, capabilitySummary);
    }

    function getOutcomeLabel(outcome) {
      switch (outcome) {
        case 'fail': return 'Fail / Hit';
        case 'success': return 'Success / Miss';
        case 'no_effect': return 'No Effect';
        case 'manual': return 'Manual';
        default: return 'Unknown';
      }
    }

    function getOutcomePreviewDamage(packet, outcome) {
      if (!packet) return 'Damage unknown';
      if (outcome === 'no_effect') return 'no effect';
      if (outcome === 'manual') return 'manual adjudication';

      const val = (outcome === 'success') ? packet.total_success : packet.total_fail;
      if (val === undefined || val === null) return 'Damage unknown';
      return `${val} damage`;
    }

    function renderLocalOutcomeControls(packet, targetCid) {
      if (!packet) return '';
      const outcome = getLocalResolutionOutcome(targetCid);
      const target = findCombatantByCid(targetCid);
      const previewText = getOutcomePreviewDamage(packet, outcome);

      return `
        <div style="margin-top:12px; border-top:1px dashed var(--border); padding-top:12px;">
          <div style="font-size:11px; color:var(--gold); margin-bottom:6px; font-weight:bold; text-transform:uppercase">Local Outcome Selection</div>
          <div class="actor-meta" style="margin-bottom:8px;">
            Target: <strong>${esc(target ? target.name : 'Unknown')}</strong>
          </div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <select class="workspace-link" style="width:100%; padding:6px; background:var(--panel2); color:var(--text);"
                    onchange="setLocalResolutionOutcome('${esc(targetCid)}', this.value)"
                    ${localResolutionInFlight ? 'disabled' : ''}>
              <option value="fail" ${outcome === 'fail' ? 'selected' : ''}>${esc(getOutcomeLabel('fail'))}</option>
              <option value="success" ${outcome === 'success' ? 'selected' : ''}>${esc(getOutcomeLabel('success'))}</option>
              <option value="no_effect" ${outcome === 'no_effect' ? 'selected' : ''}>${esc(getOutcomeLabel('no_effect'))}</option>
              <option value="manual" ${outcome === 'manual' ? 'selected' : ''}>${esc(getOutcomeLabel('manual'))}</option>
            </select>
            <div class="actor-meta" style="color:var(--accent); font-weight:bold; padding:4px; background:rgba(106,169,255,0.05); border-radius:4px;">
              Local preview: ${esc(previewText)}
            </div>
            
            <div style="display:flex; flex-direction:column; gap:6px; margin-top:4px;">
              <div style="display:flex; gap:6px;">
                <button class="workspace-link" style="flex:1; justify-content:center; color:var(--accent); border-color:var(--accent);" 
                        onclick="applyLocalResolutionResults(true, false)" ${localResolutionInFlight ? 'disabled' : ''}>
                  Apply Damage
                </button>
                <button class="workspace-link" style="flex:1; justify-content:center; color:var(--accent); border-color:var(--accent);" 
                        onclick="applyLocalResolutionResults(false, true)" ${localResolutionInFlight ? 'disabled' : ''}>
                  Apply Effects
                </button>
              </div>
              <button class="workspace-link" style="width:100%; justify-content:center; font-weight:bold; color:var(--heal); border-color:var(--heal);" 
                      onclick="applyLocalResolutionResults(true, true)" ${localResolutionInFlight ? 'disabled' : ''}>
                Apply Damage + Effects
              </button>
            </div>

            <div class="actor-meta" style="font-size:10px; opacity:0.8; font-style:italic; margin-top:4px; text-align:center;">
              Apply Results will mutate combat state.
            </div>
          </div>
        </div>
      `;
    }

    /**
     * Normalize the execute response data into a consistent local object.
     */
    function normalizeLocalExecutionResult(data) {
      const result = data?.result || {};
      const packet = result.resolution_packet || null;
      const resolution = result.resolution || null;
      const error = result.error || data?.detail || null;

      return {
        ok: !!data?.ok && !error,
        resolution,
        packet,
        error,
        deferredReason: (resolution === 'automatic' || resolution === 'assisted_sequence') ? resolution : null
      };
    }

    /**
     * Build safe escaped HTML for the resolution packet preview.
     */
    function renderLocalResolutionPacket(packet, resolution) {
      if (!packet) return '<div class="actor-meta">No structured packet details available yet.</div>';

      let html = '<div style="display:flex; flex-direction:column; gap:4px;">';

      const name = packet.capability_name || packet.name || 'Action';
      html += `<div style="font-weight:bold; color:var(--gold);">${esc(name)}</div>`;

      if (packet.save_dc && packet.save_ability) {
        html += `<div class="actor-meta">DC ${esc(packet.save_dc)} ${esc(String(packet.save_ability).toUpperCase())} Save</div>`;
      } else if (packet.save_dc) {
        html += `<div class="actor-meta">DC ${esc(packet.save_dc)} Save</div>`;
      }

      if (packet.attack_bonus !== undefined || packet.to_hit !== undefined) {
        const val = packet.attack_bonus ?? packet.to_hit;
        html += `<div class="actor-meta">Attack Bonus: ${val >= 0 ? '+' : ''}${esc(val)}</div>`;
      }

      if (packet.damage || packet.total_fail || packet.damage_formula) {
        const dmg = packet.damage ?? packet.total_fail;
        const formula = packet.damage_formula;
        html += `<div class="actor-meta">Damage: <strong>${esc(dmg || '?')}</strong> ${formula ? `(${esc(formula)})` : ''}</div>`;
      }

      if (packet.damage_rolls && Array.isArray(packet.damage_rolls) && packet.damage_rolls.length > 0) {
        html += `<div class="actor-meta" style="font-size:10px; opacity:0.8;">Rolls: ${packet.damage_rolls.join(', ')}</div>`;
      }

      if (packet.effects && Array.isArray(packet.effects) && packet.effects.length > 0) {
        html += `<div class="actor-meta">Effects: ${packet.effects.map(e => esc(e)).join(', ')}</div>`;
      }

      if (packet.conditions && Array.isArray(packet.conditions) && packet.conditions.length > 0) {
        html += `<div class="actor-meta">Conditions: ${packet.conditions.map(c => esc(c)).join(', ')}</div>`;
      }

      html += '</div>';

      // Debug details
      html += `
        <details style="margin-top:8px; font-size:10px; color:var(--muted); border-top:1px dashed var(--border); padding-top:4px;">
          <summary style="cursor:pointer; opacity:0.6;">Packet debug details</summary>
          <pre style="margin-top:4px; white-space:pre-wrap; background:rgba(0,0,0,0.2); padding:4px; border-radius:2px;">${esc(JSON.stringify(packet, null, 2))}</pre>
        </details>
      `;

      return html;
    }

    // Map state
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    let zoom = 40;
    let panX = 0;
    let panY = 0;
    let fittedToGrid = false;
    let lastGrid = {cols: 0, rows: 0};
    let dragging = null; // {cid, col, row, curCol, curRow, startX, startY}
    let isMoving = false; // Guard against duplicate moves

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      // Re-fit the grid view when the surface dimensions change so the map redraws cleanly.
      fittedToGrid = false;
      draw();
    }

    window.addEventListener('resize', resize);
    resize();

    // ── Resizable map / control split ─────────────────────────────
    const SPLIT_STORAGE_KEY = 'dmcontrol.controlBarHeightPx';
    const SPLIT_MIN_PX = 140;
    const SPLIT_MAX_PADDING = 200; // keep at least this much map height
    const splitHandle = document.getElementById('splitHandle');
    const controlBarEl = document.getElementById('controlBar');

    function clampControlHeight(px) {
      if (!Number.isFinite(px)) return 320;
      const h = window.innerHeight || 800;
      const max = Math.max(SPLIT_MIN_PX, h - SPLIT_MAX_PADDING);
      return Math.min(Math.max(px, SPLIT_MIN_PX), max);
    }

    function applyControlBarHeight(px, persist) {
      const target = clampControlHeight(px);
      controlBarEl.style.flex = `0 0 ${target}px`;
      if (persist) {
        try { localStorage.setItem(SPLIT_STORAGE_KEY, String(target)); } catch (e) {}
      }
      // Defer canvas resize until layout settles.
      requestAnimationFrame(resize);
    }

    function loadControlBarHeight() {
      let saved = null;
      try { saved = localStorage.getItem(SPLIT_STORAGE_KEY); } catch (e) {}
      const px = parseInt(saved, 10);
      if (!Number.isFinite(px)) {
        applyControlBarHeight(320, false);
      } else {
        applyControlBarHeight(px, false);
      }
    }
    loadControlBarHeight();

    let splitDrag = null;
    splitHandle.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      const rect = controlBarEl.getBoundingClientRect();
      splitDrag = { startY: e.clientY, startHeight: rect.height, pointerId: e.pointerId };
      splitHandle.classList.add('dragging');
      splitHandle.setPointerCapture(e.pointerId);
    });
    splitHandle.addEventListener('pointermove', (e) => {
      if (!splitDrag) return;
      const dy = e.clientY - splitDrag.startY;
      // Dragging handle down shrinks control bar (more map); dragging up grows it.
      applyControlBarHeight(splitDrag.startHeight - dy, false);
    });
    function endSplitDrag(e) {
      if (!splitDrag) return;
      try { splitHandle.releasePointerCapture(splitDrag.pointerId); } catch (err) {}
      splitHandle.classList.remove('dragging');
      const rect = controlBarEl.getBoundingClientRect();
      applyControlBarHeight(rect.height, true);
      splitDrag = null;
    }
    splitHandle.addEventListener('pointerup', endSplitDrag);
    splitHandle.addEventListener('pointercancel', endSplitDrag);
    splitHandle.addEventListener('dblclick', () => {
      // Reset to default split.
      applyControlBarHeight(320, true);
    });
    window.addEventListener('resize', () => {
      // Re-clamp on viewport changes so saved value can never push elements off-screen.
      const rect = controlBarEl.getBoundingClientRect();
      applyControlBarHeight(rect.height, false);
    });

    function screenToGrid(x, y) {
      return {
        col: Math.floor((x - panX) / zoom),
        row: Math.floor((y - panY) / zoom)
      };
    }

    /**
     * Hit-test screen coordinates against rendered tokens.
     * Prefers the active actor when multiple tokens overlap or when the click
     * is anywhere within the active token's visible radius.
     */
    function getTokenAtScreen(x, y) {
      if (!state || !state.tactical_map) return null;
      const units = state.tactical_map.units || [];
      const r = Math.max(10, zoom * 0.35);
      const activeCid = state.active_cid;

      // Pass 1: prefer active actor token.
      const activeUnit = units.find(u => u.pos && String(u.cid) === String(activeCid));
      if (activeUnit) {
        const tx = panX + activeUnit.pos.col * zoom + zoom / 2;
        const ty = panY + activeUnit.pos.row * zoom + zoom / 2;
        const d = Math.hypot(x - tx, y - ty);
        if (d <= r + 4) return activeUnit;
      }

      // Pass 2: any other token whose drawn circle contains (x, y).
      for (const u of units) {
        if (!u.pos) continue;
        const tx = panX + u.pos.col * zoom + zoom / 2;
        const ty = panY + u.pos.row * zoom + zoom / 2;
        const d = Math.hypot(x - tx, y - ty);
        if (d <= r) return u;
      }
      return null;
    }

    function showTransientStatus(msg, color) {
      const statusEl = document.getElementById('combatStatus');
      if (!statusEl) return;
      statusEl.textContent = msg;
      statusEl.style.color = color || 'var(--gold)';
      // Reset after a short delay so the round/turn label returns.
      clearTimeout(showTransientStatus._t);
      showTransientStatus._t = setTimeout(() => {
        if (state && state.in_combat) {
          statusEl.textContent = `Round ${state.round}, Turn ${state.turn}`;
          statusEl.style.color = 'var(--gold)';
        }
      }, 1800);
    }

    canvas.addEventListener('pointerdown', (e) => {
      if (!state || !state.tactical_map || isMoving) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      if (targetPreviewMode) {
        // In target mode the click selects a target token if it's a candidate.
        const hit = getTokenAtScreen(x, y);
        if (hit && isTargetCandidate(hit)) {
          selectPreviewTarget(hit.cid);
        } else {
          // Fallback to grid-cell lookup so clicking near a token still works.
          const { col, row } = screenToGrid(x, y);
          const cellUnit = findUnitAtGridCell(col, row);
          if (cellUnit && isTargetCandidate(cellUnit)) {
            selectPreviewTarget(cellUnit.cid);
          }
        }
        return; // Movement drag is intentionally blocked while targeting.
      }

      if (localResolutionTray) {
        showTransientStatus('Cancel resolution to move.', 'var(--danger)');
        return;
      }

      const activeCid = state.active_cid;
      const activeUnit = (state.tactical_map.units || []).find(u => String(u.cid) === String(activeCid));
      const actor = state.combatants.find(c => String(c.cid) === String(activeCid));

      if (!activeUnit || !activeUnit.pos || !actor || actor.is_pc) return;

      // Hit-test against the active token rather than requiring exact cell equality.
      const hit = getTokenAtScreen(x, y);
      const isActiveHit = hit && String(hit.cid) === String(activeCid);

      if (isActiveHit) {
        dragging = {
          cid: activeCid,
          col: activeUnit.pos.col,
          row: activeUnit.pos.row,
          curCol: activeUnit.pos.col,
          curRow: activeUnit.pos.row,
          startX: x,
          startY: y
        };
        canvas.setPointerCapture(e.pointerId);
        draw();
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const { col, row } = screenToGrid(x, y);

      if (col !== dragging.curCol || row !== dragging.curRow) {
        dragging.curCol = col;
        dragging.curRow = row;
        draw();
      }
    });

    canvas.addEventListener('pointerup', async (e) => {
      if (!dragging) return;
      const finalCol = dragging.curCol;
      const finalRow = dragging.curRow;
      const dragCid = dragging.cid;
      dragging = null;
      canvas.releasePointerCapture(e.pointerId);

      const activeUnit = (state.tactical_map.units || []).find(u => String(u.cid) === String(dragCid));
      if (activeUnit && (activeUnit.pos.col !== finalCol || activeUnit.pos.row !== finalRow)) {
        await executeMove(dragCid, finalCol, finalRow);
      } else {
        draw();
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (localResolutionTray) {
          closeLocalResolutionTray();
          e.preventDefault();
        } else if (targetPreviewMode) {
          cancelTargetPreviewMode();
          e.preventDefault();
        }
      }
    });

    async function executeMove(cid, col, row) {
      isMoving = true;
      renderError('Moving...');
      try {
        const resp = await fetch(`/api/dm/map/combatants/${cid}/move`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ col, row })
        });
        if (!resp.ok) {
          const errData = await resp.json();
          throw new Error(errData.detail || `HTTP ${resp.status}`);
        }
        await fetchState();
      } catch (err) {
        console.error('Move error:', err);
        renderError(err.message);
      } finally {
        isMoving = false;
        draw();
      }
    }

    async function fetchState() {
      try {
        const resp = await fetch(API_COMBAT);
        if (!resp.ok) {
          if (resp.status === 401) {
             renderError('Admin authentication required. Open DM Cockpit first.');
             return;
          }
          throw new Error(`HTTP ${resp.status}`);
        }
        const data = await resp.json();
        state = data;
        renderState(data);
        draw();
      } catch (err) {
        console.error('Fetch error:', err);
        renderError('Offline or server error');
      }
    }

    function renderError(msg) {
      const statusEl = document.getElementById('combatStatus');
      if (statusEl) {
        statusEl.textContent = msg;
        statusEl.style.color = 'var(--danger)';
      }
    }

    async function fetchCapabilitiesForActiveActor(actor) {
      if (!actor || actor.is_pc) {
        capabilitySummary = null;
        capabilityActorCid = null;
        selectedCapabilityId = null;
        localResolutionOutcomes = {};
        cancelTargetPreviewMode();
        renderActionPanel(actor, null);
        return;
      }

      if (String(capabilityActorCid) === String(actor.cid)) {
        // Already have it, just re-render in case local state (selection) changed
        renderActionPanel(actor, capabilitySummary);
        return;
      }

      try {
        const resp = await fetch(`/api/dm/monster-capabilities/${actor.cid}`);
        if (!resp.ok) {
          if (resp.status === 404) {
            capabilitySummary = { matched: false };
          } else {
            throw new Error(`HTTP ${resp.status}`);
          }
        } else {
          const payload = await resp.json();
          if (payload.ok && payload.summary) {
            capabilitySummary = payload.summary;
          } else {
            capabilitySummary = { matched: false };
          }
        }
        capabilityActorCid = actor.cid;
        selectedCapabilityId = null;
        localResolutionOutcomes = {};
        cancelTargetPreviewMode();
        renderActionPanel(actor, capabilitySummary);
      } catch (err) {
        console.error('Capabilities fetch error:', err);
        renderActionPanel(actor, null);
      }
    }

    function findCapabilityById(id) {
      if (!capabilitySummary || !capabilitySummary.groups) return null;
      for (const list of Object.values(capabilitySummary.groups)) {
        if (!Array.isArray(list)) continue;
        const found = list.find(a => String(a.id) === String(id));
        if (found) return found;
      }
      return null;
    }

    function isPreviewableTargetAction(cap) {
      if (!cap || cap.executable === false) return false;
      const type = (cap.action_type || "").toLowerCase();
      if (type.includes("attack") || type.includes("melee") || type.includes("ranged")) return true;
      const mode = (cap.target_mode || "").toLowerCase();
      if (mode.includes("creature") || mode.includes("target")) return true;
      return false;
    }

    function enterTargetPreviewMode(cap) {
      if (!cap || !state) return;
      selectedTargetCid = null;
      localResolutionTray = null;
      targetPreviewMode = {
        capabilityId: cap.id,
        capabilityName: cap.name,
        actorCid: state.active_cid,
        actionType: cap.action_type
      };
      draw();
    }

    function cancelTargetPreviewMode() {
      if (!targetPreviewMode) return;
      targetPreviewMode = null;
      selectedTargetCid = null;
      localResolutionTray = null;
      localResolutionPacket = null;
      localResolutionError = null;
      localResolutionInFlight = false;
      localResolutionOutcomes = {};
      draw();
      const actor = (state?.combatants || []).find(c => String(c.cid) === String(state?.active_cid));
      renderActionPanel(actor, capabilitySummary);
    }

    function openLocalResolutionTray(actorCid, capabilityId, targetCid) {
      localResolutionTray = {
        actorCid,
        capabilityId,
        targetCid,
        openedAt: Date.now()
      };
      localResolutionPacket = null;
      localResolutionError = null;
      localResolutionInFlight = false;
      // Reset outcome for this target specifically when opening the tray
      localResolutionOutcomes[String(targetCid)] = 'fail';
      draw();
      const actor = (state?.combatants || []).find(c => String(c.cid) === String(state?.active_cid));
      renderActionPanel(actor, capabilitySummary);
    }

    function closeLocalResolutionTray() {
      localResolutionTray = null;
      selectedTargetCid = null; // Clear target selection when closing tray to allow re-selection
      localResolutionPacket = null;
      localResolutionError = null;
      localResolutionInFlight = false;
      localResolutionOutcomes = {};
      draw();
      const actor = (state?.combatants || []).find(c => String(c.cid) === String(state?.active_cid));
      renderActionPanel(actor, capabilitySummary);
    }

    async function prepareLocalResolutionPreview() {
      if (!localResolutionTray || localResolutionInFlight || !state) return;

      const actorCid = localResolutionTray.actorCid;
      const targetCid = localResolutionTray.targetCid;
      localResolutionInFlight = true;
      localResolutionError = null;
      localResolutionPacket = null;
      localResolutionOutcomes[String(targetCid)] = 'fail';

      const actor = (state?.combatants || []).find(c => String(c.cid) === String(state?.active_cid));
      renderActionPanel(actor, capabilitySummary);

      try {
        const resp = await fetch(`/api/dm/monster-capabilities/${actorCid}/execute`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            capability_id: localResolutionTray.capabilityId,
            target_cid: localResolutionTray.targetCid,
            spend: "none",
            roll_mode: "normal"
          })
        });

        const rawData = await resp.json();
        const data = normalizeLocalExecutionResult(rawData);

        if (!data.ok) {
          throw new Error(data.error || `HTTP ${resp.status}`);
        }

        if (data.deferredReason === 'automatic') {
          localResolutionError = "Automatic resolution is deferred on /dmcontrol. Manual fallback: apply this result in /dm.";
        } else if (data.deferredReason === 'assisted_sequence') {
          localSequencePacket = rawData.result;
          localSequenceCompletedSteps = {};
          localResolutionPacket = null;
          localResolutionTray = null; // Close the immediate tray to show sequence tray
        } else if (data.packet) {
          localResolutionPacket = data.packet;
        } else {
          localResolutionError = "No structured packet details available yet. Manual fallback: apply result in /dm.";
        }

        if (rawData.snapshot) {
           state = rawData.snapshot;
           draw();
        }
      } catch (err) {
        console.error('Execution preview error:', err);
        localResolutionError = err.message;
      } finally {
        localResolutionInFlight = false;
        renderActionPanel(actor, capabilitySummary);
      }
    }

    async function applyLocalResolutionResults(applyDamage, applyEffects) {
      if (!localResolutionTray || !localResolutionPacket || localResolutionInFlight || !state) return;

      const actorCid = localResolutionTray.actorCid;
      const capId = localResolutionTray.capabilityId;
      const targetCid = localResolutionTray.targetCid;
      const outcome = getLocalResolutionOutcome(targetCid);

      localResolutionInFlight = true;
      localResolutionError = null;
      const actor = (state?.combatants || []).find(c => String(c.cid) === String(state?.active_cid));
      renderActionPanel(actor, capabilitySummary);

      try {
        const resp = await fetch(`/api/dm/monster-capabilities/${actorCid}/resolve-targets`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            capability_id: capId,
            targets: [{ target_cid: String(targetCid), outcome: outcome }],
            damage_rolls: localResolutionPacket.damage_rolls || [],
            apply_damage: !!applyDamage,
            apply_effects: !!applyEffects
          })
        });

        const data = await resp.json();
        if (!resp.ok || !data.ok) {
          throw new Error(data.detail || (data.result && data.result.error) || 'Resolution failed.');
        }

        // On success, clear local state and apply snapshot
        if (data.snapshot) {
           state = data.snapshot;
        }
        
        // Compact success feedback via status bar before closing
        renderError('Results applied successfully.');
        setTimeout(() => { if (state) renderState(state); }, 2000);

        // If in sequence, increment completion
        if (localSequencePacket) {
          localSequenceCompletedSteps[String(capId)] = (localSequenceCompletedSteps[String(capId)] || 0) + 1;
        }

        closeLocalResolutionTray();
        renderActionPanel(actor, capabilitySummary);
        draw();
      } catch (err) {
        console.error('Apply results error:', err);
        localResolutionError = err.message;
        renderActionPanel(actor, capabilitySummary);
      } finally {
        localResolutionInFlight = false;
      }
    }

    function selectLocalSequenceStep(stepActionId) {
      const cap = findCapabilityById(stepActionId);
      if (!cap) return;
      selectedCapabilityId = stepActionId;
      enterTargetPreviewMode(cap);
      const actor = (state?.combatants || []).find(c => String(c.cid) === String(state?.active_cid));
      renderActionPanel(actor, capabilitySummary);
    }

    function cancelLocalSequence() {
      localSequencePacket = null;
      localSequenceCompletedSteps = {};
      cancelTargetPreviewMode();
    }

    function getLocalResolutionContext() {
      if (!localResolutionTray || !state) return null;
      const actor = findCombatantByCid(localResolutionTray.actorCid);
      const cap = findCapabilityById(localResolutionTray.capabilityId);
      const target = findCombatantByCid(localResolutionTray.targetCid);
      const advisory = getSelectedTargetAdvisory(cap, localResolutionTray.targetCid);
      return { actor, cap, target, advisory };
    }

    function findUnitAtGridCell(col, row) {
      if (!state || !state.tactical_map || !state.tactical_map.units) return null;
      return state.tactical_map.units.find(u => u.pos && u.pos.col === col && u.pos.row === row);
    }

    function findCombatantByCid(cid) {
      if (!state || !state.combatants) return null;
      return state.combatants.find(c => String(c.cid) === String(cid));
    }

    function isTargetCandidate(unit) {
      if (!targetPreviewMode || !unit || !unit.cid) return false;
      // Cannot target the active actor
      if (String(unit.cid) === String(targetPreviewMode.actorCid)) return false;
      return true;
    }

    function selectPreviewTarget(cid) {
      selectedTargetCid = String(cid);
      openLocalResolutionTray(state.active_cid, targetPreviewMode.capabilityId, selectedTargetCid);
    }

    function getSelectedTargetAdvisory(cap, targetCid) {
      if (!cap || !targetCid || !state || !state.tactical_map) {
        return { status: 'unknown', label: 'DM adjudication needed', distanceFt: null, limitFt: null };
      }

      const activeUnit = (state.tactical_map.units || []).find(u => String(u.cid) === String(state.active_cid));
      const targetUnit = (state.tactical_map.units || []).find(u => String(u.cid) === String(targetCid));

      if (!activeUnit || !activeUnit.pos || !targetUnit || !targetUnit.pos) {
        return { status: 'unknown', label: 'Position unknown', distanceFt: null, limitFt: null };
      }

      const feetPerSquare = state.tactical_map.grid?.feet_per_square || 5;
      const dx = Math.abs(activeUnit.pos.col - targetUnit.pos.col);
      const dy = Math.abs(activeUnit.pos.row - targetUnit.pos.row);
      const distanceFt = Math.max(dx, dy) * feetPerSquare;

      // Extract range/reach
      let limitFt = null;
      const actionType = (cap.action_type || "").toLowerCase();

      if (cap.reach_ft !== undefined && cap.reach_ft !== null) limitFt = cap.reach_ft;
      else if (cap.range_ft !== undefined && cap.range_ft !== null) limitFt = cap.range_ft;
      else if (cap.range_normal_ft !== undefined && cap.range_normal_ft !== null) limitFt = cap.range_normal_ft;
      else if (cap.reach !== undefined && cap.reach !== null) limitFt = parseInt(cap.reach);
      else if (cap.range !== undefined && cap.range !== null) limitFt = parseInt(cap.range);
      else if (actionType.includes("melee")) limitFt = 5;

      if (limitFt === null || isNaN(limitFt)) {
        return { status: 'unknown', label: 'Range unknown — DM adjudication needed', distanceFt, limitFt: null };
      }

      if (distanceFt <= limitFt) {
        return { status: 'likely-in-range', label: 'Likely in range', distanceFt, limitFt };
      } else {
        return { status: 'likely-out-of-range', label: 'Likely out of range', distanceFt, limitFt };
      }
    }

    function renderActionPanel(actor, summary) {
      const panel = document.getElementById('activeActionsPanel');
      if (!panel) return;
      // Keep the mode banner in sync with current local state on every render.
      updateModeBanner();

      if (!state || !state.in_combat || !actor) {
        panel.innerHTML = '<div class="status-idle">No active monster/NPC actions.</div>';
        return;
      }

      if (actor.is_pc) {
        panel.innerHTML = '<div class="status-idle">Actions disabled: waiting for player action.</div>';
        return;
      }

      if (!summary) {
        panel.innerHTML = '<div class="status-idle">Loading actions...</div>';
        return;
      }

      if (summary.matched === false) {
        panel.innerHTML = '<div class="status-idle">No structured actions available yet; use /dm reference or Legacy toolbox if needed.</div>';
        return;
      }

      // Render grouped actions
      let html = '';
      const groups = summary.groups || {};

      // Hardening: verify selected capability still exists
      if (selectedCapabilityId && !findCapabilityById(selectedCapabilityId)) {
        selectedCapabilityId = null;
        cancelTargetPreviewMode();
      }

      // Selection summary
      if (selectedCapabilityId) {
        const selected = findCapabilityById(selectedCapabilityId);

        if (selected) {
          const isPreviewActive = targetPreviewMode && String(targetPreviewMode.capabilityId) === String(selected.id);
          let summaryHtml = `
            <div class="selected-summary">
              <h4>${esc(selected.name)} Selected</h4>
              <p>${esc(selected.description || selected.desc || 'No description available.')}</p>
              ${selected.manual_instructions ? `
                <div style="margin-top:8px; border:1px solid var(--gold); background:rgba(214,186,126,0.1); padding:8px; border-radius:4px; font-size:12px; color:var(--gold)">
                  <strong>Manual Instructions:</strong> ${esc(selected.manual_instructions)}
                </div>
              ` : ''}
          `;

          // Sequence Tray Integration
          if (localSequencePacket && (String(localSequencePacket.capability_id) === String(selected.id) || localSequencePacket.steps.some(s => String(s.action_id) === String(selected.id)))) {
            summaryHtml += `
              <div style="margin-top:12px; border:1px solid var(--accent); background:rgba(106,169,255,0.05); padding:8px; border-radius:4px">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; border-bottom:1px solid rgba(106,169,255,0.2); padding-bottom:4px">
                  <h5 style="color:var(--accent); margin:0; font-size:12px">Sequence: ${esc(localSequencePacket.name)}</h5>
                  <button class="workspace-link" onclick="cancelLocalSequence()" style="font-size:10px; padding:2px 6px; color:var(--danger); border-color:var(--danger)">End</button>
                </div>
                <div style="display:flex; flex-direction:column; gap:6px">
                  ${localSequencePacket.steps.map(step => {
                    const completed = localSequenceCompletedSteps[String(step.action_id)] || 0;
                    const isDone = completed >= step.count;
                    const isStepSelected = String(selectedCapabilityId) === String(step.action_id);
                    return `
                      <div style="display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.03); padding:4px 8px; border-radius:4px; border-left: 3px solid ${isDone ? 'var(--heal)' : (isStepSelected ? 'var(--accent)' : 'var(--muted)')}">
                        <div style="flex:1; font-size:11px">
                          <div style="font-weight:bold">${esc(step.name)}</div>
                          <div style="font-size:10px; color:var(--muted)">${completed} / ${step.count} completed</div>
                        </div>
                        ${!isDone ? `
                          <button class="workspace-link" style="font-size:10px; padding:2px 6px; ${isStepSelected ? 'background:var(--accent); color:var(--bg)' : ''}" 
                                  onclick="selectLocalSequenceStep('${esc(step.action_id)}')" ${localResolutionInFlight ? 'disabled' : ''}>
                            ${isStepSelected ? 'Active' : 'Select'}
                          </button>
                        ` : '<div style="font-size:9px; color:var(--heal); font-weight:bold; text-transform:uppercase">Done</div>'}
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>
            `;
          }

          if (localResolutionTray && String(localResolutionTray.capabilityId) === String(selected.id)) {
            const ctx = getLocalResolutionContext();
            summaryHtml += `
              <div style="margin-top:12px; border-top:1px solid rgba(214,186,126,0.3); padding-top:8px;">
                <div style="font-size:12px; color:var(--gold); margin-bottom:4px; text-transform:uppercase; font-weight:bold;">Resolution Preview</div>
                <div class="actor-meta" style="color:var(--text); font-size:12px;">
                  Actor: <strong>${esc(ctx.actor ? ctx.actor.name : 'Unknown')}</strong><br>
                  Action: <strong>${esc(ctx.cap ? ctx.cap.name : 'Unknown')}</strong><br>
                  Target: <strong>${esc(ctx.target ? ctx.target.name : 'Unknown')}</strong>
                </div>
                <div class="actor-meta" style="margin-top:4px;">
                  Distance: ${ctx.advisory.distanceFt !== null ? ctx.advisory.distanceFt + ' ft' : 'Unknown'} •
                  <span style="color:${ctx.advisory.status === 'likely-in-range' ? 'var(--heal)' : (ctx.advisory.status === 'likely-out-of-range' ? 'var(--danger)' : 'var(--gold)')}">
                    ${esc(ctx.advisory.label)}
                  </span>
                </div>

                ${localResolutionError ? `
                  <div class="actor-meta" style="margin-top:8px; color:var(--danger); font-weight:bold; border:1px solid var(--danger); padding:4px; border-radius:4px">
                    Error: ${esc(localResolutionError)}
                  </div>
                ` : ''}

                ${localResolutionPacket || (!localResolutionPacket && !localResolutionError && !localResolutionInFlight && localResolutionTray?.openedAt) ? `
                  <div style="margin-top:8px; background:rgba(255,255,255,0.03); padding:8px; border-radius:4px; border:1px solid var(--gold)">
                    <div style="font-size:11px; color:var(--gold); margin-bottom:4px; font-weight:bold; text-transform:uppercase">Backend packet preview</div>
                    ${renderLocalResolutionPacket(localResolutionPacket)}
                    ${localResolutionPacket ? `
                      ${renderLocalOutcomeControls(localResolutionPacket, localResolutionTray.targetCid)}
                    ` : `
                      <p style="margin-top:8px; font-size:11px; color:var(--heal); font-weight:bold;">
                        Preview only. Results are not applied.
                      </p>
                      <p style="font-size:10px; color:var(--muted); opacity:0.8;">
                        No combat state will be changed from this preview (uses spend: "none").
                      </p>
                    `}
                  </div>
                ` : ''}

                ${!localResolutionPacket && !localResolutionError ? `
                  <div style="margin-top:12px;">
                    <button class="workspace-link" onclick="prepareLocalResolutionPreview()"
                            ${localResolutionInFlight ? 'disabled' : ''}
                            style="width:100%; justify-content:center; padding:8px; font-weight:bold; border-color:var(--accent); color:var(--accent)">
                      ${localResolutionInFlight ? 'Preparing...' : 'Prepare Resolution Preview'}
                    </button>
                  </div>
                ` : ''}

                <div style="margin-top:12px; display:flex; gap:8px;">
                  <button class="workspace-link" onclick="closeLocalResolutionTray()" style="padding:4px 8px;">Back to target selection</button>
                  <button class="workspace-link" onclick="cancelTargetPreviewMode()" style="padding:4px 8px; color:var(--danger); border-color:var(--danger);">Cancel preview</button>
                </div>
              </div>
            `;
          } else if (isPreviewActive) {
            if (!selectedTargetCid) {
              summaryHtml += `
                <div class="actor-meta" style="margin-top:8px; color:var(--accent); font-weight:bold;">
                  Click a highlighted target token. Press Escape to cancel.
                </div>
              `;
            } else {
              const target = findCombatantByCid(selectedTargetCid);
              const advisory = getSelectedTargetAdvisory(selected, selectedTargetCid);
              summaryHtml += `
                <div class="actor-meta" style="margin-top:8px; color:var(--accent); font-weight:bold;">
                  Target: ${esc(target ? target.name : 'Unknown')} (Selected Locally)
                </div>
                <div class="actor-meta" style="margin-top:4px;">
                  Distance: ${advisory.distanceFt !== null ? advisory.distanceFt + ' ft' : 'Unknown'} •
                  <span style="color:${advisory.status === 'likely-in-range' ? 'var(--heal)' : (advisory.status === 'likely-out-of-range' ? 'var(--danger)' : 'var(--gold)')}">
                    ${esc(advisory.label)}
                  </span>
                </div>
                <div class="actor-meta" style="margin-top:4px; font-style:italic;">
                  Resolution is deferred. Advisory only; DM adjudication needed.
                </div>
              `;
            }
          } else {
            const isManual = selected.executable === false;
            const previewable = isPreviewableTargetAction(selected);
            if (isManual) {
              summaryHtml += `
                <div class="actor-meta" style="margin-top:6px; color:var(--gold); font-weight:bold;">
                  Manual Assist — DM resolves this action by hand.
                </div>
                <div class="actor-meta" style="margin-top:4px; font-size:11px; opacity:0.85;">
                  No target click and no Apply button. Use the manual instructions above (or /dm) to adjudicate the result.
                </div>
              `;
            } else if (previewable) {
              summaryHtml += `
                <div class="actor-meta" style="margin-top:6px; color:var(--accent); font-weight:bold;">
                  Targeting mode active — click an enemy token on the map.
                </div>
              `;
            } else {
              summaryHtml += `
                <div class="actor-meta" style="margin-top:4px; font-style:italic;">
                  Targeting and execution are deferred in this pass.
                </div>
              `;
            }
          }

          summaryHtml += `</div>`;
          html += summaryHtml;
        }
      }

      const groupConfig = [
        { key: 'actions', label: 'Actions' },
        { key: 'bonus_actions', label: 'Bonus Actions' },
        { key: 'reactions', label: 'Reactions' },
        { key: 'legendary_actions', label: 'Legendary Actions' },
        { key: 'lair_actions', label: 'Lair Actions' },
        { key: 'traits', label: 'Traits' },
        { key: 'special', label: 'Special' }
      ];

      // Render Actions/Bonus/Reactions/Legendary first as the prominent groups; collapse traits behind a <details>.
      const primaryKeys = new Set(['actions', 'bonus_actions', 'reactions', 'legendary_actions']);
      const collapsedKeys = new Set(['traits', 'lair_actions', 'special']);

      const renderItem = (item, conf) => {
        const isSelected = String(item.id) === String(selectedCapabilityId);
        const isTrait = conf.key === 'traits' || conf.key === 'lair_actions';
        const isExecutable = item.executable !== false && !isTrait;
        const badges = [];
        // Highlight primary classification first.
        if (isExecutable) {
          badges.push({ text: 'Attack', cls: 'exec' });
        } else if (isTrait) {
          badges.push({ text: 'Reminder', cls: 'manual-tag' });
        } else {
          badges.push({ text: 'Manual Assist', cls: 'manual-tag' });
        }
        if (item.action_type) badges.push({ text: item.action_type, cls: '' });
        if (item.target_mode) badges.push({ text: item.target_mode, cls: '' });
        if (item.recharge_rule) badges.push({ text: item.recharge_rule, cls: '' });
        if (item.uses_remaining !== undefined && item.uses_total !== undefined) {
          badges.push({ text: `${item.uses_remaining}/${item.uses_total} Uses`, cls: '' });
        }

        const cardCls = ['action-card'];
        if (isSelected) cardCls.push('selected');
        if (isTrait) cardCls.push('trait');
        if (!isExecutable && !isTrait) cardCls.push('manual');
        if (isExecutable) cardCls.push('executable');

        const badgeHtml = badges.map(b => `<span class="card-badge ${b.cls}">${esc(b.text)}</span>`).join('');

        return `
          <div class="${cardCls.join(' ')}" onclick="selectCapability('${esc(item.id)}')">
            <div class="card-header">
              <span class="card-name">${esc(item.name)}</span>
              <span class="card-badges">${badgeHtml}</span>
            </div>
            ${item.mechanics_summary ? `<div class="card-meta">${esc(item.mechanics_summary)}</div>` : ''}
          </div>
        `;
      };

      // Pass 1: prominent groups.
      groupConfig.forEach(conf => {
        if (!primaryKeys.has(conf.key)) return;
        const items = groups[conf.key];
        if (!items || items.length === 0) return;
        html += `<div class="action-group">`;
        html += `<div class="group-label">${esc(conf.label)}</div>`;
        html += `<div class="action-grid">`;
        items.forEach(item => { html += renderItem(item, conf); });
        html += `</div></div>`;
      });

      // Pass 2: collapsed/secondary groups under a single <details> so the active cockpit stays compact.
      const secondaryItems = [];
      groupConfig.forEach(conf => {
        if (!collapsedKeys.has(conf.key)) return;
        const items = groups[conf.key];
        if (!items || items.length === 0) return;
        secondaryItems.push({ conf, items });
      });
      if (secondaryItems.length) {
        const total = secondaryItems.reduce((n, g) => n + g.items.length, 0);
        html += `<details class="action-group secondary-group" style="margin-top:6px;">`;
        html += `<summary style="font-size:11px; color:var(--muted); cursor:pointer; padding:4px 0; text-transform:uppercase; letter-spacing:0.05em;">Traits & Reminders (${total})</summary>`;
        secondaryItems.forEach(({ conf, items }) => {
          html += `<div class="action-group" style="margin-top:6px;">`;
          html += `<div class="group-label">${esc(conf.label)}</div>`;
          html += `<div class="action-grid">`;
          items.forEach(item => { html += renderItem(item, conf); });
          html += `</div></div>`;
        });
        html += `</details>`;
      }

      panel.innerHTML = html || '<div class="status-idle">No actions found for this creature.</div>';
    }

    function selectCapability(id) {
      const alreadySelected = String(selectedCapabilityId) === String(id);
      
      // Clear sequence if we select something NOT in the sequence
      if (localSequencePacket && String(id) !== String(localSequencePacket.capability_id)) {
        const isChild = localSequencePacket.steps.some(s => String(s.action_id) === String(id));
        if (!isChild) {
          localSequencePacket = null;
          localSequenceCompletedSteps = {};
        }
      }

      selectedCapabilityId = alreadySelected ? null : id;

      // Clear local resolution state on any capability change
      localResolutionTray = null;
      localResolutionPacket = null;
      localResolutionError = null;
      localResolutionInFlight = false;
      localResolutionOutcomes = {};

      const cap = findCapabilityById(id);
      if (!alreadySelected && isPreviewableTargetAction(cap)) {
        enterTargetPreviewMode(cap);
      } else {
        cancelTargetPreviewMode();
      }

      const actor = (state.combatants || []).find(c => String(c.cid) === String(state.active_cid));
      renderActionPanel(actor, capabilitySummary);
    }

    function renderState(data) {
      const statusEl = document.getElementById('combatStatus');
      const actorPanel = document.getElementById('activeActorPanel');
      const overlay = document.getElementById('statusOverlay');

      if (!data.in_combat) {
        statusEl.textContent = 'Out of Combat';
        statusEl.style.color = 'var(--muted)';
        actorPanel.innerHTML = '<div class="status-idle">No active combat</div>';
        overlay.style.display = 'none';
        fullResetLocalState();
        lastActiveCid = null;
        fetchCapabilitiesForActiveActor(null);
        updateModeBanner();
        return;
      }

      statusEl.textContent = `Round ${data.round}, Turn ${data.turn}`;
      statusEl.style.color = 'var(--gold)';

      const activeCid = data.active_cid;

      // Hardening: If active actor changes, clear all local state
      if (lastActiveCid !== null && String(lastActiveCid) !== String(activeCid)) {
        fullResetLocalState();
      }
      lastActiveCid = activeCid;

      // Hardening: If selected target no longer exists, clear it
      if (selectedTargetCid && !findCombatantByCid(selectedTargetCid)) {
        selectedTargetCid = null;
        localResolutionTray = null;
        localResolutionPacket = null;
        localResolutionError = null;
        localResolutionOutcomes = {};
      }

      const actor = data.combatants.find(c => String(c.cid) === String(activeCid));

      if (!actor) {
        actorPanel.innerHTML = '<div class="status-idle">No active actor focus</div>';
        overlay.style.display = 'none';
        fetchCapabilitiesForActiveActor(null);
        return;
      }

      const isMonster = !actor.is_pc;
      const units = data.tactical_map?.units || [];
      const unit = units.find(u => String(u.cid) === String(activeCid));
      const moveRemaining = unit ? (unit.move_remaining ?? unit.speed ?? 0) : 0;

      if (isMonster) {
        const conditions = (actor.conditions && actor.conditions.length) ? actor.conditions.join(', ') : 'None';
        actorPanel.innerHTML = `
          <div class="actor-info">
            <span class="actor-name">${esc(actor.name)}</span>
            <span class="actor-meta">${esc(actor.role || actor.type || 'Monster/NPC')}</span>
          </div>
          <div class="actor-stat-row">
            <span class="stat-pill"><strong>HP</strong> ${esc(actor.hp)}/${esc(actor.max_hp)}</span>
            <span class="stat-pill"><strong>AC</strong> ${esc(actor.ac || '—')}</span>
            <span class="stat-pill" title="Movement Remaining"><strong>Movement Remaining</strong> ${esc(moveRemaining)} / ${esc(actor.speed || '—')} ft</span>
            <span class="stat-pill"><strong>Conditions</strong> ${esc(conditions)}</span>
          </div>
        `;
        overlay.textContent = `Focus: ${actor.name} (Active)`;
        overlay.style.display = 'block';
        overlay.style.borderColor = 'var(--danger)';
      } else {
        actorPanel.innerHTML = `
          <div class="actor-info">
            <span class="actor-name">${esc(actor.name)}</span>
            <span class="actor-meta">Player Character • Turn in progress</span>
          </div>
          <div class="status-idle">Waiting for player action...</div>
        `;
        overlay.textContent = `Focus: ${actor.name} (PC Turn)`;
        overlay.style.display = 'block';
        overlay.style.borderColor = 'var(--accent)';
      }

      fetchCapabilitiesForActiveActor(actor);
      updateModeBanner();
    }

    function gridToScreen(col, row) {
      return { x: panX + col * zoom + zoom / 2, y: panY + row * zoom + zoom / 2 };
    }

    // --- Movement Range Helpers (Ported from LAN) ---

    function cellKey(col, row) {
      return `${Math.trunc(col)},${Math.trunc(row)}`;
    }

    function normalizeMovementMode(value) {
      const v = String(value || "").toLowerCase();
      if (v === "fly" || v === "swim" || v === "climb") return v;
      return "normal";
    }

    function getRoughTerrainMap() {
      const map = new Map();
      if (!state || !state.tactical_map || !Array.isArray(state.tactical_map.rough_terrain)) return map;
      state.tactical_map.rough_terrain.forEach(cell => {
        if (!cell) return;
        map.set(cellKey(cell.col, cell.row), cell);
      });
      return map;
    }

    function getObstacleSet() {
      const set = new Set();
      if (!state || !state.tactical_map || !Array.isArray(state.tactical_map.obstacles)) return set;
      state.tactical_map.obstacles.forEach(o => {
        if (!o) return;
        set.add(cellKey(o.col, o.row));
      });
      return set;
    }

    function entityCellsForEntry(entry) {
      if (!entry || typeof entry !== "object") return [];
      if (Array.isArray(entry.cells)) return entry.cells;
      const col = Number(entry.col);
      const row = Number(entry.row);
      if (Number.isFinite(col) && Number.isFinite(row)) return [{col, row}];
      return [];
    }

    function movementCostMap(startCol, startRow, maxFt, unit, roughMap, obstacles, features, hazards, structures, elevationCells, cols, rows, feetPerSquare) {
      const step = Number(feetPerSquare) || 5;
      const diag5 = step;
      const diag10 = step * 2;
      const mode = normalizeMovementMode(unit?.movement_mode);
      const landSpeed = Math.max(0, Number(unit?.speed || 0));
      let swimSpeed = Math.max(0, Number(unit?.swim_speed || 0));
      if (swimSpeed <= 0) swimSpeed = Math.max(1, Math.floor(landSpeed / 2));

      const blockedCells = new Set();
      const hazardMultiplierByCell = new Map();

      const addEntityCells = (entry, callback) => {
        if (!entry || typeof entry !== "object") return;
        const payload = (entry.payload && typeof entry.payload === "object") ? entry.payload : {};
        const cells = entityCellsForEntry(entry);
        cells.forEach(cell => callback(Math.trunc(cell.col), Math.trunc(row), payload));
      };

      (features || []).forEach(f => addEntityCells(f, (c, r, p) => { if (p.blocks_movement) blockedCells.add(cellKey(c, r)); }));
      (structures || []).forEach(s => addEntityCells(s, (c, r, p) => { if (p.blocks_movement !== false) blockedCells.add(cellKey(c, r)); }));
      (hazards || []).forEach(h => addEntityCells(h, (c, r, p) => {
        if (p.blocks_movement) blockedCells.add(cellKey(c, r));
        const mult = Number(p.movement_multiplier ?? 1);
        if (Number.isFinite(mult) && mult > 0 && mult !== 1) {
          const key = cellKey(c, r);
          hazardMultiplierByCell.set(key, (hazardMultiplierByCell.get(key) || 1) * mult);
        }
      }));

      function inBounds(c, r) { return c >= 0 && r >= 0 && c < cols && r < rows; }

      // Dijkstra logic simplified for this pass
      const results = new Map();
      results.set(cellKey(startCol, startRow), 0);

      const queue = [{col: startCol, row: startRow, cost: 0, parity: 0}];
      while(queue.length > 0) {
          const current = queue.shift();
          if (current.cost > maxFt) continue;

          for(let dc = -1; dc <= 1; dc++) {
              for(let dr = -1; dr <= 1; dr++) {
                  if (dc === 0 && dr === 0) continue;
                  const nc = current.col + dc;
                  const nr = current.row + dr;
                  if (!inBounds(nc, nr)) continue;
                  const key = cellKey(nc, nr);
                  if (obstacles.has(key) || blockedCells.has(key)) continue;

                  const isDiag = dc !== 0 && dr !== 0;
                  let moveCost = step;
                  let nextParity = current.parity;
                  if (isDiag) {
                      nextParity = (current.parity + 1) % 2;
                      moveCost = (nextParity === 0) ? diag10 : diag5;
                  }

                  const rough = roughMap.get(key);
                  if (rough && rough.is_rough) moveCost *= 2;
                  const hazardMult = hazardMultiplierByCell.get(key) || 1;
                  moveCost *= hazardMult;

                  const nextCost = current.cost + moveCost;
                  if (nextCost <= maxFt) {
                      if (!results.has(key) || results.get(key) > nextCost) {
                          results.set(key, nextCost);
                          queue.push({col: nc, row: nr, cost: nextCost, parity: nextParity});
                      }
                  }
              }
          }
      }
      return results;
    }

    // --- End Movement Range Helpers ---

    function draw() {
      if (!state || !state.tactical_map) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
      }

      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      ctx.clearRect(0, 0, w, h);

      // Background
      ctx.fillStyle = "#0a0c12";
      ctx.fillRect(0, 0, w, h);

      const grid = state.tactical_map.grid;
      if (!grid || !grid.cols || !grid.rows) return;

      const cols = grid.cols;
      const rows = grid.rows;

      if (cols !== lastGrid.cols || rows !== lastGrid.rows) {
        fittedToGrid = false;
        lastGrid = { cols, rows };
      }

      // Auto-fit on first draw
      if (!fittedToGrid) {
        const pad = 24;
        const sx = (w - pad * 2) / (cols * zoom);
        const sy = (h - pad * 2) / (rows * zoom);
        const s = Math.min(1.0, Math.max(0.35, Math.min(sx, sy)));
        zoom = Math.floor(zoom * s);
        panX = Math.floor((w - cols * zoom) / 2);
        panY = Math.floor((h - rows * zoom) / 2);
        fittedToGrid = true;
      }

      // Grid lines
      ctx.strokeStyle = "rgba(255,255,255,0.07)";
      ctx.lineWidth = 1;
      for (let c = 0; c <= cols; c++) {
        const x = panX + c * zoom;
        ctx.beginPath(); ctx.moveTo(x, panY); ctx.lineTo(x, panY + rows * zoom); ctx.stroke();
      }
      for (let r = 0; r <= rows; r++) {
        const y = panY + r * zoom;
        ctx.beginPath(); ctx.moveTo(panX, y); ctx.lineTo(panX + cols * zoom, y); ctx.stroke();
      }

      const units = state.tactical_map.units || [];
      const activeCid = state.active_cid;
      const activeUnit = units.find(u => String(u.cid) === String(activeCid));

      let currentCostMap = null;

      // Movement Range Visualization
      if (activeUnit && activeUnit.pos) {
        const actor = state.combatants.find(c => String(c.cid) === String(activeCid));
        const isMonster = actor && !actor.is_pc;

        if (isMonster && !targetPreviewMode) {
          const feetPerSquare = grid.feet_per_square || 5;
          const moveRemaining = activeUnit.move_remaining ?? activeUnit.speed ?? 0;

          if (moveRemaining > 0) {
            currentCostMap = movementCostMap(
              activeUnit.pos.col, activeUnit.pos.row,
              moveRemaining, activeUnit,
              getRoughTerrainMap(), getObstacleSet(),
              state.tactical_map.features, state.tactical_map.hazards,
              state.tactical_map.structures, state.tactical_map.elevation_cells,
              cols, rows, feetPerSquare
            );

            currentCostMap.forEach((cost, key) => {
              const [col, row] = key.split(",").map(Number);
              const x = panX + col * zoom;
              const y = panY + row * zoom;
              ctx.fillStyle = "rgba(106,169,255,0.18)";
              ctx.fillRect(x + 1, y + 1, zoom - 2, zoom - 2);
            });
          }
        }
      }

      // Render tokens
      units.forEach(u => {
        if (!u.pos) return;
        const { x, y } = gridToScreen(u.pos.col, u.pos.row);
        const r = Math.max(10, zoom * 0.35);
        const active = (activeCid !== null && String(activeCid) === String(u.cid));

        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);

        if (u.role === "enemy") {
          ctx.fillStyle = "rgba(255,91,91,0.28)";
        } else if (u.role === "pc") {
          ctx.fillStyle = "rgba(106,255,176,0.18)";
        } else {
          ctx.fillStyle = "rgba(255,255,255,0.15)";
        }
        ctx.fill();

        ctx.lineWidth = active ? 3 : 2;
        ctx.strokeStyle = active ? "rgba(255,255,255,0.85)" : "rgba(255,255,255,0.25)";
        ctx.stroke();

        const label = (u.name || "?").charAt(0).toUpperCase();
        ctx.font = `bold ${Math.max(10, Math.floor(zoom * 0.35))}px system-ui`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.fillText(label, x, y);

        // Target Preview indicator — make candidates clearly highlighted, and the
        // selected target much more obvious than unselected candidates.
        if (targetPreviewMode && !active && isTargetCandidate(u)) {
          const isSelectedTarget = selectedTargetCid && String(u.cid) === String(selectedTargetCid);

          if (isSelectedTarget) {
            const cap = findCapabilityById(targetPreviewMode.capabilityId);
            const advisory = getSelectedTargetAdvisory(cap, selectedTargetCid);
            let color = "#d6ba7e";
            let fillCol = "rgba(214, 186, 126, 0.28)";
            if (advisory.status === 'likely-in-range') { color = "#4caf82"; fillCol = "rgba(76, 175, 130, 0.32)"; }
            else if (advisory.status === 'likely-out-of-range') { color = "#ff5b5b"; fillCol = "rgba(255, 91, 91, 0.28)"; }

            // Outer glow ring.
            ctx.beginPath();
            ctx.arc(x, y, r + 8, 0, Math.PI * 2);
            ctx.fillStyle = fillCol;
            ctx.fill();
            ctx.lineWidth = localResolutionTray ? 5 : 3;
            ctx.strokeStyle = color;
            ctx.stroke();

            // Inner crosshair-ish accent so the selected target stands out clearly.
            ctx.beginPath();
            ctx.arc(x, y, r + 2, 0, Math.PI * 2);
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = "rgba(255,255,255,0.85)";
            ctx.stroke();
          } else {
            // Unselected candidate — soft fill plus solid (not dashed) ring so candidates read clearly.
            ctx.beginPath();
            ctx.arc(x, y, r + 5, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(214,186,126,0.10)";
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = "rgba(214,186,126,0.65)";
            ctx.stroke();
          }
        }
      });

      // Target Preview Status Overlay
      if (targetPreviewMode) {
        const target = findCombatantByCid(selectedTargetCid);
        const targetName = target ? target.name : (selectedTargetCid ? "Unknown" : "None selected");
        const cap = findCapabilityById(targetPreviewMode.capabilityId);
        const advisory = getSelectedTargetAdvisory(cap, selectedTargetCid);

        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(10, 10, 320, 60);
        ctx.strokeStyle = "#d6ba7e";
        ctx.strokeRect(10, 10, 320, 60);
        ctx.fillStyle = "#d6ba7e";
        ctx.font = "bold 14px system-ui";
        ctx.textAlign = "left";
        ctx.fillText(`Action: ${targetPreviewMode.capabilityName}`, 20, 30);

        ctx.font = "12px system-ui";
        if (selectedTargetCid) {
          let advColor = "#d6ba7e";
          if (advisory.status === 'likely-in-range') advColor = "#4caf82";
          else if (advisory.status === 'likely-out-of-range') advColor = "#ff5b5b";

          ctx.fillStyle = "#e8eef7";
          ctx.fillText(`Target: ${targetName}`, 20, 48);
          ctx.fillStyle = advColor;
          ctx.fillText(`${advisory.distanceFt || 0} ft • ${advisory.label}`, 20, 64);
        } else {
          ctx.fillStyle = "#e8eef7";
          ctx.fillText("Select a target token", 20, 48);
        }

        ctx.fillStyle = "#e8eef7";
        ctx.textAlign = "right";
        ctx.fillText("Esc to cancel", 320, 30);
      }

      // Drag Preview
      if (dragging && activeUnit) {
        const { x, y } = gridToScreen(dragging.curCol, dragging.curRow);
        const r = Math.max(10, zoom * 0.35);
        const key = cellKey(dragging.curCol, dragging.curRow);
        const isValid = currentCostMap && currentCostMap.has(key);

        ctx.save();
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = isValid ? "rgba(106,169,255,0.4)" : "rgba(255,91,91,0.4)";
        ctx.fill();
        ctx.setLineDash([5, 3]);
        ctx.strokeStyle = isValid ? "rgba(255,255,255,0.8)" : "rgba(255,91,91,0.8)";
        ctx.stroke();

        const label = (activeUnit.name || "?").charAt(0).toUpperCase();
        ctx.font = `bold ${Math.max(10, Math.floor(zoom * 0.35))}px system-ui`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.fillText(label, x, y);
        ctx.restore();
      }
    }

    // Initial fetch and start polling
    fetchState();
    pollInterval = setInterval(fetchState, 2000);
  </script>
</body>
</html>
