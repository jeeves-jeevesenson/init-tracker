<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DM Control – Initiative Tracker</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #141923;
      --panel2: #0f1320;
      --border: rgba(214,186,126,0.22);
      --text: #e8eef7;
      --muted: #93a2b8;
      --accent: #6aa9ff;
      --gold: #d6ba7e;
      --danger: #ff5b5b;
      --heal: #4caf82;
      --radius: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif; overflow: hidden; }

    .app { height: 100vh; display: flex; flex-direction: column; }

    /* ── Topbar ─────────────────────────────────────────────────── */
    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }
    .topbar h1 { font-size: 16px; color: var(--gold); flex: 1; }
    .workspace-link {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: var(--radius); padding: 5px 12px; cursor: pointer; font-size: 12px;
      text-decoration: none; display: inline-flex; align-items: center;
    }
    .workspace-link:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Main Map Surface ────────────────────────────────────────── */
    .main-surface {
      flex: 1;
      position: relative;
      background: #0a0c12;
      overflow: hidden;
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: -webkit-optimize-contrast;
    }

    /* ── Bottom Control Bar ──────────────────────────────────────── */
    .control-bar {
      background: var(--panel2);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
      overflow-y: auto;
    }
    .actor-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .actor-name { font-size: 18px; font-weight: bold; color: var(--text); }
    .actor-meta { font-size: 12px; color: var(--muted); }
    .status-idle { color: var(--muted); font-style: italic; font-size: 13px; }

    /* ── Action Panel ───────────────────────────────────────────── */
    .action-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .action-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .group-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--gold);
      opacity: 0.8;
      border-bottom: 1px solid rgba(214,186,126,0.15);
      padding-bottom: 2px;
      margin-bottom: 2px;
    }
    .action-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }
    .action-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .action-card:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(214,186,126,0.4);
    }
    .action-card.selected {
      background: rgba(106,169,255,0.12);
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(106,169,255,0.2);
    }
    .action-card .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .action-card .card-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .action-card .card-badge {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.1);
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .action-card .card-meta {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.3;
    }
    .action-card.trait {
      background: none;
      border-style: dashed;
      opacity: 0.8;
    }

    .selected-summary {
      background: rgba(106,169,255,0.1);
      border-left: 3px solid var(--accent);
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .selected-summary h4 { font-size: 13px; color: var(--accent); margin-bottom: 4px; }
    .selected-summary p { font-size: 12px; color: var(--text); opacity: 0.9; line-height: 1.4; }

    /* ── Status Overlay ─────────────────────────────────────────── */
    .status-overlay {
      position: absolute; top: 20px; right: 20px;
      background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 6px;
      font-size: 12px; border: 1px solid var(--border);
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>DM Control</h1>
      <div id="combatStatus" class="actor-meta">Loading state...</div>
      <a href="/dm" class="workspace-link">↩ DM Cockpit</a>
    </header>

    <main class="main-surface" id="mapWrap">
      <canvas id="mapCanvas"></canvas>
      <div id="statusOverlay" class="status-overlay" style="display:none;"></div>
    </main>

    <footer class="control-bar">
      <div id="activeActorPanel">
        <div class="status-idle">Waiting for combat data...</div>
      </div>
      <div id="activeActionsPanel" class="action-panel">
        <!-- Actions rendered here -->
      </div>
    </footer>
  </div>

  <script>
    /**
     * DM Control Phase 3A1 — Action panel scaffold and read-only capability fetch.
     * /dmcontrol has map rendering, movement range visualization, and backend-validated drag/drop movement.
     * Now includes read-only monster/NPC action cards and local selection state.
     * Deferred: targeting, attacks, AoE, resolution, and Multiattack.
     */

    const API_COMBAT = '/api/dm/combat';
    let pollInterval = null;
    let state = null;

    // Phase 3A1 state
    let capabilitySummary = null;
    let capabilityActorCid = null;
    let selectedCapabilityId = null;

    // Map state
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    let zoom = 40;
    let panX = 0;
    let panY = 0;
    let fittedToGrid = false;
    let lastGrid = {cols: 0, rows: 0};
    let dragging = null; // {cid, col, row, curCol, curRow, startX, startY}
    let isMoving = false; // Guard against duplicate moves

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    window.addEventListener('resize', resize);
    resize();

    function screenToGrid(x, y) {
      return {
        col: Math.floor((x - panX) / zoom),
        row: Math.floor((y - panY) / zoom)
      };
    }

    canvas.addEventListener('pointerdown', (e) => {
      if (!state || !state.tactical_map || isMoving) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const { col, row } = screenToGrid(x, y);

      const activeCid = state.active_cid;
      const activeUnit = (state.tactical_map.units || []).find(u => String(u.cid) === String(activeCid));
      const actor = state.combatants.find(c => String(c.cid) === String(activeCid));
      
      if (!activeUnit || !activeUnit.pos || !actor || actor.is_pc) return;

      if (activeUnit.pos.col === col && activeUnit.pos.row === row) {
        dragging = {
          cid: activeCid,
          col: col,
          row: row,
          curCol: col,
          curRow: row,
          startX: x,
          startY: y
        };
        canvas.setPointerCapture(e.pointerId);
        draw();
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const { col, row } = screenToGrid(x, y);

      if (col !== dragging.curCol || row !== dragging.curRow) {
        dragging.curCol = col;
        dragging.curRow = row;
        draw();
      }
    });

    canvas.addEventListener('pointerup', async (e) => {
      if (!dragging) return;
      const finalCol = dragging.curCol;
      const finalRow = dragging.curRow;
      const dragCid = dragging.cid;
      dragging = null;
      canvas.releasePointerCapture(e.pointerId);

      const activeUnit = (state.tactical_map.units || []).find(u => String(u.cid) === String(dragCid));
      if (activeUnit && (activeUnit.pos.col !== finalCol || activeUnit.pos.row !== finalRow)) {
        await executeMove(dragCid, finalCol, finalRow);
      } else {
        draw();
      }
    });

    async function executeMove(cid, col, row) {
      isMoving = true;
      renderError('Moving...');
      try {
        const resp = await fetch(`/api/dm/map/combatants/${cid}/move`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ col, row })
        });
        if (!resp.ok) {
          const errData = await resp.json();
          throw new Error(errData.detail || `HTTP ${resp.status}`);
        }
        await fetchState();
      } catch (err) {
        console.error('Move error:', err);
        renderError(err.message);
      } finally {
        isMoving = false;
        draw();
      }
    }

    async function fetchState() {
      try {
        const resp = await fetch(API_COMBAT);
        if (!resp.ok) {
          if (resp.status === 401) {
             renderError('Admin authentication required. Open DM Cockpit first.');
             return;
          }
          throw new Error(`HTTP ${resp.status}`);
        }
        const data = await resp.json();
        state = data;
        renderState(data);
        draw();
      } catch (err) {
        console.error('Fetch error:', err);
        renderError('Offline or server error');
      }
    }

    function renderError(msg) {
      const statusEl = document.getElementById('combatStatus');
      if (statusEl) {
        statusEl.textContent = msg;
        statusEl.style.color = 'var(--danger)';
      }
    }

    async function fetchCapabilitiesForActiveActor(actor) {
      if (!actor || actor.is_pc) {
        capabilitySummary = null;
        capabilityActorCid = null;
        selectedCapabilityId = null;
        renderActionPanel(actor, null);
        return;
      }

      if (capabilityActorCid === actor.cid) {
        // Already have it, just re-render in case local state (selection) changed
        renderActionPanel(actor, capabilitySummary);
        return;
      }

      try {
        const resp = await fetch(`/api/dm/monster-capabilities/${actor.cid}`);
        if (!resp.ok) {
          if (resp.status === 404) {
            capabilitySummary = { matched: false };
          } else {
            throw new Error(`HTTP ${resp.status}`);
          }
        } else {
          capabilitySummary = await resp.json();
        }
        capabilityActorCid = actor.cid;
        selectedCapabilityId = null;
        renderActionPanel(actor, capabilitySummary);
      } catch (err) {
        console.error('Capabilities fetch error:', err);
        renderActionPanel(actor, null);
      }
    }

    function renderActionPanel(actor, summary) {
      const panel = document.getElementById('activeActionsPanel');
      if (!panel) return;

      if (!state || !state.in_combat || !actor) {
        panel.innerHTML = '<div class="status-idle">No active monster/NPC actions.</div>';
        return;
      }

      if (actor.is_pc) {
        panel.innerHTML = '<div class="status-idle">Actions disabled: waiting for player action.</div>';
        return;
      }

      if (!summary) {
        panel.innerHTML = '<div class="status-idle">Loading actions...</div>';
        return;
      }

      if (summary.matched === false) {
        panel.innerHTML = '<div class="status-idle">No structured actions available yet; use /dm reference or Legacy toolbox if needed.</div>';
        return;
      }

      // Render grouped actions
      let html = '';

      // Selection summary
      if (selectedCapabilityId) {
        const allItems = (summary.actions || [])
          .concat(summary.bonus_actions || [])
          .concat(summary.reactions || [])
          .concat(summary.legendary_actions || [])
          .concat(summary.traits || [])
          .concat(summary.special || []);

        const selected = allItems.find(a => String(a.id) === String(selectedCapabilityId));

        if (selected) {
          html += `
            <div class="selected-summary">
              <h4>${selected.name} Selected</h4>
              <p>${selected.description || 'No description available.'}</p>
              <div class="actor-meta" style="margin-top:4px; font-style:italic;">
                Targeting and execution are deferred in this pass.
              </div>
            </div>
          `;
        }
      }

      const groups = [
        { key: 'actions', label: 'Actions' },
        { key: 'bonus_actions', label: 'Bonus Actions' },
        { key: 'reactions', label: 'Reactions' },
        { key: 'legendary_actions', label: 'Legendary Actions' },
        { key: 'traits', label: 'Traits' },
        { key: 'special', label: 'Special' }
      ];

      groups.forEach(group => {
        const items = summary[group.key];
        if (items && items.length > 0) {
          html += `<div class="action-group">`;
          html += `<div class="group-label">${group.label}</div>`;
          html += `<div class="action-grid">`;
          items.forEach(item => {
            const isSelected = String(item.id) === String(selectedCapabilityId);
            const isTrait = group.key === 'traits';
            const badges = [];
            if (item.action_type) badges.push(item.action_type);
            if (item.target_mode) badges.push(item.target_mode);
            if (item.recharge_rule) badges.push(item.recharge_rule);
            if (item.uses_remaining !== undefined && item.uses_total !== undefined) {
              badges.push(`${item.uses_remaining}/${item.uses_total} Uses`);
            }
            if (item.executable === false) badges.push('Manual');

            html += `
              <div class="action-card ${isSelected ? 'selected' : ''} ${isTrait ? 'trait' : ''}"
                   onclick="selectCapability('${item.id}')">
                <div class="card-header">
                  <span class="card-name">${item.name}</span>
                  ${badges.map(b => `<span class="card-badge">${b}</span>`).join('')}
                </div>
                ${item.mechanics ? `<div class="card-meta">${item.mechanics}</div>` : ''}
              </div>
            `;
          });
          html += `</div></div>`;
        }
      });

      panel.innerHTML = html || '<div class="status-idle">No actions found for this creature.</div>';
    }

    function selectCapability(id) {
      selectedCapabilityId = (String(selectedCapabilityId) === String(id)) ? null : id;
      const actor = state.combatants.find(c => c.cid === state.active_cid);
      renderActionPanel(actor, capabilitySummary);
    }

    function renderState(data) {
      const statusEl = document.getElementById('combatStatus');
      const actorPanel = document.getElementById('activeActorPanel');
      const overlay = document.getElementById('statusOverlay');

      if (!data.in_combat) {
        statusEl.textContent = 'Out of Combat';
        statusEl.style.color = 'var(--muted)';
        actorPanel.innerHTML = '<div class="status-idle">No active combat</div>';
        overlay.style.display = 'none';
        fetchCapabilitiesForActiveActor(null);
        return;
      }

      statusEl.textContent = `Round ${data.round}, Turn ${data.turn}`;
      statusEl.style.color = 'var(--gold)';

      const activeCid = data.active_cid;
      const actor = data.combatants.find(c => c.cid === activeCid);

      if (!actor) {
        actorPanel.innerHTML = '<div class="status-idle">No active actor focus</div>';
        overlay.style.display = 'none';
        fetchCapabilitiesForActiveActor(null);
        return;
      }

      const isMonster = !actor.is_pc;
      const units = data.tactical_map?.units || [];
      const unit = units.find(u => String(u.cid) === String(activeCid));
      const moveRemaining = unit ? (unit.move_remaining ?? unit.speed ?? 0) : 0;

      if (isMonster) {
        actorPanel.innerHTML = `
          <div class="actor-info">
            <span class="actor-name">${actor.name}</span>
            <span class="actor-meta">${actor.role || actor.type || 'Monster/NPC'} • HP: ${actor.hp}/${actor.max_hp}</span>
          </div>
          <div class="actor-meta">
            Speed: ${actor.speed || '—'} • Movement Remaining: ${moveRemaining} ft • AC: ${actor.ac || '—'} • Conditions: ${actor.conditions?.join(', ') || 'None'}
          </div>
          <div class="actor-meta" style="margin-top:4px; color:var(--accent); font-style:italic;">
            Drag token on map to move • Movement is backend-validated
          </div>
        `;
        overlay.textContent = `Focus: ${actor.name} (Active)`;
        overlay.style.display = 'block';
        overlay.style.borderColor = 'var(--danger)';
      } else {
        actorPanel.innerHTML = `
          <div class="actor-info">
            <span class="actor-name">${actor.name}</span>
            <span class="actor-meta">Player Character • Turn in progress</span>
          </div>
          <div class="status-idle">Waiting for player action...</div>
        `;
        overlay.textContent = `Focus: ${actor.name} (PC Turn)`;
        overlay.style.display = 'block';
        overlay.style.borderColor = 'var(--accent)';
      }

      fetchCapabilitiesForActiveActor(actor);
    }

    function gridToScreen(col, row) {
      return { x: panX + col * zoom + zoom / 2, y: panY + row * zoom + zoom / 2 };
    }

    // --- Movement Range Helpers (Ported from LAN) ---

    function cellKey(col, row) {
      return `${Math.trunc(col)},${Math.trunc(row)}`;
    }

    function normalizeMovementMode(value) {
      const v = String(value || "").toLowerCase();
      if (v === "fly" || v === "swim" || v === "climb") return v;
      return "normal";
    }

    function getRoughTerrainMap() {
      const map = new Map();
      if (!state || !state.tactical_map || !Array.isArray(state.tactical_map.rough_terrain)) return map;
      state.tactical_map.rough_terrain.forEach(cell => {
        if (!cell) return;
        map.set(cellKey(cell.col, cell.row), cell);
      });
      return map;
    }

    function getObstacleSet() {
      const set = new Set();
      if (!state || !state.tactical_map || !Array.isArray(state.tactical_map.obstacles)) return set;
      state.tactical_map.obstacles.forEach(o => {
        if (!o) return;
        set.add(cellKey(o.col, o.row));
      });
      return set;
    }

    function entityCellsForEntry(entry) {
      if (!entry || typeof entry !== "object") return [];
      if (Array.isArray(entry.cells)) return entry.cells;
      const col = Number(entry.col);
      const row = Number(entry.row);
      if (Number.isFinite(col) && Number.isFinite(row)) return [{col, row}];
      return [];
    }

    function movementCostMap(startCol, startRow, maxFt, unit, roughMap, obstacles, features, hazards, structures, elevationCells, cols, rows, feetPerSquare) {
      const step = Number(feetPerSquare) || 5;
      const diag5 = step;
      const diag10 = step * 2;
      const mode = normalizeMovementMode(unit?.movement_mode);
      const landSpeed = Math.max(0, Number(unit?.speed || 0));
      let swimSpeed = Math.max(0, Number(unit?.swim_speed || 0));
      if (swimSpeed <= 0) swimSpeed = Math.max(1, Math.floor(landSpeed / 2));

      const blockedCells = new Set();
      const hazardMultiplierByCell = new Map();

      const addEntityCells = (entry, callback) => {
        if (!entry || typeof entry !== "object") return;
        const payload = (entry.payload && typeof entry.payload === "object") ? entry.payload : {};
        const cells = entityCellsForEntry(entry);
        cells.forEach(cell => callback(Math.trunc(cell.col), Math.trunc(cell.row), payload));
      };

      (features || []).forEach(f => addEntityCells(f, (c, r, p) => { if (p.blocks_movement) blockedCells.add(cellKey(c, r)); }));
      (structures || []).forEach(s => addEntityCells(s, (c, r, p) => { if (p.blocks_movement !== false) blockedCells.add(cellKey(c, r)); }));
      (hazards || []).forEach(h => addEntityCells(h, (c, r, p) => {
        if (p.blocks_movement) blockedCells.add(cellKey(c, r));
        const mult = Number(p.movement_multiplier ?? 1);
        if (Number.isFinite(mult) && mult > 0 && mult !== 1) {
          const key = cellKey(c, r);
          hazardMultiplierByCell.set(key, (hazardMultiplierByCell.get(key) || 1) * mult);
        }
      }));

      function inBounds(c, r) { return c >= 0 && r >= 0 && c < cols && r < rows; }

      // Dijkstra logic simplified for this pass
      const results = new Map();
      results.set(cellKey(startCol, startRow), 0);

      const queue = [{col: startCol, row: startRow, cost: 0, parity: 0}];
      while(queue.length > 0) {
          const current = queue.shift();
          if (current.cost > maxFt) continue;

          for(let dc = -1; dc <= 1; dc++) {
              for(let dr = -1; dr <= 1; dr++) {
                  if (dc === 0 && dr === 0) continue;
                  const nc = current.col + dc;
                  const nr = current.row + dr;
                  if (!inBounds(nc, nr)) continue;
                  const key = cellKey(nc, nr);
                  if (obstacles.has(key) || blockedCells.has(key)) continue;

                  const isDiag = dc !== 0 && dr !== 0;
                  let moveCost = step;
                  let nextParity = current.parity;
                  if (isDiag) {
                      nextParity = (current.parity + 1) % 2;
                      moveCost = (nextParity === 0) ? diag10 : diag5;
                  }

                  const rough = roughMap.get(key);
                  if (rough && rough.is_rough) moveCost *= 2;
                  const hazardMult = hazardMultiplierByCell.get(key) || 1;
                  moveCost *= hazardMult;

                  const nextCost = current.cost + moveCost;
                  if (nextCost <= maxFt) {
                      if (!results.has(key) || results.get(key) > nextCost) {
                          results.set(key, nextCost);
                          queue.push({col: nc, row: nr, cost: nextCost, parity: nextParity});
                      }
                  }
              }
          }
      }
      return results;
    }

    // --- End Movement Range Helpers ---

    function draw() {
      if (!state || !state.tactical_map) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
      }

      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      ctx.clearRect(0, 0, w, h);

      // Background
      ctx.fillStyle = "#0a0c12";
      ctx.fillRect(0, 0, w, h);

      const grid = state.tactical_map.grid;
      if (!grid || !grid.cols || !grid.rows) return;

      const cols = grid.cols;
      const rows = grid.rows;

      if (cols !== lastGrid.cols || rows !== lastGrid.rows) {
        fittedToGrid = false;
        lastGrid = { cols, rows };
      }

      // Auto-fit on first draw
      if (!fittedToGrid) {
        const pad = 24;
        const sx = (w - pad * 2) / (cols * zoom);
        const sy = (h - pad * 2) / (rows * zoom);
        const s = Math.min(1.0, Math.max(0.35, Math.min(sx, sy)));
        zoom = Math.floor(zoom * s);
        panX = Math.floor((w - cols * zoom) / 2);
        panY = Math.floor((h - rows * zoom) / 2);
        fittedToGrid = true;
      }

      // Grid lines
      ctx.strokeStyle = "rgba(255,255,255,0.07)";
      ctx.lineWidth = 1;
      for (let c = 0; c <= cols; c++) {
        const x = panX + c * zoom;
        ctx.beginPath(); ctx.moveTo(x, panY); ctx.lineTo(x, panY + rows * zoom); ctx.stroke();
      }
      for (let r = 0; r <= rows; r++) {
        const y = panY + r * zoom;
        ctx.beginPath(); ctx.moveTo(panX, y); ctx.lineTo(panX + cols * zoom, y); ctx.stroke();
      }

      const units = state.tactical_map.units || [];
      const activeCid = state.active_cid;
      const activeUnit = units.find(u => String(u.cid) === String(activeCid));

      let currentCostMap = null;

      // Movement Range Visualization
      if (activeUnit && activeUnit.pos) {
        const actor = state.combatants.find(c => String(c.cid) === String(activeCid));
        const isMonster = actor && !actor.is_pc;

        if (isMonster) {
          const feetPerSquare = grid.feet_per_square || 5;
          const moveRemaining = activeUnit.move_remaining ?? activeUnit.speed ?? 0;

          if (moveRemaining > 0) {
            currentCostMap = movementCostMap(
              activeUnit.pos.col, activeUnit.pos.row,
              moveRemaining, activeUnit,
              getRoughTerrainMap(), getObstacleSet(),
              state.tactical_map.features, state.tactical_map.hazards,
              state.tactical_map.structures, state.tactical_map.elevation_cells,
              cols, rows, feetPerSquare
            );

            currentCostMap.forEach((cost, key) => {
              const [col, row] = key.split(",").map(Number);
              const x = panX + col * zoom;
              const y = panY + row * zoom;
              ctx.fillStyle = "rgba(106,169,255,0.18)";
              ctx.fillRect(x + 1, y + 1, zoom - 2, zoom - 2);
            });
          }
        }
      }

      // Render tokens
      units.forEach(u => {
        if (!u.pos) return;
        const { x, y } = gridToScreen(u.pos.col, u.pos.row);
        const r = Math.max(10, zoom * 0.35);
        const active = (activeCid !== null && String(activeCid) === String(u.cid));

        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);

        if (u.role === "enemy") {
          ctx.fillStyle = "rgba(255,91,91,0.28)";
        } else if (u.role === "pc") {
          ctx.fillStyle = "rgba(106,255,176,0.18)";
        } else {
          ctx.fillStyle = "rgba(255,255,255,0.15)";
        }
        ctx.fill();

        ctx.lineWidth = active ? 3 : 2;
        ctx.strokeStyle = active ? "rgba(255,255,255,0.85)" : "rgba(255,255,255,0.25)";
        ctx.stroke();

        const label = (u.name || "?").charAt(0).toUpperCase();
        ctx.font = `bold ${Math.max(10, Math.floor(zoom * 0.35))}px system-ui`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.fillText(label, x, y);
      });

      // Drag Preview
      if (dragging && activeUnit) {
        const { x, y } = gridToScreen(dragging.curCol, dragging.curRow);
        const r = Math.max(10, zoom * 0.35);
        const key = cellKey(dragging.curCol, dragging.curRow);
        const isValid = currentCostMap && currentCostMap.has(key);

        ctx.save();
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = isValid ? "rgba(106,169,255,0.4)" : "rgba(255,91,91,0.4)";
        ctx.fill();
        ctx.setLineDash([5, 3]);
        ctx.strokeStyle = isValid ? "rgba(255,255,255,0.8)" : "rgba(255,91,91,0.8)";
        ctx.stroke();

        const label = (activeUnit.name || "?").charAt(0).toUpperCase();
        ctx.font = `bold ${Math.max(10, Math.floor(zoom * 0.35))}px system-ui`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.fillText(label, x, y);
        ctx.restore();
      }
    }

    // Initial fetch and start polling
    fetchState();
    pollInterval = setInterval(fetchState, 2000);
  </script>
</body>
</html>
