                    const isDone = completed >= max;
                    const isStepSelected = String(selectedCapabilityId) === String(step.action_id);

                    // In choose_n, if budget is exhausted, disable all incomplete choices
                    const budgetExhausted = isChooseN && localSequencePacket.remaining_budget <= 0;
                    const canSelect = !isDone && !budgetExhausted;

                    return `
                      <div style="display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.03); padding:4px 8px; border-radius:4px; border-left: 3px solid ${isDone ? 'var(--heal)' : (isStepSelected ? 'var(--accent)' : 'var(--muted)')}; opacity: ${budgetExhausted && !isDone && !isStepSelected ? '0.5' : '1'}">
                        <div style="flex:1; font-size:11px">
                          <div style="font-weight:bold">${esc(step.name)}</div>
                          <div style="font-size:10px; color:var(--muted)">${completed} / ${max} completed</div>
                        </div>
                        ${!isDone ? `
                          ${canSelect || isStepSelected ? `
                            <button class="workspace-link" style="font-size:10px; padding:2px 6px; ${isStepSelected ? 'background:var(--accent); color:var(--bg)' : ''}"
                                    onclick="selectLocalSequenceStep('${esc(step.action_id)}')" ${localResolutionInFlight ? 'disabled' : ''}>
                              ${isStepSelected ? 'Active' : 'Select'}
                            </button>
                          ` : `<div style="font-size:9px; color:var(--muted); font-weight:bold; text-transform:uppercase">Exhausted</div>`}
                        ` : '<div style="font-size:9px; color:var(--heal); font-weight:bold; text-transform:uppercase">Done</div>'}
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>
            `;
          }

          if (localResolutionTray && String(localResolutionTray.capabilityId) === String(selected.id)) {
            const ctx = getLocalResolutionContext();
            summaryHtml += `
              <div style="margin-top:12px; border-top:1px solid rgba(214,186,126,0.3); padding-top:8px;">
                <div style="font-size:12px; color:var(--gold); margin-bottom:4px; text-transform:uppercase; font-weight:bold;">Resolution Preview</div>
                <div class="actor-meta" style="color:var(--text); font-size:12px;">
                  Actor: <strong>${esc(ctx.actor ? ctx.actor.name : 'Unknown')}</strong><br>
                  Action: <strong>${esc(ctx.cap ? ctx.cap.name : 'Unknown')}</strong><br>
                  Target: <strong>${esc(ctx.target ? ctx.target.name : 'Unknown')}</strong>
                </div>
                <div class="actor-meta" style="margin-top:4px;">
                  Distance: ${ctx.advisory.distanceFt !== null ? ctx.advisory.distanceFt + ' ft' : 'Unknown'} •
                  <span style="color:${ctx.advisory.status === 'likely-in-range' ? 'var(--heal)' : (ctx.advisory.status === 'likely-out-of-range' ? 'var(--danger)' : 'var(--gold)')}">
                    ${esc(ctx.advisory.label)}
                  </span>
                </div>

                ${localResolutionError ? `
                  <div class="actor-meta" style="margin-top:8px; color:var(--danger); font-weight:bold; border:1px solid var(--danger); padding:4px; border-radius:4px">
                    Error: ${esc(localResolutionError)}
                  </div>
                ` : ''}

                ${!localResolutionPacket && !localResolutionError ? `
                  <div style="margin-top:12px;">
                    <button class="workspace-link" onclick="prepareLocalResolutionPreview()"
                            ${localResolutionInFlight ? 'disabled' : ''}
                            style="width:100%; justify-content:center; padding:8px; font-weight:bold; border-color:var(--accent); color:var(--accent)">
                      ${localResolutionInFlight ? 'Preparing...' : 'Prepare Resolution Preview'}
                    </button>
                  </div>
                ` : ''}

                ${localResolutionPacket ? `
                  <div style="margin-top:12px;">
                    <button class="workspace-link" onclick="openResolutionModal()"
                            style="width:100%; justify-content:center; padding:8px; font-weight:bold; border-color:var(--heal); color:var(--heal)">
                      Open Resolution Modal
                    </button>
                  </div>
                ` : ''}

                <div style="margin-top:12px; display:flex; gap:8px;">
                  <button class="workspace-link" onclick="closeLocalResolutionTray()" style="padding:4px 8px;">Back to target selection</button>
                  <button class="workspace-link" onclick="cancelTargetPreviewMode()" style="padding:4px 8px; color:var(--danger); border-color:var(--danger);">Cancel preview</button>
                </div>
              </div>
            `;
          } else if (isPreviewActive) {
            if (!selectedTargetCid) {
              summaryHtml += `
                <div class="actor-meta" style="margin-top:8px; color:var(--accent); font-weight:bold;">
                  Click a highlighted target token. Press Escape to cancel.
                </div>
              `;
            } else {
              const target = findCombatantByCid(selectedTargetCid);
              const advisory = getSelectedTargetAdvisory(selected, selectedTargetCid);
              summaryHtml += `
                <div class="actor-meta" style="margin-top:8px; color:var(--accent); font-weight:bold;">
                  Target: ${esc(target ? target.name : 'Unknown')} (Selected Locally)
                </div>
                <div class="actor-meta" style="margin-top:4px;">
                  Distance: ${advisory.distanceFt !== null ? advisory.distanceFt + ' ft' : 'Unknown'} •
                  <span style="color:${advisory.status === 'likely-in-range' ? 'var(--heal)' : (advisory.status === 'likely-out-of-range' ? 'var(--danger)' : 'var(--gold)')}">
                    ${esc(advisory.label)}
                  </span>
                </div>
                <div class="actor-meta" style="margin-top:4px; font-style:italic;">
                  Resolution is deferred. Advisory only; DM adjudication needed.
                </div>
              `;
            }
          } else {
            const isManual = selected.executable === false;
            const previewable = isPreviewableTargetAction(selected);
            const isComposite = selected.action_type === 'composite';
            const isModifier = selected.action_type === 'modifier';

            if (isComposite && !localSequencePacket) {
              summaryHtml += `
                <div style="margin-top:12px; border-top:1px solid rgba(106,169,255,0.3); padding-top:8px;">
                  <button class="workspace-link" style="width:100%; padding:8px; font-weight:bold; background:var(--accent); color:var(--bg)"
                          onclick="startSequence('${esc(selected.id)}')" ${localResolutionInFlight ? 'disabled' : ''}>
                    Start ${esc(selected.name)} Sequence
                  </button>
                </div>
              `;
            } else if (isModifier) {
              summaryHtml += `
                <div style="margin-top:12px; border-top:1px solid rgba(106,169,255,0.3); padding-top:8px;">
                  <button class="workspace-link" style="width:100%; padding:8px; font-weight:bold; background:var(--accent); color:var(--bg)"
                          onclick="activateModifier('${esc(selected.id)}')" ${localResolutionInFlight ? 'disabled' : ''}>
                    ${selected.modifier_active ? 'Re-Arm Modifier' : 'Arm Modifier'}
                  </button>
                </div>
              `;
            } else if (isManual) {
              summaryHtml += `
                <div class="actor-meta" style="margin-top:6px; color:var(--gold); font-weight:bold;">
                  Manual Assist — DM resolves this action by hand.
                </div>
                <div class="actor-meta" style="margin-top:4px; font-size:11px; opacity:0.85;">
                  No target click and no Apply button. Use the manual instructions above (or /dm) to adjudicate the result.
                </div>
              `;
            } else if (previewable && isPreviewActive) {
              summaryHtml += `
                <div class="actor-meta" style="margin-top:6px; color:var(--accent); font-weight:bold;">
                  Targeting mode active — click an enemy token on the map.
                </div>
              `;
            } else if (previewable) {
              summaryHtml += `
                <div class="actor-meta" style="margin-top:6px; color:var(--muted); font-style:italic;">
                  Select this action again to re-enter targeting mode.
                </div>
              `;
            } else {
              summaryHtml += `
                <div class="actor-meta" style="margin-top:4px; font-style:italic;">
                  Select a valid target or action.
                </div>
              `;
            }
          }

          summaryHtml += `</div>`;
          html += summaryHtml;
        }
      }

      const groupConfig = [
        { key: 'actions', label: 'Actions' },
        { key: 'bonus_actions', label: 'Bonus Actions' },
        { key: 'reactions', label: 'Reactions' },
        { key: 'legendary_actions', label: 'Legendary Actions' },
        { key: 'lair_actions', label: 'Lair Actions' },
        { key: 'traits', label: 'Traits' },
        { key: 'special', label: 'Special' }
      ];

      // Render Actions/Bonus/Reactions/Legendary first as the prominent groups; collapse traits behind a <details>.
      const primaryKeys = new Set(['actions', 'bonus_actions', 'reactions', 'legendary_actions']);
      const collapsedKeys = new Set(['traits', 'lair_actions', 'special']);

      const renderItem = (item, conf) => {
        const isSelected = String(item.id) === String(selectedCapabilityId);
        const isTrait = conf.key === 'traits' || conf.key === 'lair_actions';
        const isExecutable = item.executable !== false && !isTrait;
        const badges = [];
        // Highlight primary classification first.
        if (isExecutable) {
          badges.push({ text: 'Attack', cls: 'exec' });
        } else if (isTrait) {
          badges.push({ text: 'Reminder', cls: 'manual-tag' });
        } else {
          badges.push({ text: 'Manual Assist', cls: 'manual-tag' });
        }
        if (item.action_type) badges.push({ text: item.action_type, cls: '' });
        if (item.target_mode) badges.push({ text: item.target_mode, cls: '' });
        if (item.recharge_rule) badges.push({ text: item.recharge_rule, cls: '' });
        if (item.uses_remaining !== undefined && item.uses_total !== undefined) {
          badges.push({ text: `${item.uses_remaining}/${item.uses_total} Uses`, cls: '' });
        }
        if (item.modifier_active) {
          badges.push({ text: 'Active', cls: 'exec' });
        }
        if (item.jammed) {
          badges.push({ text: 'Jammed', cls: 'manual-tag', style: 'background:var(--danger)' });
        }

        const cardCls = ['action-card'];
        if (isSelected) cardCls.push('selected');
        if (isTrait) cardCls.push('trait');
        if (!isExecutable && !isTrait) cardCls.push('manual');
        if (isExecutable) cardCls.push('executable');
        if (item.jammed) cardCls.push('jammed');

        const badgeHtml = badges.map(b => {
          const style = b.style ? `style="${b.style}"` : '';
          return `<span class="card-badge ${b.cls}" ${style}>${esc(b.text)}</span>`;
        }).join('');

        return `
          <div class="${cardCls.join(' ')}" onclick="selectCapability('${esc(item.id)}')">
            <div class="card-header">
              <span class="card-name">${esc(item.name)}</span>
              <span class="card-badges">${badgeHtml}</span>
            </div>
            ${item.mechanics_summary ? `<div class="card-meta">${esc(item.mechanics_summary)}</div>` : ''}
          </div>
        `;
      };

      // Pass 1: prominent groups.
      groupConfig.forEach(conf => {
        if (!primaryKeys.has(conf.key)) return;
        const allItems = groups[conf.key];
        if (!allItems || allItems.length === 0) return;

        // Only show truly executable items in the primary tray.
        const execItems = allItems.filter(item => item.executable !== false);
        if (execItems.length === 0) return;

        html += `<div class="action-group">`;
        html += `<div class="group-label">${esc(conf.label)}</div>`;
        html += `<div class="action-grid">`;
        execItems.forEach(item => { html += renderItem(item, conf); });
        html += `</div></div>`;
      });

      // Pass 2: collapsed/secondary groups under a single <details> so the active cockpit stays compact.
      const secondaryItems = [];
      groupConfig.forEach(conf => {
        const allItems = groups[conf.key] || [];
        let subItems = [];

        if (collapsedKeys.has(conf.key)) {
          // Traits/Special etc. are always secondary
          subItems = allItems;
        } else if (primaryKeys.has(conf.key)) {
          // Non-executable items from primary groups (Manual Assist) are demoted to secondary
          subItems = allItems.filter(item => item.executable === false);
        }

        if (subItems.length === 0) return;
        secondaryItems.push({ conf, items: subItems });
      });
      if (secondaryItems.length) {
        const total = secondaryItems.reduce((n, g) => n + g.items.length, 0);
        html += `<details class="action-group secondary-group" style="margin-top:6px;" ${secondaryGroupOpen ? 'open' : ''}>`;
        html += `<summary style="font-size:11px; color:var(--muted); cursor:pointer; padding:4px 0; text-transform:uppercase; letter-spacing:0.05em;">Traits & Reminders (${total})</summary>`;
        secondaryItems.forEach(({ conf, items }) => {
          html += `<div class="action-group" style="margin-top:6px;">`;
          html += `<div class="group-label">${esc(conf.label)}</div>`;
          html += `<div class="action-grid">`;
          items.forEach(item => { html += renderItem(item, conf); });
          html += `</div></div>`;
        });
        html += `</details>`;
      }

      panel.innerHTML = html || '<div class="status-idle">No actions found for this creature.</div>';
    }

    function selectCapability(id) {
      const alreadySelected = String(selectedCapabilityId) === String(id);

      // Clear sequence if we select something NOT in the sequence
      if (localSequencePacket && String(id) !== String(localSequencePacket.capability_id)) {
        const isChild = localSequencePacket.steps.some(s => String(s.action_id) === String(id));
        if (!isChild) {
          localSequencePacket = null;
          localSequenceCompletedSteps = {};
        }
      }

      selectedCapabilityId = alreadySelected ? null : id;

      // Clear local resolution state on any capability change
      localResolutionTray = null;
      localResolutionPacket = null;
      localResolutionError = null;
      localResolutionInFlight = false;
      localResolutionOutcomes = {};

      const cap = findCapabilityById(id);
      if (!alreadySelected && isPreviewableTargetAction(cap)) {
        enterTargetPreviewMode(cap);
      } else {
        cancelTargetPreviewMode();
      }

      const actor = (state.combatants || []).find(c => String(c.cid) === String(state.active_cid));
      renderActionPanel(actor, capabilitySummary);
    }

    function renderState(data) {
      const statusEl = document.getElementById('combatStatus');
      const actorPanel = document.getElementById('activeActorPanel');
      const overlay = document.getElementById('statusOverlay');
      const controlBtn = document.getElementById('combatControlBtn');

      if (controlBtn) {
        const hasCombatants = data.combatants && data.combatants.length > 0;
        if (data.in_combat) {
          controlBtn.textContent = '▶ Next Turn';
          controlBtn.style.display = '';
        } else {
          controlBtn.textContent = '⚔ Start Combat';
          controlBtn.style.display = hasCombatants ? '' : 'none';
        }
      }

      if (!data.in_combat) {
        statusEl.textContent = 'Out of Combat';
        statusEl.style.color = 'var(--muted)';
        actorPanel.innerHTML = '<div class="status-idle">No active combat</div>';
        overlay.style.display = 'none';
        fullResetLocalState();
        lastActiveCid = null;
        fetchCapabilitiesForActiveActor(null);
        updateModeBanner();
        return;
      }

      statusEl.textContent = `Round ${data.round}, Turn ${data.turn}`;
      statusEl.style.color = 'var(--gold)';

      const activeCid = data.active_cid;

      // Hardening: If active actor changes, clear all local state
      if (lastActiveCid !== null && String(lastActiveCid) !== String(activeCid)) {
        fullResetLocalState();
      }
      lastActiveCid = activeCid;

      // Hardening: If selected target no longer exists, clear it
      if (selectedTargetCid && !findCombatantByCid(selectedTargetCid)) {
        selectedTargetCid = null;
        localResolutionTray = null;
        localResolutionPacket = null;
        localResolutionError = null;
        localResolutionOutcomes = {};
      }

      const actor = data.combatants.find(c => String(c.cid) === String(activeCid));

      if (!actor) {
        actorPanel.innerHTML = '<div class="status-idle">No active actor focus</div>';
        overlay.style.display = 'none';
        fetchCapabilitiesForActiveActor(null);
        return;
      }

      const isMonster = !actor.is_pc;
      const units = data.tactical_map?.units || [];
      const unit = units.find(u => String(u.cid) === String(activeCid));
      const moveRemaining = unit ? (unit.move_remaining ?? unit.speed ?? 0) : 0;

      if (isMonster) {
        const conditions = (actor.conditions && actor.conditions.length) ? actor.conditions.join(', ') : 'None';
        actorPanel.innerHTML = `
          <div class="actor-info">
            <span class="actor-name">${esc(actor.name)}</span>
            <span class="actor-meta">${esc(actor.role || actor.type || 'Monster/NPC')}</span>
          </div>
          <div class="actor-stat-row">
            <span class="stat-pill"><strong>HP</strong> ${esc(actor.hp)}/${esc(actor.max_hp)}</span>
            <span class="stat-pill"><strong>AC</strong> ${esc(actor.ac || '—')}</span>
            <span class="stat-pill" title="Movement Remaining"><strong>Movement Remaining</strong> ${esc(moveRemaining)} / ${esc(actor.speed || '—')} ft</span>
            <span class="stat-pill"><strong>Conditions</strong> ${esc(conditions)}</span>
          </div>
        `;
        overlay.textContent = `Focus: ${actor.name} (Active)`;
        overlay.style.display = 'block';
        overlay.style.borderColor = 'var(--danger)';
      } else {
        actorPanel.innerHTML = `
          <div class="actor-info">
            <span class="actor-name">${esc(actor.name)}</span>
            <span class="actor-meta">Player Character • Turn in progress</span>
          </div>
          <div class="status-idle">Waiting for player action...</div>
        `;
        overlay.textContent = `Focus: ${actor.name} (PC Turn)`;
        overlay.style.display = 'block';
        overlay.style.borderColor = 'var(--accent)';
      }

      fetchCapabilitiesForActiveActor(actor);
      updateModeBanner();
    }

    function gridToScreen(col, row) {
      return { x: panX + col * zoom + zoom / 2, y: panY + row * zoom + zoom / 2 };
    }

    // --- Movement Range Helpers (Ported from LAN) ---

    function cellKey(col, row) {
      return `${Math.trunc(col)},${Math.trunc(row)}`;
    }

    function normalizeMovementMode(value) {
      const v = String(value || "").toLowerCase();
      if (v === "fly" || v === "swim" || v === "climb") return v;
      return "normal";
    }

    function getRoughTerrainMap() {
      const map = new Map();
      if (!state || !state.tactical_map || !Array.isArray(state.tactical_map.rough_terrain)) return map;
      state.tactical_map.rough_terrain.forEach(cell => {
        if (!cell) return;
        map.set(cellKey(cell.col, cell.row), cell);
      });
      return map;
    }

    function getObstacleSet() {
      const set = new Set();
      if (!state || !state.tactical_map || !Array.isArray(state.tactical_map.obstacles)) return set;
      state.tactical_map.obstacles.forEach(o => {
        if (!o) return;
        set.add(cellKey(o.col, o.row));
      });
      return set;
    }

    function entityCellsForEntry(entry) {
      if (!entry || typeof entry !== "object") return [];
      if (Array.isArray(entry.cells)) return entry.cells;
      const col = Number(entry.col);
      const row = Number(entry.row);
      if (Number.isFinite(col) && Number.isFinite(row)) return [{col, row}];
      return [];
    }

    function movementCostMap(startCol, startRow, maxFt, unit, roughMap, obstacles, features, hazards, structures, elevationCells, cols, rows, feetPerSquare) {
      const step = Number(feetPerSquare) || 5;
      const diag5 = step;
      const diag10 = step * 2;
      const mode = normalizeMovementMode(unit?.movement_mode);
      const landSpeed = Math.max(0, Number(unit?.speed || 0));
      let swimSpeed = Math.max(0, Number(unit?.swim_speed || 0));
      if (swimSpeed <= 0) swimSpeed = Math.max(1, Math.floor(landSpeed / 2));

      const blockedCells = new Set();
      const hazardMultiplierByCell = new Map();

      const addEntityCells = (entry, callback) => {
        if (!entry || typeof entry !== "object") return;
        const payload = (entry.payload && typeof entry.payload === "object") ? entry.payload : {};
        const cells = entityCellsForEntry(entry);
        cells.forEach(cell => callback(Math.trunc(cell.col), Math.trunc(cell.row), payload));
      };

      (features || []).forEach(f => addEntityCells(f, (c, r, p) => { if (p.blocks_movement) blockedCells.add(cellKey(c, r)); }));
      (structures || []).forEach(s => addEntityCells(s, (c, r, p) => { if (p.blocks_movement !== false) blockedCells.add(cellKey(c, r)); }));
      (hazards || []).forEach(h => addEntityCells(h, (c, r, p) => {
        if (p.blocks_movement) blockedCells.add(cellKey(c, r));
        const mult = Number(p.movement_multiplier ?? 1);
        if (Number.isFinite(mult) && mult > 0 && mult !== 1) {
          const key = cellKey(c, r);
          hazardMultiplierByCell.set(key, (hazardMultiplierByCell.get(key) || 1) * mult);
        }
      }));

      function inBounds(c, r) { return c >= 0 && r >= 0 && c < cols && r < rows; }

      // Dijkstra logic simplified for this pass
      const results = new Map();
      results.set(cellKey(startCol, startRow), 0);

      const queue = [{col: startCol, row: startRow, cost: 0, parity: 0}];
      while(queue.length > 0) {
          const current = queue.shift();
          if (current.cost > maxFt) continue;

          for(let dc = -1; dc <= 1; dc++) {
              for(let dr = -1; dr <= 1; dr++) {
                  if (dc === 0 && dr === 0) continue;
                  const nc = current.col + dc;
                  const nr = current.row + dr;
                  if (!inBounds(nc, nr)) continue;
                  const key = cellKey(nc, nr);
                  if (obstacles.has(key) || blockedCells.has(key)) continue;

                  const isDiag = dc !== 0 && dr !== 0;
                  let moveCost = step;
                  let nextParity = current.parity;
                  if (isDiag) {
                      nextParity = (current.parity + 1) % 2;
                      moveCost = (nextParity === 0) ? diag10 : diag5;
                  }

                  const rough = roughMap.get(key);
                  if (rough && rough.is_rough) moveCost *= 2;
                  const hazardMult = hazardMultiplierByCell.get(key) || 1;
                  moveCost *= hazardMult;

                  const nextCost = current.cost + moveCost;
                  if (nextCost <= maxFt) {
                      if (!results.has(key) || results.get(key) > nextCost) {
                          results.set(key, nextCost);
                          queue.push({col: nc, row: nr, cost: nextCost, parity: nextParity});
                      }
                  }
              }
          }
      }
      return results;
    }

    // --- End Movement Range Helpers ---

    function draw() {
      if (!state || !state.tactical_map) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
      }

      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      ctx.clearRect(0, 0, w, h);

      // Background
      ctx.fillStyle = "#0a0c12";
      ctx.fillRect(0, 0, w, h);

      const grid = state.tactical_map.grid;
      if (!grid || !grid.cols || !grid.rows) return;

      const cols = grid.cols;
      const rows = grid.rows;

      if (cols !== lastGrid.cols || rows !== lastGrid.rows) {
        fittedToGrid = false;
        lastGrid = { cols, rows };
      }

      // Auto-fit on first draw
      if (!fittedToGrid) {
        const pad = 24;
        const sx = (w - pad * 2) / (cols * zoom);
        const sy = (h - pad * 2) / (rows * zoom);
        const s = Math.min(1.0, Math.max(0.35, Math.min(sx, sy)));
        zoom = Math.floor(zoom * s);
        panX = Math.floor((w - cols * zoom) / 2);
        panY = Math.floor((h - rows * zoom) / 2);
        fittedToGrid = true;
      }

      // Grid lines
      ctx.strokeStyle = "rgba(255,255,255,0.07)";
      ctx.lineWidth = 1;
      for (let c = 0; c <= cols; c++) {
        const x = panX + c * zoom;
        ctx.beginPath(); ctx.moveTo(x, panY); ctx.lineTo(x, panY + rows * zoom); ctx.stroke();
      }
      for (let r = 0; r <= rows; r++) {
        const y = panY + r * zoom;
        ctx.beginPath(); ctx.moveTo(panX, y); ctx.lineTo(panX + cols * zoom, y); ctx.stroke();
      }

      const units = state.tactical_map.units || [];
      const activeCid = state.active_cid;
      const activeUnit = units.find(u => String(u.cid) === String(activeCid));

      let currentCostMap = null;

      // Movement Range Visualization
      if (activeUnit && activeUnit.pos) {
        const actor = state.combatants.find(c => String(c.cid) === String(activeCid));
        const isMonster = actor && !actor.is_pc;

        if (isMonster && !targetPreviewMode) {
          const feetPerSquare = grid.feet_per_square || 5;
          const moveRemaining = activeUnit.move_remaining ?? activeUnit.speed ?? 0;

          if (moveRemaining > 0) {
            // Dijkstra is the heaviest per-draw work; memoize so idle
            // redraws (panel toggles, capability clicks) don't re-run it.
            const tmap = state.tactical_map;
            const moveKey = [
              activeUnit.cid,
              activeUnit.pos.col, activeUnit.pos.row,
              moveRemaining,
              cols, rows, feetPerSquare,
              (tmap.obstacles && tmap.obstacles.length) || 0,
              (tmap.rough_terrain && tmap.rough_terrain.length) || 0,
              (tmap.features && tmap.features.length) || 0,
              (tmap.hazards && tmap.hazards.length) || 0,
              (tmap.structures && tmap.structures.length) || 0,
              activeUnit.movement_mode || '',
              activeUnit.swim_speed || 0,
            ].join('|');
            if (moveKey === lastMoveCostKey && lastMoveCostMap) {
              currentCostMap = lastMoveCostMap;
            } else {
              currentCostMap = movementCostMap(
                activeUnit.pos.col, activeUnit.pos.row,
                moveRemaining, activeUnit,
                getRoughTerrainMap(), getObstacleSet(),
                tmap.features, tmap.hazards,
                tmap.structures, tmap.elevation_cells,
                cols, rows, feetPerSquare
              );
              lastMoveCostKey = moveKey;
              lastMoveCostMap = currentCostMap;
            }

            currentCostMap.forEach((cost, key) => {
              const [col, row] = key.split(",").map(Number);
              const x = panX + col * zoom;
              const y = panY + row * zoom;
              ctx.fillStyle = "rgba(106,169,255,0.18)";
              ctx.fillRect(x + 1, y + 1, zoom - 2, zoom - 2);
            });
          }
        }
      }

      // Render tokens
      units.forEach(u => {
        if (!u.pos) return;
        const { x, y } = gridToScreen(u.pos.col, u.pos.row);
        const r = Math.max(10, zoom * 0.35);
        const active = (activeCid !== null && String(activeCid) === String(u.cid));

        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);

        if (u.role === "enemy") {
          ctx.fillStyle = "rgba(255,91,91,0.28)";
        } else if (u.role === "pc") {
          ctx.fillStyle = "rgba(106,255,176,0.18)";
        } else {
          ctx.fillStyle = "rgba(255,255,255,0.15)";
        }
        ctx.fill();

        ctx.lineWidth = active ? 3 : 2;
        ctx.strokeStyle = active ? "rgba(255,255,255,0.85)" : "rgba(255,255,255,0.25)";
        ctx.stroke();

        const label = (u.name || "?").charAt(0).toUpperCase();
        ctx.font = `bold ${Math.max(10, Math.floor(zoom * 0.35))}px system-ui`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.fillText(label, x, y);

        // Target Preview indicator — make candidates clearly highlighted, and the
        // selected target much more obvious than unselected candidates.
        if (targetPreviewMode && !active && isTargetCandidate(u)) {
          const isSelectedTarget = selectedTargetCid && String(u.cid) === String(selectedTargetCid);

          if (isSelectedTarget) {
            const cap = findCapabilityById(targetPreviewMode.capabilityId);
            const advisory = getSelectedTargetAdvisory(cap, selectedTargetCid);
            let color = "#d6ba7e";
            let fillCol = "rgba(214, 186, 126, 0.28)";
            if (advisory.status === 'likely-in-range') { color = "#4caf82"; fillCol = "rgba(76, 175, 130, 0.32)"; }
            else if (advisory.status === 'likely-out-of-range') { color = "#ff5b5b"; fillCol = "rgba(255, 91, 91, 0.28)"; }

            // Outer glow ring.
            ctx.beginPath();
            ctx.arc(x, y, r + 8, 0, Math.PI * 2);
            ctx.fillStyle = fillCol;
            ctx.fill();
            ctx.lineWidth = localResolutionTray ? 5 : 3;
            ctx.strokeStyle = color;
            ctx.stroke();

            // Inner crosshair-ish accent so the selected target stands out clearly.
            ctx.beginPath();
            ctx.arc(x, y, r + 2, 0, Math.PI * 2);
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = "rgba(255,255,255,0.85)";
            ctx.stroke();
          } else {
            // Unselected candidate — soft fill plus solid (not dashed) ring so candidates read clearly.
            ctx.beginPath();
            ctx.arc(x, y, r + 5, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(214,186,126,0.10)";
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = "rgba(214,186,126,0.65)";
            ctx.stroke();
          }
        }
      });

      // Target Preview Status Overlay
      if (targetPreviewMode) {
        const target = findCombatantByCid(selectedTargetCid);
        const targetName = target ? target.name : (selectedTargetCid ? "Unknown" : "None selected");
        const cap = findCapabilityById(targetPreviewMode.capabilityId);
        const advisory = getSelectedTargetAdvisory(cap, selectedTargetCid);

        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(10, 10, 320, 60);
        ctx.strokeStyle = "#d6ba7e";
        ctx.strokeRect(10, 10, 320, 60);
        ctx.fillStyle = "#d6ba7e";
        ctx.font = "bold 14px system-ui";
        ctx.textAlign = "left";
        ctx.fillText(`Action: ${targetPreviewMode.capabilityName}`, 20, 30);

        ctx.font = "12px system-ui";
        if (selectedTargetCid) {
          let advColor = "#d6ba7e";
          if (advisory.status === 'likely-in-range') advColor = "#4caf82";
          else if (advisory.status === 'likely-out-of-range') advColor = "#ff5b5b";

          ctx.fillStyle = "#e8eef7";
          ctx.fillText(`Target: ${targetName}`, 20, 48);
          ctx.fillStyle = advColor;
          ctx.fillText(`${advisory.distanceFt || 0} ft • ${advisory.label}`, 20, 64);
        } else {
          ctx.fillStyle = "#e8eef7";
          ctx.fillText("Select a target token", 20, 48);
        }

        ctx.fillStyle = "#e8eef7";
        ctx.textAlign = "right";
        ctx.fillText("Esc to cancel", 320, 30);
      }

      // Drag Preview
      if (dragging && activeUnit) {
        const { x, y } = gridToScreen(dragging.curCol, dragging.curRow);
        const r = Math.max(10, zoom * 0.35);
        const key = cellKey(dragging.curCol, dragging.curRow);
        const isValid = currentCostMap && currentCostMap.has(key);

        ctx.save();
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = isValid ? "rgba(106,169,255,0.4)" : "rgba(255,91,91,0.4)";
        ctx.fill();
        ctx.setLineDash([5, 3]);
        ctx.strokeStyle = isValid ? "rgba(255,255,255,0.8)" : "rgba(255,91,91,0.8)";
        ctx.stroke();

        const label = (activeUnit.name || "?").charAt(0).toUpperCase();
        ctx.font = `bold ${Math.max(10, Math.floor(zoom * 0.35))}px system-ui`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.fillText(label, x, y);
        ctx.restore();
      }
    }

    async function handleCombatControl() {
      if (!state) return;
      const isStart = !state.in_combat;
      const endpoint = isStart ? '/api/dm/combat/start' : '/api/dm/combat/next-turn';
      const tStart = DM_PERF ? performance.now() : 0;
      const btn = document.getElementById('combatControlBtn');
      const originalLabel = btn ? btn.textContent : null;
      if (btn) {
        btn.disabled = true;
        btn.textContent = isStart ? 'Starting…' : 'Advancing…';
      }
      try {
        const resp = await fetch(endpoint, { method: 'POST' });
        const data = await resp.json();
        if (data.ok) {
           // Prefer the snapshot the route already built; falling back to
           // a second round-trip used to add ~250ms+ per End Turn.
           if (data.snapshot && typeof data.snapshot === 'object') {
             applyAuthoritativeSnapshot(data.snapshot);
           } else {
             await fetchState();
           }
        } else {
           console.error('Combat control failed:', data.error);
        }
      } catch (err) {
        console.error('Network error during combat control:', err);
      } finally {
        if (btn) {
          btn.disabled = false;
          if (originalLabel !== null) btn.textContent = originalLabel;
        }
        dmPerfMark(isStart ? 'startCombat' : 'endTurn', performance.now() - tStart);
      }
    }
    document.getElementById('combatControlBtn')?.addEventListener('click', handleCombatControl);

    // Initial fetch and start polling
    fetchState();
    pollInterval = setInterval(fetchState, 2000);
  </script>
</body>
</html>
