<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DM Control – Initiative Tracker</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #141923;
      --panel2: #0f1320;
      --border: rgba(214,186,126,0.22);
      --text: #e8eef7;
      --muted: #93a2b8;
      --accent: #6aa9ff;
      --gold: #d6ba7e;
      --danger: #ff5b5b;
      --heal: #4caf82;
      --radius: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif; overflow: hidden; }

    .app { height: 100vh; display: flex; flex-direction: column; }

    /* ── Topbar ─────────────────────────────────────────────────── */
    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }
    .topbar h1 { font-size: 16px; color: var(--gold); flex: 1; }
    .workspace-link {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: var(--radius); padding: 5px 12px; cursor: pointer; font-size: 12px;
      text-decoration: none; display: inline-flex; align-items: center;
    }
    .workspace-link:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Mode Banner ─────────────────────────────────────────────── */
    .mode-banner {
      flex-shrink: 0;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      z-index: 10;
    }
    .mode-banner .mode-icon {
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .mode-banner .mode-text { flex: 1; line-height: 1.3; }
    .mode-banner.move-mode { border-bottom-color: rgba(106,169,255,0.4); }
    .mode-banner.move-mode .mode-icon { background: rgba(106,169,255,0.18); color: var(--accent); }
    .mode-banner.target-mode { border-bottom-color: rgba(214,186,126,0.6); background: rgba(214,186,126,0.08); }
    .mode-banner.target-mode .mode-icon { background: var(--gold); color: var(--bg); }
    .mode-banner.resolve-mode { border-bottom-color: rgba(76,175,130,0.5); background: rgba(76,175,130,0.08); }
    .mode-banner.resolve-mode .mode-icon { background: var(--heal); color: var(--bg); }
    .mode-banner.sequence-mode { border-bottom-color: rgba(106,169,255,0.6); background: rgba(106,169,255,0.08); }
    .mode-banner.sequence-mode .mode-icon { background: var(--accent); color: var(--bg); }
    .mode-banner.blocked-mode { border-bottom-color: var(--danger); background: rgba(255,91,91,0.08); }
    .mode-banner.blocked-mode .mode-icon { background: var(--danger); color: var(--bg); }
    .mode-banner .cancel-target-btn {
      background: var(--danger); color: var(--bg); border: none;
      border-radius: 4px; padding: 5px 12px; cursor: pointer;
      font-size: 12px; font-weight: bold; flex-shrink: 0;
    }
    .mode-banner .cancel-target-btn:hover { filter: brightness(1.15); }

    /* ── Main Map Surface ────────────────────────────────────────── */
    .main-surface {
      position: relative;
      background: #0a0c12;
      overflow: hidden;
      flex: 1 1 auto;
      min-height: 120px;
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: -webkit-optimize-contrast;
    }

    /* ── Split Handle ────────────────────────────────────────────── */
    .split-handle {
      flex: 0 0 8px;
      cursor: row-resize;
      background: var(--panel);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 11;
      transition: background 0.15s ease;
    }
    .split-handle:hover, .split-handle.dragging { background: var(--accent); }
    .split-handle::before {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 36px; height: 3px;
      background: var(--muted);
      border-radius: 2px;
      opacity: 0.5;
    }
    .split-handle:hover::before, .split-handle.dragging::before { background: var(--bg); opacity: 0.9; }

    /* ── Bottom Control Bar ──────────────────────────────────────── */
    .control-bar {
      background: var(--panel2);
      padding: 10px 16px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 0 0 320px;
      min-height: 160px;
      z-index: 10;
      overflow-y: auto;
    }
    .actor-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .actor-name { font-size: 18px; font-weight: bold; color: var(--text); }
    .actor-meta { font-size: 12px; color: var(--muted); }
    .actor-stat-row {
      display: flex; gap: 14px; flex-wrap: wrap;
      font-size: 12px; color: var(--text);
    }
    .actor-stat-row .stat-pill {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
    }
    .actor-stat-row .stat-pill strong { color: var(--gold); }
    .status-idle { color: var(--muted); font-style: italic; font-size: 13px; }

    /* ── Action Panel ───────────────────────────────────────────── */
    .action-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .action-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .group-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--gold);
      opacity: 0.8;
      border-bottom: 1px solid rgba(214,186,126,0.15);
      padding-bottom: 2px;
      margin-bottom: 2px;
    }
    .action-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }
    .action-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      min-height: 64px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .action-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(214,186,126,0.45);
    }
    .action-card.selected {
      background: rgba(106,169,255,0.14);
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(106,169,255,0.28);
    }
    .action-card .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .action-card .card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }
    .action-card .card-badges {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .action-card .card-badge {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.1);
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .action-card .card-badge.exec {
      background: rgba(106,169,255,0.18); color: var(--accent);
    }
    .action-card .card-badge.manual-tag {
      background: var(--gold); color: var(--bg); font-weight: bold;
    }
    .action-card .card-meta {
      font-size: 12px;
      color: var(--text);
      opacity: 0.85;
      line-height: 1.35;
    }
    .action-card.executable {
      border-left: 3px solid var(--accent);
    }
    .action-card.jammed {
      border-left: 3px dashed var(--danger);
      opacity: 0.6;
    }
    .action-card.trait {
      background: rgba(255,255,255,0.015);
      border-style: dashed;
      opacity: 0.7;
      min-height: 48px;
      padding: 7px 10px;
    }
    .action-card.trait .card-name { font-size: 12px; font-weight: 500; }
    .action-card.manual {
      border-left: 3px dashed var(--gold);
      background: rgba(214,186,126,0.06);
    }
    .action-card.manual .card-meta { color: var(--gold); opacity: 0.95; }

    .selected-summary {
      background: rgba(106,169,255,0.1);
      border-left: 3px solid var(--accent);
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .selected-summary h4 { font-size: 13px; color: var(--accent); margin-bottom: 4px; }
    .selected-summary p { font-size: 12px; color: var(--text); opacity: 0.9; line-height: 1.4; }

    /* ── Resolution Modal ────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content {
      background: var(--panel);
      border: 1px solid var(--gold);
      border-radius: 12px;
      width: min(92vw, 900px);
      max-height: 90vh;
      display: flex; flex-direction: column;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h2 { font-size: 18px; color: var(--gold); }
    .modal-body {
      padding: 20px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 16px;
    }
    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      display: flex; gap: 12px;
    }
    .modal-field { display: flex; flex-direction: column; gap: 6px; }
    .modal-label { font-size: 11px; text-transform: uppercase; color: var(--muted); font-weight: bold; }
    .modal-value { font-size: 14px; color: var(--text); }

    .outcome-btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .outcome-btn {
      flex: 1; min-width: 80px; padding: 10px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.05); color: var(--text); border-radius: 6px;
      cursor: pointer; font-size: 13px; font-weight: 600; text-align: center;
      transition: all 0.15s ease;
    }
    .outcome-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--muted); }
    .outcome-btn.active[data-outcome="fail"] { background: var(--danger); color: #fff; border-color: var(--danger); }
    .outcome-btn.active[data-outcome="success"] { background: var(--accent); color: #fff; border-color: var(--accent); }
    .outcome-btn.active[data-outcome="no_effect"] { background: var(--muted); color: #fff; border-color: var(--muted); }

    .damage-input-wrap {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      padding: 8px 12px; border-radius: 6px;
    }
    .damage-input-wrap input {
      background: none; border: none; color: var(--text); font-size: 20px;
      font-weight: bold; width: 60px; text-align: center; outline: none;
    }
    .damage-input-wrap .damage-label { font-size: 12px; color: var(--muted); flex: 1; }

    .apply-btn {
      flex: 2; background: var(--heal); color: var(--bg); border: none;
      padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer;
      font-size: 15px; transition: filter 0.15s ease;
    }
    .apply-btn:hover { filter: brightness(1.1); }
    .apply-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

    .cancel-btn {
      flex: 1; background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 12px; border-radius: 6px; font-weight: 500; cursor: pointer;
    }
    .cancel-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Status Overlay ─────────────────────────────────────────── */
    .status-overlay {
      position: absolute; top: 20px; right: 20px;
      background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 6px;
      font-size: 12px; border: 1px solid var(--border);
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>DM Control</h1>
      <div id="combatStatus" class="actor-meta">Loading state...</div>
      <button id="combatControlBtn" class="workspace-link" style="background:var(--accent-primary); color:white; font-weight:bold; border-color:var(--accent-primary); margin-left: auto; display:none"></button>
      <a href="/dm" class="workspace-link">↩ DM Cockpit</a>
    </header>

    <div id="modeBanner" class="mode-banner move-mode">
      <span class="mode-icon">Move</span>
      <span class="mode-text">Drag token on map to move. Movement is backend-validated.</span>
    </div>

    <main class="main-surface" id="mapWrap">
      <canvas id="mapCanvas"></canvas>
      <div id="statusOverlay" class="status-overlay" style="display:none;"></div>
    </main>

    <div id="splitHandle" class="split-handle" role="separator" aria-orientation="horizontal" title="Drag to resize map / control split"></div>

    <footer class="control-bar" id="controlBar">
      <div id="activeActorPanel">
        <div class="status-idle">Waiting for combat data...</div>
      </div>
      <div id="activeActionsPanel" class="action-panel">
        <!-- Actions rendered here -->
      </div>
    </footer>
  </div>

  <div id="resolutionModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Resolve Action</h2>
        <button class="workspace-link" onclick="closeLocalResolutionTray()" style="padding:4px 8px; font-size:11px;">✕</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Modal content rendered here -->
      </div>
      <div class="modal-footer" id="modalFooter">
        <button class="cancel-btn" onclick="closeLocalResolutionTray()">Cancel</button>
        <button class="apply-btn" id="modalApplyBtn" onclick="applyLocalResolutionResultsFromModal()">Apply Result</button>
      </div>
    </div>
  </div>

  <script>
    /**
     * DM Control Phase 3A2a — Target-preview mode scaffold.
     * /dmcontrol has map rendering, movement range visualization, and backend-validated drag/drop movement.
     * Includes read-only monster/NPC action cards and local selection state.
     * Now includes local-only target-preview mode scaffold for simple attacks.
     * Deferred: target click selection, resolution, AoE, and Multiattack.
     */

    const API_COMBAT = '/api/dm/combat';
    let pollInterval = null;
    let state = null;
    // DMPERF: lightweight, opt-in frontend timing (?perf=1 to enable).
    const DM_PERF = (() => {
      try { return new URLSearchParams(window.location.search).get('perf') === '1'; }
      catch (_) { return false; }
    })();
    function dmPerfMark(label, ms, extra) {
      if (!DM_PERF) return;
      try {
        const tail = extra ? ` ${extra}` : '';
        console.log(`[DMPERF] ${label} elapsed_ms=${ms.toFixed(1)}${tail}`);
      } catch (_) {}
    }
    // Idle-poll dedup: if /api/dm/combat returns the same payload as last
    // poll, skip the full renderState/draw to avoid the every-2s UI churn
    // that masks real user actions behind layout/canvas work.
    let lastPolledStateJson = null;
    // Dijkstra memoization key — recompute only when actor/pos/move-budget
    // or grid signature actually changed.
    let lastMoveCostKey = null;
    let lastMoveCostMap = null;

    // Phase 3A1/3A2a/3A2b state
    let capabilitySummary = null;
    let capabilityActorCid = null;
    let selectedCapabilityId = null;
    let lastActiveCid = null;
    let targetPreviewMode = null; // { capabilityId, capabilityName, actorCid, actionType }
    let selectedTargetCid = null;
    let localResolutionTray = null; // { actorCid, capabilityId, targetCid, openedAt }
    let localResolutionPacket = null;
    let localResolutionError = null;
    let localResolutionInFlight = false;
    let localResolutionApplying = false;
    let localResolutionOutcomes = {}; // Keyed by target CID as string
    let localResolutionOverrideRange = false;

    // Phase 3D2 sequence state
    let localSequencePacket = null;
    let localSequenceCompletedSteps = {}; // action_id -> count

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /**
     * Update the prominent mode banner (Move / Target / Resolve / Sequence).
     * Should be called from renderActionPanel and renderState so it stays in sync with local state.
     */
    function updateModeBanner() {
      const banner = document.getElementById('modeBanner');
      if (!banner) return;
      banner.classList.remove('move-mode', 'target-mode', 'resolve-mode', 'sequence-mode', 'blocked-mode');

      let icon = 'Move', text = 'Drag token to move. Drag map to pan. Wheel to zoom.', cls = 'move-mode', cancelHtml = '';

      if (!state || !state.in_combat) {
        icon = 'Idle';
        text = 'Out of combat. Drag map to pan. Wheel to zoom.';
        cls = 'move-mode';
      } else {
        const actor = (state.combatants || []).find(c => String(c.cid) === String(state.active_cid));
        if (actor && actor.is_pc) {
          icon = 'PC Turn';
          text = `Waiting for ${esc(actor.name)}. Drag map to pan. Wheel to zoom.`;
          cls = 'blocked-mode';
        } else if (localResolutionTray) {
          const cap = findCapabilityById(localResolutionTray.capabilityId);
          const target = findCombatantByCid(localResolutionTray.targetCid);
          const capName = cap ? cap.name : 'Action';
          const targetName = target ? target.name : 'target';
          icon = 'Resolve';
          text = `Resolving ${esc(capName)} vs ${esc(targetName)}. Choose Apply or Cancel.`;
          cls = 'resolve-mode';
          cancelHtml = `<button class="cancel-target-btn" onclick="cancelTargetPreviewMode()">Cancel</button>`;
        } else if (localSequencePacket) {
          const isChooseN = localSequencePacket.sequence_kind === 'choose_n';
          const budgetLabel = isChooseN ? ` (${localSequencePacket.remaining_budget} / ${localSequencePacket.total_budget || localSequencePacket.choose_n} left)` : '';
          icon = 'Sequence';
          text = `Multiattack sequence active: ${esc(localSequencePacket.name || 'Multiattack')}${budgetLabel}. Pick the next step from the panel below. Movement is blocked.`;
          cls = 'sequence-mode';
          cancelHtml = `<button class="cancel-target-btn" onclick="cancelLocalSequence()">End Sequence</button>`;
        } else if (targetPreviewMode) {
          icon = 'Target';
          text = `Targeting ${esc(targetPreviewMode.capabilityName || 'action')}. Click an enemy token to select. Drag map to pan.`;
          cls = 'target-mode';
          cancelHtml = `<button class="cancel-target-btn" onclick="cancelTargetPreviewMode()">Cancel Targeting</button>`;
        } else if (actor && !actor.is_pc) {
          icon = 'Move';
          const units = state.tactical_map?.units || [];
          const unit = units.find(u => String(u.cid) === String(state.active_cid));
          const moveRemaining = unit ? (unit.move_remaining ?? unit.speed ?? 0) : 0;
          text = `Drag token to move (${esc(actor.name)}, ${moveRemaining} ft remaining). Drag map to pan. Wheel to zoom.`;
          cls = 'move-mode';
        }
      }

      banner.classList.add(cls);
      banner.innerHTML = `<span class="mode-icon">${esc(icon)}</span><span class="mode-text">${text}</span>${cancelHtml}`;
    }

    /**
     * Reset all local UI state (targeting, preview, resolution).
     */
    function fullResetLocalState() {
      targetPreviewMode = null;
      selectedTargetCid = null;
      localResolutionTray = null;
      localResolutionPacket = null;
      localResolutionError = null;
      localResolutionInFlight = false;
      localResolutionApplying = false;
      localResolutionOutcomes = {};
      selectedCapabilityId = null;
      localSequencePacket = null;
      localSequenceCompletedSteps = {};

      const modal = document.getElementById('resolutionModal');
      if (modal) modal.classList.remove('active');
    }

    /**
     * Outcome helpers for Phase 3C1
     */
    function getLocalResolutionOutcome(targetCid) {
      return localResolutionOutcomes[String(targetCid)] || 'fail';
    }

    /**
     * Normalize the execute response data into a consistent local object.
     */
    function normalizeLocalExecutionResult(data) {
      const result = data?.result || {};
      const packet = result.resolution_packet || null;
      const resolution = result.resolution || null;
      const error = result.error || data?.detail || null;

      return {
        ok: !!data?.ok && !error,
        resolution,
        packet,
        error,
        deferredReason: (resolution === 'automatic' || resolution === 'assisted_sequence') ? resolution : null
      };
    }

    /**
     * Format a single packet entry (damage roll, effect, condition) into a
     * short readable string. Prevents [object Object] when arrays of objects
     * are joined directly.
     */
    function formatPacketValue(value) {
      if (value === null || value === undefined) return '';
      if (typeof value === 'string' || typeof value === 'number' || typeof value === 'boolean') {
        return String(value);
      }
      if (Array.isArray(value)) {
        return value.map(formatPacketValue).filter(s => s).join(', ');
      }
      if (typeof value === 'object') {
        // Damage-roll-like: prefer rolled total + type, else formula.
        if (value.rolled !== undefined || value.formula || value.type) {
          const parts = [];
          if (value.rolled !== undefined && value.rolled !== null) parts.push(String(value.rolled));
          if (value.formula) parts.push(`(${value.formula})`);
          if (value.type) parts.push(String(value.type));
          if (parts.length) return parts.join(' ');
        }
        // Effect/condition-like: prefer name/condition/label/text.
        const label = value.name || value.condition || value.label || value.text || value.kind;
        if (label) return String(label);
        // Last resort: compact JSON, never raw [object Object].
        try { return JSON.stringify(value); } catch (e) { return ''; }
      }
      return '';
    }

    function formatPacketEntries(arr) {
      if (!Array.isArray(arr) || arr.length === 0) return '';
      return arr.map(v => esc(formatPacketValue(v))).filter(s => s).join(', ');
    }

    /**
     * Build safe escaped HTML for the resolution packet preview.
     */
    function renderLocalResolutionPacket(packet, resolution) {
      if (!packet) return '<div class="actor-meta">No structured packet details available yet.</div>';

      let html = '<div style="display:flex; flex-direction:column; gap:4px;">';

      const name = packet.capability_name || packet.name || 'Action';
      html += `<div style="font-weight:bold; color:var(--gold);">${esc(name)}</div>`;

      if (packet.save_dc && packet.save_ability) {
        html += `<div class="actor-meta">DC ${esc(packet.save_dc)} ${esc(String(packet.save_ability).toUpperCase())} Save</div>`;
      } else if (packet.save_dc) {
        html += `<div class="actor-meta">DC ${esc(packet.save_dc)} Save</div>`;
      }

      if (packet.attack_bonus !== undefined || packet.to_hit !== undefined) {
        const val = packet.attack_bonus ?? packet.to_hit;
        html += `<div class="actor-meta">Attack Bonus: ${val >= 0 ? '+' : ''}${esc(val)}</div>`;
      }

      if (packet.total_fail !== undefined || packet.damage_formula) {
        const dmg = packet.total_fail;
        const formula = packet.damage_formula;
        html += `<div class="actor-meta">Damage: <strong>${esc(dmg !== undefined ? dmg : '?')}</strong> ${formula ? `(${esc(formula)})` : ''}</div>`;
      }

      const rollsText = formatPacketEntries(packet.damage_rolls);
      if (rollsText) {
        html += `<div class="actor-meta" style="font-size:10px; opacity:0.8;">Rolls: ${rollsText}</div>`;
      }

      const effectsText = formatPacketEntries(packet.effects);
      if (effectsText) {
        html += `<div class="actor-meta">Effects: ${effectsText}</div>`;
      }

      const conditionsText = formatPacketEntries(packet.conditions);
      if (conditionsText) {
        html += `<div class="actor-meta">Conditions: ${conditionsText}</div>`;
      }

      html += '</div>';

      // Debug details
      html += `
        <details style="margin-top:8px; font-size:10px; color:var(--muted); border-top:1px dashed var(--border); padding-top:4px;">
          <summary style="cursor:pointer; opacity:0.6;">Packet debug details</summary>
          <pre style="margin-top:4px; white-space:pre-wrap; background:rgba(0,0,0,0.2); padding:4px; border-radius:2px;">${esc(JSON.stringify(packet, null, 2))}</pre>
        </details>
      `;

      return html;
    }

    // Map state
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    let zoom = 40;
    let panX = 0;
    let panY = 0;
    let fittedToGrid = false;
    let lastGrid = {cols: 0, rows: 0};
    let dragging = null; // {cid, col, row, curCol, curRow, startX, startY}
    let isMoving = false; // Guard against duplicate moves
    let panning = null; // {x, y, panX, panY}

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      // Re-fit the grid view when the surface dimensions change so the map redraws cleanly.
      fittedToGrid = false;
      draw();
    }

    window.addEventListener('resize', resize);
    resize();

    // ── Resizable map / control split ─────────────────────────────
    const SPLIT_STORAGE_KEY = 'dmcontrol.controlBarHeightPx';
    const SPLIT_MIN_PX = 140;
    const SPLIT_MAX_PADDING = 200; // keep at least this much map height
    const splitHandle = document.getElementById('splitHandle');
    const controlBarEl = document.getElementById('controlBar');

    function clampControlHeight(px) {
      if (!Number.isFinite(px)) return 320;
      const h = window.innerHeight || 800;
      const max = Math.max(SPLIT_MIN_PX, h - SPLIT_MAX_PADDING);
      return Math.min(Math.max(px, SPLIT_MIN_PX), max);
    }

    function applyControlBarHeight(px, persist) {
      const target = clampControlHeight(px);
      controlBarEl.style.flex = `0 0 ${target}px`;
      if (persist) {
        try { localStorage.setItem(SPLIT_STORAGE_KEY, String(target)); } catch (e) {}
      }
      // Defer canvas resize until layout settles.
      // Call multiple times to ensure we catch the final layout state after CSS transitions/flex settling.
      requestAnimationFrame(resize);
      setTimeout(resize, 50);
      setTimeout(resize, 150);
    }

    function loadControlBarHeight() {
      let saved = null;
      try { saved = localStorage.getItem(SPLIT_STORAGE_KEY); } catch (e) {}
      const px = parseInt(saved, 10);
      if (!Number.isFinite(px)) {
        applyControlBarHeight(320, false);
      } else {
        applyControlBarHeight(px, false);
      }
    }
    loadControlBarHeight();

    let splitDrag = null;
    splitHandle.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      const rect = controlBarEl.getBoundingClientRect();
      splitDrag = { startY: e.clientY, startHeight: rect.height, pointerId: e.pointerId };
      splitHandle.classList.add('dragging');
      splitHandle.setPointerCapture(e.pointerId);
    });
    splitHandle.addEventListener('pointermove', (e) => {
      if (!splitDrag) return;
      const dy = e.clientY - splitDrag.startY;
      // Dragging handle down shrinks control bar (more map); dragging up grows it.
      applyControlBarHeight(splitDrag.startHeight - dy, false);
    });
    function endSplitDrag(e) {
      if (!splitDrag) return;
      try { splitHandle.releasePointerCapture(splitDrag.pointerId); } catch (err) {}
      splitHandle.classList.remove('dragging');
      const rect = controlBarEl.getBoundingClientRect();
      applyControlBarHeight(rect.height, true);
      splitDrag = null;
    }
    splitHandle.addEventListener('pointerup', endSplitDrag);
    splitHandle.addEventListener('pointercancel', endSplitDrag);
    splitHandle.addEventListener('dblclick', () => {
      // Reset to default split.
      applyControlBarHeight(320, true);
    });
    window.addEventListener('resize', () => {
      // Re-clamp on viewport changes so saved value can never push elements off-screen.
      const rect = controlBarEl.getBoundingClientRect();
      applyControlBarHeight(rect.height, false);
    });

    function screenToGrid(x, y) {
      return {
        col: Math.floor((x - panX) / zoom),
        row: Math.floor((y - panY) / zoom)
      };
    }

    /**
     * Hit-test screen coordinates against rendered tokens.
     * Prefers the active actor when multiple tokens overlap or when the click
     * is anywhere within the active token's visible radius.
     */
    function getTokenAtScreen(x, y) {
      if (!state || !state.tactical_map) return null;
      const units = state.tactical_map.units || [];
      const r = Math.max(10, zoom * 0.35);
      const activeCid = state.active_cid;

      // Pass 1: prefer active actor token.
      const activeUnit = units.find(u => u.pos && String(u.cid) === String(activeCid));
      if (activeUnit) {
        const tx = panX + activeUnit.pos.col * zoom + zoom / 2;
        const ty = panY + activeUnit.pos.row * zoom + zoom / 2;
        const d = Math.hypot(x - tx, y - ty);
        if (d <= r + 4) return activeUnit;
      }

      // Pass 2: any other token whose drawn circle contains (x, y).
      for (const u of units) {
        if (!u.pos) continue;
        const tx = panX + u.pos.col * zoom + zoom / 2;
        const ty = panY + u.pos.row * zoom + zoom / 2;
        const d = Math.hypot(x - tx, y - ty);
        if (d <= r) return u;
      }
      return null;
    }

    function showTransientStatus(msg, color) {
      const statusEl = document.getElementById('combatStatus');
      if (!statusEl) return;
      statusEl.textContent = msg;
      statusEl.style.color = color || 'var(--gold)';
      // Reset after a short delay so the round/turn label returns.
      clearTimeout(showTransientStatus._t);
      showTransientStatus._t = setTimeout(() => {
        if (state && state.in_combat) {
          statusEl.textContent = `Round ${state.round}, Turn ${state.turn}`;
          statusEl.style.color = 'var(--gold)';
        }
      }, 1800);
    }

    canvas.addEventListener('pointerdown', (e) => {
      if (!state || !state.tactical_map || isMoving) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      if (targetPreviewMode) {
        const hit = getTokenAtScreen(x, y);
        if (hit && isTargetCandidate(hit)) {
          selectPreviewTarget(hit.cid);
          return;
        } else {
          const { col, row } = screenToGrid(x, y);
          const cellUnit = findUnitAtGridCell(col, row);
          if (cellUnit && isTargetCandidate(cellUnit)) {
            selectPreviewTarget(cellUnit.cid);
            return;
          }
        }
        // No target hit; allow panning instead of returning.
      }

      const activeCid = state.active_cid;
      const activeUnit = (state.tactical_map.units || []).find(u => String(u.cid) === String(activeCid));
      const actor = state.combatants.find(c => String(c.cid) === String(activeCid));

      const hit = getTokenAtScreen(x, y);
      const isActiveHit = hit && activeUnit && actor && !actor.is_pc && String(hit.cid) === String(activeCid);

      if (isActiveHit && !targetPreviewMode && !localResolutionTray) {
        dragging = {
          cid: activeCid,
          col: activeUnit.pos.col,
          row: activeUnit.pos.row,
          curCol: activeUnit.pos.col,
          curRow: activeUnit.pos.row,
          startX: x,
          startY: y
        };
        canvas.setPointerCapture(e.pointerId);
        draw();
      } else {
        // Start pan
        panning = { x, y, panX, panY };
        canvas.setPointerCapture(e.pointerId);
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      if (dragging) {
        const { col, row } = screenToGrid(x, y);
        if (col !== dragging.curCol || row !== dragging.curRow) {
          dragging.curCol = col;
          dragging.curRow = row;
          draw();
        }
      } else if (panning) {
        panX = panning.panX + (x - panning.x);
        panY = panning.panY + (y - panning.y);
        fittedToGrid = true;
        draw();
      }
    });

    canvas.addEventListener('pointerup', async (e) => {
      canvas.releasePointerCapture(e.pointerId);
      if (dragging) {
        const finalCol = dragging.curCol;
        const finalRow = dragging.curRow;
        const dragCid = dragging.cid;
        dragging = null;

        const activeUnit = (state.tactical_map.units || []).find(u => String(u.cid) === String(dragCid));
        if (activeUnit && (activeUnit.pos.col !== finalCol || activeUnit.pos.row !== finalRow)) {
          await executeMove(dragCid, finalCol, finalRow);
        } else {
          draw();
        }
      } else if (panning) {
        panning = null;
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (localResolutionTray) {
          closeLocalResolutionTray();
          e.preventDefault();
        } else if (targetPreviewMode) {
          cancelTargetPreviewMode();
          e.preventDefault();
        }
      }
    });

    async function executeMove(cid, col, row) {
      isMoving = true;
      renderError('Moving...');
      const tMoveStart = DM_PERF ? performance.now() : 0;
      try {
        const resp = await fetch(`/api/dm/map/combatants/${cid}/move`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ col, row })
        });
        if (!resp.ok) {
          const errData = await resp.json();
          throw new Error(errData.detail || `HTTP ${resp.status}`);
        }
        // The move route already returns a fresh DM snapshot built from
        // the broadcast it just issued — consume it directly instead of
        // a second /api/dm/combat round-trip + repaint.
        const data = await resp.json();
        if (data && data.snapshot && typeof data.snapshot === 'object') {
          applyAuthoritativeSnapshot(data.snapshot);
        } else {
          await fetchState();
        }
      } catch (err) {
        console.error('Move error:', err);
        renderError(err.message);
      } finally {
        isMoving = false;
        draw();
        dmPerfMark('executeMove', performance.now() - tMoveStart);
      }
    }

    function zoomAt(newZoom, focusX, focusY) {
      const preZoom = zoom;
      zoom = Math.max(10, Math.min(200, newZoom));
      const col = (focusX - panX) / preZoom;
      const row = (focusY - panY) / preZoom;
      panX = focusX - col * zoom;
      panY = focusY - row * zoom;
      fittedToGrid = true;
      draw();
    }

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const delta = e.deltaY || 0;
      const factor = delta > 0 ? 0.9 : 1.1;
      zoomAt(zoom * factor, x, y);
    }, { passive: false });

    async function fetchState() {
      const tFetchStart = DM_PERF ? performance.now() : 0;
      try {
        const resp = await fetch(API_COMBAT);
        if (!resp.ok) {
          if (resp.status === 401) {
             renderError('Admin authentication required. Open DM Cockpit first.');
             return;
          }
          throw new Error(`HTTP ${resp.status}`);
        }
        const text = await resp.text();
        // Skip render+draw when the poll returns an identical payload — this
        // is the common idle case and was forcing full renderState+Dijkstra
        // every 2s, masking real interactivity behind UI churn.
        if (text === lastPolledStateJson && state) {
          dmPerfMark('fetchState(skip-unchanged)', performance.now() - tFetchStart);
          return;
        }
        lastPolledStateJson = text;
        const data = JSON.parse(text);
        state = data;
        const tRenderStart = DM_PERF ? performance.now() : 0;
        renderState(data);
        const tRenderEnd = DM_PERF ? performance.now() : 0;
        draw();
        const tDrawEnd = DM_PERF ? performance.now() : 0;
        if (DM_PERF) {
          dmPerfMark('renderState', tRenderEnd - tRenderStart);
          dmPerfMark('draw', tDrawEnd - tRenderEnd);
          dmPerfMark('fetchState(full)', tDrawEnd - tFetchStart);
        }
      } catch (err) {
        console.error('Fetch error:', err);
        renderError('Offline or server error');
      }
    }

    // Apply an authoritative snapshot returned in-line by a mutating
    // endpoint (resolve-targets, next-turn, etc.) instead of waiting for
    // the next poll cycle. Updates the dedup hash so the next idle poll
    // can short-circuit.
    function applyAuthoritativeSnapshot(snapshot) {
      if (!snapshot || typeof snapshot !== 'object') return;
      try { lastPolledStateJson = JSON.stringify(snapshot); }
      catch (_) { lastPolledStateJson = null; }
      state = snapshot;
      renderState(snapshot);
      draw();
    }

    function renderError(msg) {
      const statusEl = document.getElementById('combatStatus');
      if (statusEl) {
        statusEl.textContent = msg;
        statusEl.style.color = 'var(--danger)';
      }
    }

    async function fetchCapabilitiesForActiveActor(actor) {
      if (!actor || actor.is_pc) {
        capabilitySummary = null;
        capabilityActorCid = null;
        selectedCapabilityId = null;
        localResolutionOutcomes = {};
        cancelTargetPreviewMode();
        renderActionPanel(actor, null);
        return;
      }

      if (String(capabilityActorCid) === String(actor.cid)) {
        // Already have it, just re-render in case local state (selection) changed
        renderActionPanel(actor, capabilitySummary);
        return;
      }

      try {
        const resp = await fetch(`/api/dm/monster-capabilities/${actor.cid}`);
        if (!resp.ok) {
          if (resp.status === 404) {
            capabilitySummary = { matched: false };
          } else {
            throw new Error(`HTTP ${resp.status}`);
          }
        } else {
          const payload = await resp.json();
          if (payload.ok && payload.summary) {
            capabilitySummary = payload.summary;
          } else {
            capabilitySummary = { matched: false };
          }
        }
        capabilityActorCid = actor.cid;
        selectedCapabilityId = null;
        localResolutionOutcomes = {};
        cancelTargetPreviewMode();
        renderActionPanel(actor, capabilitySummary);
      } catch (err) {
        console.error('Capabilities fetch error:', err);
        renderActionPanel(actor, null);
      }
    }

    function findCapabilityById(id) {
      if (!capabilitySummary || !capabilitySummary.groups) return null;
      for (const list of Object.values(capabilitySummary.groups)) {
        if (!Array.isArray(list)) continue;
        const found = list.find(a => String(a.id) === String(id));
        if (found) return found;
      }
      return null;
    }

    function isPreviewableTargetAction(cap) {
      if (!cap || cap.executable === false) return false;
      const type = (cap.action_type || "").toLowerCase();
      // Modifiers are executable but not target-previewable on map
      if (type === "modifier") return false;
      if (type.includes("attack") || type.includes("melee") || type.includes("ranged")) return true;
      const mode = (cap.target_mode || "").toLowerCase();
      if (mode.includes("creature") || mode.includes("target")) return true;
      return false;
    }

    function enterTargetPreviewMode(cap) {
      if (!cap || !state) return;
      selectedTargetCid = null;
      localResolutionTray = null;
      targetPreviewMode = {
        capabilityId: cap.id,
        capabilityName: cap.name,
        actorCid: state.active_cid,
        actionType: cap.action_type
      };
      draw();
    }

    function cancelTargetPreviewMode() {
      if (!targetPreviewMode) return;
      targetPreviewMode = null;
      selectedTargetCid = null;
      localResolutionTray = null;
      localResolutionPacket = null;
      localResolutionError = null;
      localResolutionInFlight = false;
      localResolutionApplying = false;
      localResolutionOutcomes = {};

      const modal = document.getElementById('resolutionModal');
      if (modal) modal.classList.remove('active');

      draw();
      const actor = (state?.combatants || []).find(c => String(c.cid) === String(state?.active_cid));
      renderActionPanel(actor, capabilitySummary);
    }

    function openLocalResolutionTray(actorCid, capabilityId, targetCid) {
      localResolutionTray = {
        actorCid,
        capabilityId,
        targetCid,
        openedAt: Date.now()
      };
      localResolutionPacket = null;
      localResolutionError = null;
      localResolutionInFlight = false;
      // Reset outcome for this target specifically when opening the tray
      localResolutionOutcomes[String(targetCid)] = 'fail';
      draw();
      const actor = (state?.combatants || []).find(c => String(c.cid) === String(state?.active_cid));
      renderActionPanel(actor, capabilitySummary);
    }

    function closeLocalResolutionTray() {
      localResolutionTray = null;
      selectedTargetCid = null; // Clear target selection when closing tray to allow re-selection
      localResolutionPacket = null;
      localResolutionError = null;
      localResolutionInFlight = false;
      localResolutionApplying = false;
      localResolutionOutcomes = {};

      const modal = document.getElementById('resolutionModal');
      if (modal) modal.classList.remove('active');

      draw();
      const actor = (state?.combatants || []).find(c => String(c.cid) === String(state?.active_cid));
      renderActionPanel(actor, capabilitySummary);
    }

    async function activateModifier(id) {
      if (localResolutionInFlight || !state) return;
      const actorCid = state.active_cid;
      localResolutionInFlight = true;
      draw();
      try {
        const resp = await fetch(`/api/dm/monster-capabilities/${actorCid}/execute`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            capability_id: id
          })
        });
        const rawData = await resp.json();
        const data = normalizeLocalExecutionResult(rawData);
        if (!data.ok) throw new Error(data.error || "Failed to activate modifier.");

        showTransientStatus(data.status || "Modifier activated.", 'var(--heal)');

        if (rawData.snapshot) {
          state = rawData.snapshot;
          draw();
        }

        // Refresh capabilities to show "Active" badge
        capabilityActorCid = null; // Force refresh
        const actor = (state.combatants || []).find(c => String(c.cid) === String(state.active_cid));
        await fetchCapabilitiesForActiveActor(actor);

      } catch (err) {
        console.error('Activate modifier error:', err);
        showTransientStatus(err.message, 'var(--danger)');
      } finally {
        localResolutionInFlight = false;
        const actor = (state?.combatants || []).find(c => String(c.cid) === String(state?.active_cid));
        renderActionPanel(actor, capabilitySummary);
      }
    }

    async function prepareLocalResolutionPreview() {
      if (!localResolutionTray || localResolutionInFlight || !state) return;

      const actorCid = localResolutionTray.actorCid;
      const targetCid = localResolutionTray.targetCid;
      localResolutionInFlight = true;
      localResolutionError = null;
      localResolutionPacket = null;
      localResolutionOutcomes[String(targetCid)] = 'fail';

      const actor = (state?.combatants || []).find(c => String(c.cid) === String(state?.active_cid));
      renderActionPanel(actor, capabilitySummary);

      try {
        const resp = await fetch(`/api/dm/monster-capabilities/${actorCid}/execute`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            capability_id: localResolutionTray.capabilityId,
            target_cid: localResolutionTray.targetCid,
            spend: "none",
            roll_mode: "normal"
          })
        });

        const rawData = await resp.json();
        const data = normalizeLocalExecutionResult(rawData);

        if (!data.ok) {
          throw new Error(data.error || `HTTP ${resp.status}`);
        }

        if (data.deferredReason === 'automatic') {
          localResolutionError = "Automatic resolution is deferred on /dmcontrol. Manual fallback: apply this result in /dm.";
        } else if (data.deferredReason === 'assisted_sequence') {
          // Backend returned a sequence packet.
          localSequencePacket = rawData.result;
          localSequenceCompletedSteps = {};

          // If backend provided completion metadata, prioritize it
          if (localSequencePacket.steps) {
            localSequencePacket.steps.forEach(s => {
               if (s.completed !== undefined) {
                 localSequenceCompletedSteps[String(s.action_id)] = s.completed;
               }
            });
          }

          localResolutionPacket = null;
          localResolutionTray = null; // Close the immediate tray to show sequence tray
        } else if (data.packet) {
          localResolutionPacket = data.packet;
          openResolutionModal();
        } else {
          localResolutionError = "No structured packet details available yet. Manual fallback: apply result in /dm.";
        }

        if (rawData.snapshot) {
           state = rawData.snapshot;
           draw();
        }
      } catch (err) {
        console.error('Execution preview error:', err);
        localResolutionError = err.message;
      } finally {
        localResolutionInFlight = false;
        renderActionPanel(actor, capabilitySummary);
      }
    }

    async function startSequence(id) {
      if (localResolutionInFlight || !state) return;
      const actorCid = state.active_cid;
      localResolutionInFlight = true;
      draw();
      try {
        const resp = await fetch(`/api/dm/monster-capabilities/${actorCid}/execute`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            capability_id: id,
            spend: "action"
          })
        });
        const rawData = await resp.json();
        const data = normalizeLocalExecutionResult(rawData);
        if (!data.ok) throw new Error(data.error || "Failed to start sequence.");

        if (data.resolution === 'assisted_sequence') {
          localSequencePacket = rawData.result;
          localSequenceCompletedSteps = {};
          if (localSequencePacket.steps) {
            localSequencePacket.steps.forEach(s => {
              if (s.completed !== undefined) {
                localSequenceCompletedSteps[String(s.action_id)] = s.completed;
              }
            });
          }
        }
        if (rawData.snapshot) {
          state = rawData.snapshot;
          draw();
        }
      } catch (err) {
        console.error('Start sequence error:', err);
        showTransientStatus(err.message, 'var(--danger)');
      } finally {
        localResolutionInFlight = false;
        const actor = (state?.combatants || []).find(c => String(c.cid) === String(state?.active_cid));
        renderActionPanel(actor, capabilitySummary);
      }
    }

    async function applyLocalResolutionResults(applyDamage, applyEffects) {
      if (!localResolutionTray || !localResolutionPacket || localResolutionInFlight || localResolutionApplying || !state) return;

      const startTime = performance.now();
      console.log(`[Apply] Starting resolution apply... damage=${applyDamage}, effects=${applyEffects}`);

      // Friendly-fire confirmation: even if a same-side selection has slipped
      // past isTargetCandidate, require explicit confirm before applying damage/effects.
      if ((applyDamage || applyEffects) && isFriendlyFireSelection()) {
        const target = findCombatantByCid(localResolutionTray.targetCid);
        const ok = window.confirm(`Friendly target: ${target ? target.name : 'this unit'} is on the same side as the active actor. Apply anyway?`);
        if (!ok) return;
      }

      const actorCid = localResolutionTray.actorCid;
      const capId = localResolutionTray.capabilityId;
      const targetCid = localResolutionTray.targetCid;
      const outcome = getLocalResolutionOutcome(targetCid);

      localResolutionApplying = true;
      localResolutionError = null;
      const actor = (state?.combatants || []).find(c => String(c.cid) === String(state?.active_cid));

      // Provide immediate feedback by re-rendering the panel/modal
      const tPanelStart = DM_PERF ? performance.now() : 0;
      renderActionPanel(actor, capabilitySummary);
      if (localResolutionPacket) renderResolutionModal();
      if (DM_PERF) dmPerfMark('applyResults.feedbackRender', performance.now() - tPanelStart);

      try {
        const tBuildStart = DM_PERF ? performance.now() : 0;
        const requestBody = JSON.stringify({
          capability_id: capId,
          targets: [{ target_cid: String(targetCid), outcome: outcome }],
          damage_rolls: localResolutionPacket.damage_rolls || [],
          apply_damage: !!applyDamage,
          apply_effects: !!applyEffects,
          override_range: !!localResolutionOverrideRange
        });
        if (DM_PERF) dmPerfMark('applyResults.requestBuild', performance.now() - tBuildStart);

        const tFetchStart = DM_PERF ? performance.now() : 0;
        const resp = await fetch(`/api/dm/monster-capabilities/${actorCid}/resolve-targets`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: requestBody
        });
        const tFetchEnd = DM_PERF ? performance.now() : 0;
        if (DM_PERF) dmPerfMark('applyResults.fetch', tFetchEnd - tFetchStart);

        const tParseStart = DM_PERF ? performance.now() : 0;
        const data = await resp.json();
        if (DM_PERF) dmPerfMark('applyResults.responseJsonParse', performance.now() - tParseStart);
        const endTime = performance.now();
        console.log(`[Apply] Resolution request took ${(endTime - startTime).toFixed(1)}ms`);

        if (!resp.ok || !data.ok) {
          // Check for sequence-specific rejections
          const errorMsg = data.detail || (data.result && data.result.error) || 'Resolution failed.';
          if (errorMsg.includes("Max attacks") || errorMsg.includes("budget exhausted") || errorMsg.includes("active sequence")) {
             localResolutionError = `Sequence Error: ${errorMsg}`;
          } else {
             localResolutionError = errorMsg;
          }
          throw new Error(localResolutionError);
        }

        // On success, apply snapshot immediately
        if (data.snapshot) {
           const tSnapStart = DM_PERF ? performance.now() : 0;
           applyAuthoritativeSnapshot(data.snapshot);
           if (DM_PERF) dmPerfMark('applyResults.applySnapshot', performance.now() - tSnapStart);
        }

        // Compact success feedback via status bar
        showTransientStatus('Results applied successfully.', 'var(--heal)');

        // Consume backend-authored sequence state if returned
        let sequenceWasActive = !!localSequencePacket;
        let sequenceComplete = false;

        if (data.active_sequence_parent_id) {
           // Backend says a sequence is still active or was just updated.
           // Refresh our local state from backend metadata.
           localSequencePacket = localSequencePacket || {};
           localSequencePacket.capability_id = data.active_sequence_parent_id;
           localSequencePacket.sequence_kind = data.sequence_kind;
           localSequencePacket.choose_n = data.choose_n;
           localSequencePacket.remaining_budget = data.remaining_budget;
           localSequencePacket.completed_count = data.completed_count;

           if (data.steps) {
             localSequencePacket.steps = data.steps;
             data.steps.forEach(s => {
               localSequenceCompletedSteps[String(s.action_id)] = s.completed;
             });
           }
           sequenceWasActive = true;
        } else if (sequenceWasActive) {
          // Fallback to local increment if backend didn't return metadata
          const prev = Number(localSequenceCompletedSteps[String(capId)] || 0);
          localSequenceCompletedSteps[String(capId)] = prev + 1;

          const steps = Array.isArray(localSequencePacket.steps) ? localSequencePacket.steps : [];
          sequenceComplete = steps.length > 0 && steps.every(s => {
            const done = Number(localSequenceCompletedSteps[String(s.action_id)] || 0);
            return done >= Number(s.count || 1);
          });

          if (localSequencePacket.sequence_kind === 'choose_n' && localSequencePacket.remaining_budget !== undefined) {
             localSequencePacket.remaining_budget--;
             if (localSequencePacket.remaining_budget <= 0) sequenceComplete = true;
          }
        }

        // Always close the immediate tray and clear stale targeting state
        closeLocalResolutionTray();
        targetPreviewMode = null;
        selectedTargetCid = null;

        if (sequenceWasActive && (sequenceComplete || data.active_sequence_complete)) {
          showTransientStatus('Multiattack sequence complete.', 'var(--heal)');
          localSequencePacket = null;
          localSequenceCompletedSteps = {};
          selectedCapabilityId = null;
        } else if (sequenceWasActive) {
          if (localSequencePacket && localSequencePacket.capability_id) {
            selectedCapabilityId = String(localSequencePacket.capability_id);
          } else {
            selectedCapabilityId = null;
          }
        } else {
          // Outside Multiattack, after Apply Result, standalone targeting should end cleanly.
          selectedCapabilityId = null;
        }
        const tFinalRenderStart = DM_PERF ? performance.now() : 0;
        renderActionPanel(actor, capabilitySummary);
        draw();
        if (DM_PERF) {
          dmPerfMark('applyResults.finalRenderAndDraw', performance.now() - tFinalRenderStart);
          dmPerfMark('applyResultsEndToEnd', performance.now() - startTime,
            `targets=1 apply_damage=${!!applyDamage} apply_effects=${!!applyEffects}`);
        }
      } catch (err) {
        console.error('Apply results error:', err);
        localResolutionError = err.message;
        renderActionPanel(actor, capabilitySummary);
        if (localResolutionPacket) renderResolutionModal();
        if (DM_PERF) dmPerfMark('applyResultsEndToEnd(error)', performance.now() - startTime);
      } finally {
        localResolutionApplying = false;
        // Final re-render to ensure buttons are re-enabled if needed
        renderActionPanel(actor, capabilitySummary);
      }
    }

    function selectLocalSequenceStep(stepActionId) {
      const cap = findCapabilityById(stepActionId);
      if (!cap) return;
      selectedCapabilityId = stepActionId;
      enterTargetPreviewMode(cap);
      const actor = (state?.combatants || []).find(c => String(c.cid) === String(state?.active_cid));
      renderActionPanel(actor, capabilitySummary);

      localSequencePacket = null;

    function getLocalResolutionContext() {
      if (!localResolutionTray || !state) return null;
      const actor = findCombatantByCid(localResolutionTray.actorCid);
      const cap = findCapabilityById(localResolutionTray.capabilityId);
      const target = findCombatantByCid(localResolutionTray.targetCid);
      const advisory = getSelectedTargetAdvisory(cap, localResolutionTray.targetCid);
      return { actor, cap, target, advisory };
    }

    function findUnitAtGridCell(col, row) {
      if (!state || !state.tactical_map || !state.tactical_map.units) return null;
      return state.tactical_map.units.find(u => u.pos && u.pos.col === col && u.pos.row === row);
    }

    function findCombatantByCid(cid) {
      if (!state || !state.combatants) return null;
      return state.combatants.find(c => String(c.cid) === String(cid));
    }

    function isTargetCandidate(unit) {
      if (!targetPreviewMode || !unit || !unit.cid) return false;
      // Cannot target the active actor.
      if (String(unit.cid) === String(targetPreviewMode.actorCid)) return false;
      // Friendly-fire guard: by default, exclude same-side units from candidates.
      // This prevents Black and Tan enemies from being trivially clickable when
      // a Black and Tan is the active actor. DM override is documented as a
      // future toggle; for now same-side selection requires an explicit confirm.
      if (isSameSideAsActor(unit)) return false;
      return true;
    }

    /**
     * Same-side detection. Uses `ally` boolean (preferred), then falls back to
     * `role` equality. PCs/allies share a side; enemies share a side.
     */
    function isSameSideAsActor(unit) {
      if (!targetPreviewMode || !state) return false;
      const units = state.tactical_map?.units || [];
      const actorUnit = units.find(u => String(u.cid) === String(targetPreviewMode.actorCid));
      if (!actorUnit || !unit) return false;
      if (typeof actorUnit.ally === 'boolean' && typeof unit.ally === 'boolean') {
        return actorUnit.ally === unit.ally;
      }
      if (actorUnit.role && unit.role) {
        const allies = new Set(['pc', 'ally']);
        const aIsAlly = allies.has(String(actorUnit.role).toLowerCase());
        const bIsAlly = allies.has(String(unit.role).toLowerCase());
        return aIsAlly === bIsAlly;
      }
      return false;
    }

    /**
     * Friendly-fire warning hook. Currently used to surface a confirm() before
     * resolution if the DM has somehow selected a same-side target.
     */
    function isFriendlyFireSelection() {
      if (!localResolutionTray) return false;
      const target = findCombatantByCid(localResolutionTray.targetCid);
      if (!target) return false;
      const units = state?.tactical_map?.units || [];
      const targetUnit = units.find(u => String(u.cid) === String(target.cid));
      return targetUnit ? isSameSideAsActor(targetUnit) : false;
    }

    async function selectPreviewTarget(cid) {
      selectedTargetCid = String(cid);
      openLocalResolutionTray(state.active_cid, targetPreviewMode.capabilityId, selectedTargetCid);
      // Automatically trigger preparation for a smoother UX.
      await prepareLocalResolutionPreview();
    }

    function getSelectedTargetAdvisory(cap, targetCid) {
      if (!cap || !targetCid || !state || !state.tactical_map) {
        return { status: 'unknown', label: 'DM adjudication needed', distanceFt: null, limitFt: null };
      }

      const activeUnit = (state.tactical_map.units || []).find(u => String(u.cid) === String(state.active_cid));
      const targetUnit = (state.tactical_map.units || []).find(u => String(u.cid) === String(targetCid));

      if (!activeUnit || !activeUnit.pos || !targetUnit || !targetUnit.pos) {
        return { status: 'unknown', label: 'Position unknown', distanceFt: null, limitFt: null };
      }

      const feetPerSquare = state.tactical_map.grid?.feet_per_square || 5;
      const dx = Math.abs(activeUnit.pos.col - targetUnit.pos.col);
      const dy = Math.abs(activeUnit.pos.row - targetUnit.pos.row);
      const distanceFt = Math.max(dx, dy) * feetPerSquare;

      // Extract range/reach
      let limitFt = null;
      const actionType = (cap.action_type || "").toLowerCase();

      if (cap.reach_ft !== undefined && cap.reach_ft !== null) limitFt = cap.reach_ft;
      else if (cap.range_ft !== undefined && cap.range_ft !== null) limitFt = cap.range_ft;
      else if (cap.range_normal_ft !== undefined && cap.range_normal_ft !== null) limitFt = cap.range_normal_ft;
      else if (cap.reach !== undefined && cap.reach !== null) limitFt = parseInt(cap.reach);
      else if (cap.range !== undefined && cap.range !== null) limitFt = parseInt(cap.range);
      else if (actionType.includes("melee")) limitFt = 5;

      if (limitFt === null || isNaN(limitFt)) {
        return { status: 'unknown', label: 'Range unknown — DM adjudication needed', distanceFt, limitFt: null };
      }

      if (distanceFt <= limitFt) {
        return { status: 'likely-in-range', label: 'Likely in range', distanceFt, limitFt };
      } else {
        return { status: 'likely-out-of-range', label: 'Likely out of range', distanceFt, limitFt };
      }
    }

      const modal = document.getElementById('resolutionModal');

              ${ctx.advisory.distanceFt !== null ? ctx.advisory.distanceFt + 'ft - ' : ''}${esc(ctx.advisory.label)}

                   style="font-size: 32px; width: 100px; color: var(--gold);"
                   oninput="updateModalDamage(this.value)">

              <span style="font-size: 13px; font-weight: 600; color: var(--text);">Points of damage</span>
              <span style="font-size: 11px; color: var(--muted);">Formula: ${esc(packet.damage_formula || 'none')}</span>

              <div style="font-weight:bold; color:var(--gold); font-size:10px; text-transform:uppercase; margin-bottom:8px; border-bottom: 1px solid rgba(214,186,126,0.2); padding-bottom: 4px;">Backend Execution Packet</div>

      `;

      if (outcome === 'fail' && packet.riders && packet.riders.length > 0) {
        html += `
          <div class="modal-field" style="margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px;">
            <span class="modal-label" style="color: var(--gold); font-weight: bold; margin-bottom: 8px;">Rider Prompts</span>
            <div style="display: flex; flex-direction: column; gap: 8px;">
              ${packet.riders.map(r => `
                <div style="background: rgba(214,186,126,0.1); border: 1px solid var(--gold); padding: 8px 12px; border-radius: 4px; font-size: 13px;">
                  <strong style="color: var(--gold);">${esc(r.name)}:</strong> ${esc(r.desc)}
                </div>

    function setModalOutcome(outcome) {
      if (localResolutionInFlight) return;
      const targetCid = localResolutionTray?.targetCid;
      if (!targetCid) return;

      localResolutionOutcomes[String(targetCid)] = outcome;

      // Auto-update damage input based on outcome if it matches simple attack logic
      const packet = localResolutionPacket;
      if (packet) {
        const input = document.getElementById('modalDamageInput');
        if (input) {
          if (outcome === 'success' || outcome === 'no_effect') {
            input.value = 0;
          } else {
            input.value = packet.total_fail ?? 0;
          }
        }
      }

      renderResolutionModal();
    }

    function updateModalDamage(val) {
      // We don't necessarily need to store this in localResolutionOutcomes yet
      // as we'll read it from the input on Apply.
    }

    async function applyLocalResolutionResultsFromModal() {
      if (!localResolutionTray || !localResolutionPacket || localResolutionInFlight) return;

      // Range check: for simple attacks, warn/block if out of range
      const ctx = getLocalResolutionContext();
      localResolutionOverrideRange = false;
      if (ctx && ctx.advisory && ctx.advisory.status === 'likely-out-of-range') {
        const msg = `Target is LIKELY OUT OF RANGE (${ctx.advisory.distanceFt}ft > ${ctx.advisory.limitFt}ft).\n\nAre you sure you want to apply this result?`;
        if (!window.confirm(msg)) return;
        localResolutionOverrideRange = true;
      }

      const damageInput = document.getElementById('modalDamageInput');
      const enteredDamage = (damageInput && damageInput.value !== '') ? parseInt(damageInput.value) : 0;

      // Support manual damage override by updating the packet rolls.
      const rolls = localResolutionPacket.damage_rolls || [];
      const defaultTotal = localResolutionPacket.total_fail || 0;

      if (enteredDamage !== defaultTotal) {
        if (rolls.length === 1) {
          rolls[0].rolled = enteredDamage;
        } else if (rolls.length > 1) {
          // If multiple rolls exist, attribute all damage to the first roll and zero out others.
          rolls[0].rolled = enteredDamage;
          for (let i = 1; i < rolls.length; i++) rolls[i].rolled = 0;
        } else if (enteredDamage > 0) {
          localResolutionPacket.damage_rolls = [{ rolled: enteredDamage, type: 'damage' }];
        }
      }

      await applyLocalResolutionResults(true, true);
    }

              ` : ''}

              ${selected.manual_instructions ? `
                <div style="margin-top:12px; border:1px solid var(--gold); background:rgba(214,186,126,0.15); padding:10px 14px; border-radius:4px; font-size:13px; color:var(--gold); display:flex; gap:8px; align-items:start;">
                  <span style="font-size:16px;">⚠️</span>
                  <div>

                    ${esc(selected.manual_instructions)}
                  </div>
                </div>
              ` : ''}
          `;

          // Sequence Tray Integration
          if (localSequencePacket && (String(localSequencePacket.capability_id) === String(selected.id) || localSequencePacket.steps.some(s => String(s.action_id) === String(selected.id)))) {
            const isChooseN = localSequencePacket.sequence_kind === 'choose_n';
            const budgetLabel = isChooseN ? `Budget: ${localSequencePacket.remaining_budget} / ${localSequencePacket.total_budget || localSequencePacket.choose_n} choices left` : '';

            summaryHtml += `
              <div style="margin-top:12px; border:1px solid var(--accent); background:rgba(106,169,255,0.05); padding:8px; border-radius:4px">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; border-bottom:1px solid rgba(106,169,255,0.2); padding-bottom:4px">
                  <div>

                  </div>
