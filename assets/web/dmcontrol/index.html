<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DM Control – Initiative Tracker</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #141923;
      --panel2: #0f1320;
      --border: rgba(214,186,126,0.22);
      --text: #e8eef7;
      --muted: #93a2b8;
      --accent: #6aa9ff;
      --gold: #d6ba7e;
      --danger: #ff5b5b;
      --heal: #4caf82;
      --radius: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif; overflow: hidden; }
    
    .app { height: 100vh; display: flex; flex-direction: column; }

    /* ── Topbar ─────────────────────────────────────────────────── */
    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }
    .topbar h1 { font-size: 16px; color: var(--gold); flex: 1; }
    .workspace-link {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: var(--radius); padding: 5px 12px; cursor: pointer; font-size: 12px;
      text-decoration: none; display: inline-flex; align-items: center;
    }
    .workspace-link:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Main Map Surface ────────────────────────────────────────── */
    .main-surface {
      flex: 1;
      position: relative;
      background: #0a0c12;
      overflow: hidden;
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: -webkit-optimize-contrast;
    }

    /* ── Bottom Control Bar ──────────────────────────────────────── */
    .control-bar {
      background: var(--panel2);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      z-index: 10;
    }
    .actor-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .actor-name { font-size: 18px; font-weight: bold; color: var(--text); }
    .actor-meta { font-size: 12px; color: var(--muted); }
    .status-idle { color: var(--muted); font-style: italic; }
    
    .placeholder-controls {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    .placeholder-btn {
      background: rgba(255,255,255,0.05);
      border: 1px dashed var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: not-allowed;
    }

    /* ── Status Overlay ─────────────────────────────────────────── */
    .status-overlay {
      position: absolute; top: 20px; right: 20px;
      background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 6px;
      font-size: 12px; border: 1px solid var(--border);
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>DM Control</h1>
      <div id="combatStatus" class="actor-meta">Loading state...</div>
      <a href="/dm" class="workspace-link">↩ DM Cockpit</a>
    </header>

    <main class="main-surface" id="mapWrap">
      <canvas id="mapCanvas"></canvas>
      <div id="statusOverlay" class="status-overlay" style="display:none;"></div>
    </main>

    <footer class="control-bar">
      <div id="activeActorPanel">
        <div class="status-idle">Waiting for combat data...</div>
      </div>
      <div class="placeholder-controls">
        <div class="placeholder-btn">Movement (Placeholder)</div>
        <div class="placeholder-btn">Actions (Placeholder)</div>
        <div class="placeholder-btn">End Turn (Placeholder)</div>
      </div>
    </footer>
  </div>

  <script>
    /**
     * DM Control Phase 2A — Read-only LAN-like map surface.
     * Deferred: movement mutation, targeting, active resolution.
     */

    const API_COMBAT = '/api/dm/combat';
    let pollInterval = null;
    let state = null;

    // Map state
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    let zoom = 40;
    let panX = 0;
    let panY = 0;
    let fittedToGrid = false;
    let lastGrid = {cols: 0, rows: 0};

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    window.addEventListener('resize', resize);
    resize();

    async function fetchState() {
      try {
        const resp = await fetch(API_COMBAT);
        if (!resp.ok) {
          if (resp.status === 401) {
             renderError('Admin authentication required. Open DM Cockpit first.');
             return;
          }
          throw new Error(`HTTP ${resp.status}`);
        }
        const data = await resp.json();
        state = data;
        renderState(data);
        draw();
      } catch (err) {
        console.error('Fetch error:', err);
        renderError('Offline or server error');
      }
    }

    function renderError(msg) {
      const statusEl = document.getElementById('combatStatus');
      if (statusEl) {
        statusEl.textContent = msg;
        statusEl.style.color = 'var(--danger)';
      }
    }

    function renderState(data) {
      const statusEl = document.getElementById('combatStatus');
      const actorPanel = document.getElementById('activeActorPanel');
      const overlay = document.getElementById('statusOverlay');

      if (!data.in_combat) {
        statusEl.textContent = 'Out of Combat';
        statusEl.style.color = 'var(--muted)';
        actorPanel.innerHTML = '<div class="status-idle">No active combat</div>';
        overlay.style.display = 'none';
        return;
      }

      statusEl.textContent = `Round ${data.round}, Turn ${data.turn}`;
      statusEl.style.color = 'var(--gold)';

      const activeCid = data.active_cid;
      const actor = data.combatants.find(c => c.cid === activeCid);

      if (!actor) {
        actorPanel.innerHTML = '<div class="status-idle">No active actor focus</div>';
        overlay.style.display = 'none';
        return;
      }

      const isMonster = !actor.is_pc;
      
      if (isMonster) {
        actorPanel.innerHTML = `
          <div class="actor-info">
            <span class="actor-name">${actor.name}</span>
            <span class="actor-meta">${actor.role || actor.type || 'Monster/NPC'} • HP: ${actor.hp}/${actor.max_hp}</span>
          </div>
          <div class="actor-meta">
            Speed: ${actor.speed || '—'} • AC: ${actor.ac || '—'} • Conditions: ${actor.conditions?.join(', ') || 'None'}
          </div>
        `;
        overlay.textContent = `Focus: ${actor.name} (Active)`;
        overlay.style.display = 'block';
        overlay.style.borderColor = 'var(--danger)';
      } else {
        actorPanel.innerHTML = `
          <div class="actor-info">
            <span class="actor-name">${actor.name}</span>
            <span class="actor-meta">Player Character • Turn in progress</span>
          </div>
          <div class="status-idle">Waiting for player action...</div>
        `;
        overlay.textContent = `Focus: ${actor.name} (PC Turn)`;
        overlay.style.display = 'block';
        overlay.style.borderColor = 'var(--accent)';
      }
    }

    function gridToScreen(col, row) {
      return { x: panX + col * zoom + zoom / 2, y: panY + row * zoom + zoom / 2 };
    }

    function draw() {
      if (!state || !state.tactical_map) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
      }

      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      ctx.clearRect(0, 0, w, h);

      // Background
      ctx.fillStyle = "#0a0c12";
      ctx.fillRect(0, 0, w, h);

      const grid = state.tactical_map.grid;
      if (!grid || !grid.cols || !grid.rows) return;

      const cols = grid.cols;
      const rows = grid.rows;

      if (cols !== lastGrid.cols || rows !== lastGrid.rows) {
        fittedToGrid = false;
        lastGrid = { cols, rows };
      }

      // Auto-fit on first draw
      if (!fittedToGrid) {
        const pad = 24;
        const sx = (w - pad * 2) / (cols * zoom);
        const sy = (h - pad * 2) / (rows * zoom);
        const s = Math.min(1.0, Math.max(0.35, Math.min(sx, sy)));
        zoom = Math.floor(zoom * s);
        panX = Math.floor((w - cols * zoom) / 2);
        panY = Math.floor((h - rows * zoom) / 2);
        fittedToGrid = true;
      }

      // Grid lines
      ctx.strokeStyle = "rgba(255,255,255,0.07)";
      ctx.lineWidth = 1;
      for (let c = 0; c <= cols; c++) {
        const x = panX + c * zoom;
        ctx.beginPath(); ctx.moveTo(x, panY); ctx.lineTo(x, panY + rows * zoom); ctx.stroke();
      }
      for (let r = 0; r <= rows; r++) {
        const y = panY + r * zoom;
        ctx.beginPath(); ctx.moveTo(panX, y); ctx.lineTo(panX + cols * zoom, y); ctx.stroke();
      }

      // Render tokens (combatants with positions)
      const units = state.tactical_map.units || [];
      const activeCid = state.active_cid;

      units.forEach(u => {
        if (!u.pos) return;
        const { x, y } = gridToScreen(u.pos.col, u.pos.row);
        const r = Math.max(10, zoom * 0.35);
        const active = (activeCid !== null && String(activeCid) === String(u.cid));

        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);

        // Basic coloring based on role
        if (u.role === "enemy") {
          ctx.fillStyle = "rgba(255,91,91,0.28)";
        } else if (u.role === "pc") {
          ctx.fillStyle = "rgba(106,255,176,0.18)";
        } else {
          ctx.fillStyle = "rgba(255,255,255,0.15)";
        }
        ctx.fill();

        // Border / Active highlight
        ctx.lineWidth = active ? 3 : 2;
        ctx.strokeStyle = active ? "rgba(255,255,255,0.85)" : "rgba(255,255,255,0.25)";
        ctx.stroke();

        // Label (First letter or short name)
        const label = (u.name || "?").charAt(0).toUpperCase();
        ctx.font = `bold ${Math.max(10, Math.floor(zoom * 0.35))}px system-ui`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.fillText(label, x, y);
      });
    }

    // Initial fetch and start polling
    fetchState();
    pollInterval = setInterval(fetchState, 2000);
  </script>
</body>
</html>
