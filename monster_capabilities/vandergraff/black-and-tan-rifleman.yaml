name: Black and Tan Rifleman
slug: black-and-tan-rifleman
source: repo-local
license: CC-BY-4.0
capabilities:
  - id: multiattack
    name: Multiattack
    type: action
    executable: true
    desc: "The Rifleman makes two Armalite Rifle attacks."
    action_type: composite
    mechanics:
      composite:
        sequence_kind: fixed_children
        children:
          - action_id: armalite-rifle
            count: 2
  - id: armalite-rifle
    name: Armalite Rifle
    type: action
    executable: true
    desc: "Ranged Weapon Attack: +6 to hit, range 120/360 ft., one target. Hit: 10 (1d12 + 4) force damage. Loud. Magazine 20."
    action_type: ranged_attack
    mechanics:
      attack_bonus: 6
      damage:
        - formula: 1d12+4
          type: force
      range: 120
      long_range: 360
      magazine_capacity: 20
      ammo_type: "5.56"
  - id: pistol
    name: .45 Pistol
    type: action
    executable: true
    desc: "Ranged Weapon Attack: +6 to hit, range 40/120 ft., one target. Hit: 9 (1d10 + 4) force damage. Loud. Magazine 8."
    action_type: ranged_attack
    mechanics:
      attack_bonus: 6
      damage:
        - formula: 1d10+4
          type: force
      range: 40
      long_range: 120
      magazine_capacity: 8
      ammo_type: ".45"
  - id: knife
    name: Knife
    type: action
    executable: true
    desc: "Melee or Ranged Weapon Attack: +6 to hit, reach 5 ft. or range 20/60 ft., one target. Hit: 6 (1d4 + 4) force damage."
    action_type: melee_attack
    mechanics:
      attack_bonus: 6
      damage:
        - formula: 1d4+4
          type: force
      reach: 5
  - id: controlled-burst
    name: Controlled Burst
    type: action
    executable: true
    desc: "When you make a firearm attack with a weapon that has the Burst property, you can spend 3 ammo before the attack roll. On a hit, the attack deals one extra weapon damage die. You can benefit from Controlled Burst only once per turn."
    action_type: modifier
    mechanics:
      modifier:
        kind: next_attack
        eligible_action_ids:
          - armalite-rifle
        ammo_cost: 3
        damage_bonus:
          mode: extra_weapon_die
          count: 1
        consume_on: attack_resolution
        clears_on: next_eligible_attack
        jam_risk: natural_1
        limit: once_per_turn
  - id: reload
    name: Reload
    type: bonus_action
    executable: true
    desc: "The Rifleman reloads one firearm from its bandolier."
    action_type: firearm_reload
    mechanics:
      firearm_reload: true
  - id: vandergraff-drill
    name: Vandergraff Drill
    type: trait
    executable: false
    desc: "If this creature starts its turn within 30 feet of an allied Black and Tan officer it can see or hear, it gains +1 to attack rolls until the start of its next turn."
    warning: "Reminder: +1 to attack if near another officer."
  - id: baton-and-boot
    name: Baton and Boot
    type: trait
    desc: "This creature has Advantage on attack rolls against a Prone creature within 5 feet of it."
  - id: fire-discipline
    name: Fire Discipline
    type: trait
    executable: false
    desc: "This creature does not expend extra ammunition on a missed attack unless it used Controlled Burst, Automatic Sweep, or Suppressive Fire."
    warning: "Ammunition tracking reminder."
