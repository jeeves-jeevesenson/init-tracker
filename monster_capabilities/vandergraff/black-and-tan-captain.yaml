name: Black and Tan Captain
slug: black-and-tan-captain
source: repo-local
license: CC-BY-4.0
capabilities:
  - id: multiattack
    name: Multiattack
    type: action
    executable: true
    desc: "The Captain makes three attacks, using Armalite Rifle, .45 Pistol, or Officer Saber in any combination."
    action_type: composite
    mechanics:
      composite:
        sequence_kind: choose_n
        choose_n: 3
        children:
          - action_id: armalite-rifle
            count: 3
          - action_id: pistol
            count: 3
          - action_id: saber
            count: 3
  - id: armalite-rifle
    name: Armalite Rifle
    type: action
    executable: true
    desc: "Ranged Weapon Attack: +7 to hit, range 120/360 ft., one target. Hit: 11 (1d12 + 4) force damage. Loud. Magazine 20."
    action_type: ranged_attack
    mechanics:
      attack_bonus: 7
      damage:
        - formula: 1d12+4
          type: force
      range: 120
      long_range: 360
      magazine_capacity: 20
      ammo_type: "5.56"
  - id: controlled-burst
    name: Controlled Burst
    type: action
    executable: true
    desc: "Before making one Armalite Rifle attack, the Captain spends 3 ammo. On a hit, the attack deals 17 (2d12 + 4) force damage. Once per turn."
    action_type: modifier
    mechanics:
      modifier:
        kind: next_attack
        eligible_action_ids:
          - armalite-rifle
        ammo_cost: 3
        damage_bonus:
          mode: extra_weapon_die
          count: 1
        consume_on: attack_resolution
        clears_on: next_eligible_attack
        jam_risk: natural_1
        limit: once_per_turn
  - id: pistol
    name: .45 Pistol
    type: action
    executable: true
    desc: "Ranged Weapon Attack: +7 to hit, range 40/120 ft., one target. Hit: 10 (1d10 + 4) force damage. Loud. Magazine 8."
    action_type: ranged_attack
    mechanics:
      attack_bonus: 7
      damage:
        - formula: 1d10+4
          type: force
      range: 40
      long_range: 120
      magazine_capacity: 8
      ammo_type: ".45"
  - id: saber
    name: Officer Saber
    type: action
    executable: true
    desc: "Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 8 (1d8 + 4) slashing damage."
    action_type: melee_attack
    mechanics:
      attack_bonus: 7
      damage:
        - formula: 1d8+4
          type: slashing
      reach: 5
  - id: condemn-target
    name: Condemn the Target
    type: action
    executable: false
    desc: "The Captain chooses one creature it can see within 90 feet. Until the start of the Captain’s next turn, the first allied Black and Tan to hit that target deals an extra 10 (3d6) damage."
    warning: "Manual damage tracking required."
  - id: coordinated-volley
    name: Coordinated Volley
    type: bonus_action
    executable: false
    desc: "Choose up to two allied Black and Tans within 60 feet who can hear the Captain. Each chosen ally can move up to 10 feet or Brace."
    warning: "Manual ally movement/brace required."
  - id: reload
    name: Reload
    type: bonus_action
    executable: true
    desc: "The Captain reloads one firearm."
    action_type: firearm_reload
    mechanics:
      firearm_reload: true
  - id: brace
    name: Brace
    type: bonus_action
    executable: true
    desc: "The Captain gains the Braced condition until the start of its next turn."
    action_type: utility
  - id: command-net
    name: Command Net
    type: trait
    desc: "While the Captain is conscious and holding or wearing a command radio, Black and Tans within 120 feet ignore the first failed morale check they make."
  - id: hard-target
    name: Hard Target
    type: trait
    desc: "If the Captain is behind Half Cover or better, ranged attacks against the Captain do not gain Advantage unless the attacker is within 30 feet."
  - id: not-yet
    name: Not Yet
    type: reaction
    executable: true
    desc: "When the Captain fails a saving throw, it can add 1d6 to the roll (3/day)."
    mechanics:
      uses:
        max: 3
        per: day
      effects:
        - kind: bonus
          bonus: 1d6
          trigger: save_failure
          text: "Add 1d6 to failed save."
  - id: vandergraff-drill
    name: Vandergraff Drill
    type: trait
    executable: false
    desc: "If this creature starts its turn within 30 feet of an allied Black and Tan officer it can see or hear, it gains +1 to attack rolls until the start of its next turn."
    warning: "Reminder: +1 to attack if near another officer."
  - id: baton-and-boot
    name: Baton and Boot
    type: trait
    desc: "This creature has Advantage on attack rolls against a Prone creature within 5 feet of it."
  - id: fire-discipline
    name: Fire Discipline
    type: trait
    executable: false
    desc: "This creature does not expend extra ammunition on a missed attack unless it used Controlled Burst, Automatic Sweep, or Suppressive Fire."
    warning: "Ammunition tracking reminder."
