name: Black and Tan Constable
slug: black-and-tan-constable
source: repo-local
license: CC-BY-4.0
capabilities:
  - id: multiattack
    name: Multiattack
    type: action
    executable: true
    desc: "The Constable makes two attacks, using .45 Pistol or Baton in any combination."
    action_type: composite
    mechanics:
      composite:
        sequence_kind: choose_n
        choose_n: 2
        children:
          - action_id: pistol
            count: 2
          - action_id: baton
            count: 2
  - id: pistol
    name: .45 Pistol
    type: action
    executable: true
    desc: "Ranged Weapon Attack: +5 to hit, range 40/120 ft., one target. Hit: 8 (1d8 + 4) force damage. Loud. Magazine 8."
    action_type: ranged_attack
    mechanics:
      attack_bonus: 5
      damage:
        - formula: 1d8+4
          type: force
      range: 40
      long_range: 120
      magazine_capacity: 8
      ammo_type: ".45"
  - id: baton
    name: Baton
    type: action
    executable: true
    desc: "Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 4 (1d4 + 2) bludgeoning damage."
    action_type: melee_attack
    mechanics:
      attack_bonus: 4
      damage:
        - formula: 1d4+2
          type: bludgeoning
      reach: 5
      riders:
        - id: rough-arrest
          name: Rough Arrest
          trigger: hit
          desc: "Spend bonus action to attempt grapple?"
  - id: reload
    name: Reload
    type: bonus_action
    executable: true
    desc: "The Constable reloads its pistol."
    action_type: firearm_reload
    mechanics:
      firearm_reload: true
  - id: rough-arrest
    name: Rough Arrest
    type: trait
    executable: false
    desc: "When the Constable hits a creature with a Baton attack, it can attempt to grapple the target as a bonus action."
    warning: "Manual/Assisted grapple action."
  - id: vandergraff-drill
    name: Vandergraff Drill
    type: trait
    executable: false
    desc: "If this creature starts its turn within 30 feet of an allied Black and Tan officer it can see or hear, it gains +1 to attack rolls until the start of its next turn."
    warning: "Reminder: +1 to attack if near another officer."
  - id: baton-and-boot
    name: Baton and Boot
    type: trait
    desc: "This creature has Advantage on attack rolls against a Prone creature within 5 feet of it."
  - id: fire-discipline
    name: Fire Discipline
    type: trait
    executable: false
    desc: "This creature does not expend extra ammunition on a missed attack unless it used Controlled Burst, Automatic Sweep, or Suppressive Fire."
    warning: "Ammunition tracking reminder."
