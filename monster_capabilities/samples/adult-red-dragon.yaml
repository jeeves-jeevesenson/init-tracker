name: Adult Red Dragon
slug: adult-red-dragon
source: dnd5eapi
license: CC-BY-4.0
capabilities:
- id: multiattack
  name: Multiattack
  type: action
  executable: false
  desc: 'The dragon can use its Frightful Presence. It then makes three attacks: one
    with its bite and two with its claws.'
  action_type: composite
  mechanics: {}
- id: bite
  name: Bite
  type: action
  executable: true
  desc: 'Melee Weapon Attack: +14 to hit, reach 10 ft., one target. Hit: 19 (2d10
    + 8) piercing damage plus 7 (2d6) fire damage.'
  action_type: melee_attack
  mechanics:
    attack_bonus: 14
    damage:
    - formula: 2d10+8
      type: piercing
    - formula: 2d6
      type: fire
- id: claw
  name: Claw
  type: action
  executable: true
  desc: 'Melee Weapon Attack: +14 to hit, reach 5 ft., one target. Hit: 15 (2d6 +
    8) slashing damage.'
  action_type: melee_attack
  mechanics:
    attack_bonus: 14
    damage:
    - formula: 2d6+8
      type: slashing
- id: tail
  name: Tail
  type: action
  executable: true
  desc: 'Melee Weapon Attack: +14 to hit, reach 15 ft., one target. Hit: 17 (2d8 +
    8) bludgeoning damage.'
  action_type: melee_attack
  mechanics:
    attack_bonus: 14
    damage:
    - formula: 2d8+8
      type: bludgeoning
- id: frightful-presence
  name: Frightful Presence
  type: action
  executable: false
  desc: Each creature of the dragon's choice that is within 120 ft. of the dragon
    and aware of it must succeed on a DC 19 Wisdom saving throw or become frightened
    for 1 minute. A creature can repeat the saving throw at the end of each of its
    turns, ending the effect on itself on a success. If a creature's saving throw
    is successful or the effect ends for it, the creature is immune to the dragon's
    Frightful Presence for the next 24 hours.
  action_type: utility
  mechanics: {}
- id: fire-breath
  name: Fire Breath
  type: action
  executable: true
  desc: The dragon exhales fire in a 60-foot cone. Each creature in that area must
    make a DC 21 Dexterity saving throw, taking 63 (18d6) fire damage on a failed
    save, or half as much damage on a successful one.
  action_type: save_ability
  recharge: 5
  mechanics:
    save_dc: 21
    save_ability: dex
    shape: cone
    size: 60
    damage:
    - formula: 18d6
      type: fire
      on_save: half
- id: detect
  name: Detect
  type: legendary_action
  executable: false
  desc: The dragon makes a Wisdom (Perception) check.
  action_type: utility
  mechanics: {}
- id: tail-attack
  name: Tail Attack
  type: legendary_action
  executable: false
  desc: The dragon makes a tail attack.
  action_type: utility
  mechanics: {}
- id: wing-attack-(costs-2-actions)
  name: Wing Attack (Costs 2 Actions)
  type: legendary_action
  executable: true
  desc: The dragon beats its wings. Each creature within 10 ft. of the dragon must
    succeed on a DC 22 Dexterity saving throw or take 15 (2d6 + 8) bludgeoning damage
    and be knocked prone. The dragon can then fly up to half its flying speed.
  action_type: save_ability
  cost: 2
  mechanics:
    save_dc: 22
    save_ability: dex
    shape: radius
    size: 10
    damage:
    - formula: 2d6+8
      type: bludgeoning
      on_save: none
    conditions:
    - type: prone
- id: legendary-resistance
  name: Legendary Resistance
  type: trait
  executable: false
  desc: If the dragon fails a saving throw, it can choose to succeed instead.
