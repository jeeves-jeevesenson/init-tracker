name: Wolf
slug: wolf
source: dnd5eapi
license: CC-BY-4.0
capabilities:
- id: bite
  name: Bite
  type: action
  executable: true
  desc: 'Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 7 (2d4 + 2)
    piercing damage. If the target is a creature, it must succeed on a DC 11 Strength
    saving throw or be knocked prone.'
  action_type: melee_attack
  mechanics:
    attack_bonus: 4
    damage:
    - formula: 2d4+2
      type: piercing
    reach: 5
- id: keen-hearing-and-smell
  name: Keen Hearing and Smell
  type: trait
  executable: false
  desc: The wolf has advantage on Wisdom (Perception) checks that rely on hearing
    or smell.
- id: pack-tactics
  name: Pack Tactics
  type: trait
  executable: false
  desc: The wolf has advantage on an attack roll against a creature if at least one
    of the wolf's allies is within 5 ft. of the creature and the ally isn't incapacitated.
