# .github/workflows/copilot-setup-steps.yml
name: Copilot Setup Steps
on:
  workflow_dispatch:
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: |
          echo "Lean Copilot setup: no blanket runtime dependency install."
          echo "Install task-specific dependencies during focused validation only."
